<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CarbuFuel · Prix carburants en temps réel</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0f1a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #11161f;
      --bg-card: #0d121c;
      --border-subtle: #1e2532;
      --accent-primary: #f59e0b;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      --accent-info: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --gradient-hero: linear-gradient(135deg, #f59e0b 0%, #dc2626 100%);
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, 'Inter', sans-serif;
      padding: 20px 16px 100px;
      line-height: 1.5;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .hero { text-align: center; margin-bottom: 28px; }
    .hero-icon { font-size: 3.5rem; margin-bottom: 8px; }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: var(--text-tertiary); font-size: 0.85rem; }

    .search-card, .station-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 20px;
    }

    .search-group { display: flex; gap: 12px; margin-bottom: 20px; }
    .input-wrapper { flex: 1; position: relative; }
    .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); }
    input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: var(--accent-primary); }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      cursor: pointer;
      font-size: 1.2rem;
    }
    .icon-btn:hover { border-color: var(--accent-primary); }

    .radius-section { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
    }
    .radius-value {
      background: var(--bg-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-weight: 600;
      color: var(--accent-primary);
    }

    .fuel-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .fuel-btn {
      padding: 8px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 600;
      cursor: pointer;
    }
    .fuel-btn.active {
      background: var(--gradient-hero);
      border-color: transparent;
      color: white;
    }

    .sort-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sort-group { display: flex; gap: 8px; }
    .sort-btn {
      padding: 6px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .sort-btn.active { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(245,158,11,0.1); }
    .sort-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .warning-banner {
      background: rgba(245,158,11,0.15);
      border-left: 3px solid var(--accent-warning);
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .station-logo {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .station-logo img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .logo-fallback {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    
    .station-header { display: flex; gap: 14px; margin-bottom: 16px; }
    .station-info { flex: 1; }
    .station-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .station-address { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 4px; }
    .station-distance {
      font-size: 0.7rem;
      color: var(--accent-info);
      background: rgba(59,130,246,0.1);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      display: inline-block;
    }

    .fuel-prices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .price-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 12px;
    }
    .price-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .price-fuel-name {
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .price-rank {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.3);
      color: var(--text-tertiary);
    }
    .price-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .price-amount {
      font-size: 1.4rem;
      font-weight: 800;
    }
    .price-amount.cheap { color: var(--accent-success); }
    .price-amount.expensive { color: var(--accent-danger); }
    .price-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-best {
      background: rgba(16,185,129,0.2);
      color: var(--accent-success);
      border: 1px solid var(--accent-success);
    }
    .badge-worst {
      background: rgba(239,68,68,0.2);
      color: var(--accent-danger);
      border: 1px solid var(--accent-danger);
    }
    .badge-demo {
      background: rgba(245,158,11,0.2);
      color: var(--accent-warning);
      border: 1px solid var(--accent-warning);
      font-size: 0.65rem;
    }
    .price-bar-container {
      width: 100%;
      height: 6px;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: 8px 0;
    }
    .price-bar {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.5s ease;
    }
    .price-bar.cheap { background: linear-gradient(90deg, var(--accent-success), #34d399); }
    .price-bar.expensive { background: linear-gradient(90deg, var(--accent-danger), #f87171); }
    .price-bar.mid { background: linear-gradient(90deg, var(--accent-warning), #fbbf24); }
    .price-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.7rem;
    }
    .price-updated { color: var(--text-tertiary); }
    
    .station-footer { display: flex; justify-content: flex-end; }
    .maps-link {
      color: var(--accent-info);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: var(--radius-md);
    }

    .state-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 48px 24px;
      text-align: center;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 480px) {
      .station-logo, .logo-fallback { width: 48px; height: 48px; }
      .price-amount { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-icon">⛽</div>
    <h1>CarbuFuel</h1>
    <p class="subtitle">Prix carburants en temps réel · France</p>
  </div>
  
  <div class="search-card">
    <div class="search-group">
      <div class="input-wrapper">
        <span class="input-icon">📍</span>
        <input type="text" id="city" placeholder="Ville, code postal ou adresse" value="Gien" autocomplete="off">
      </div>
      <button class="icon-btn" id="searchBtn" onclick="searchCity()">🔍</button>
      <button class="icon-btn" id="gpsBtn" onclick="gps()">📍</button>
    </div>
    <div class="radius-section">
      <span>⭕ Rayon</span>
      <input type="range" id="radius" min="2" max="50" value="15" oninput="updateRadius(this.value)">
      <div class="radius-value" id="radiusVal">15 km</div>
    </div>
  </div>
  
  <div class="fuel-grid">
    <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
    <button class="fuel-btn" onclick="setFuel('Gazole',this)">Gazole</button>
    <button class="fuel-btn" onclick="setFuel('SP95',this)">SP95</button>
    <button class="fuel-btn" onclick="setFuel('E10',this)">E10</button>
    <button class="fuel-btn" onclick="setFuel('SP98',this)">SP98</button>
    <button class="fuel-btn" onclick="setFuel('E85',this)">E85</button>
    <button class="fuel-btn" onclick="setFuel('GPLc',this)">GPL</button>
  </div>
  
  <div class="sort-section">
    <span>📊 Trier par</span>
    <div class="sort-group">
      <button class="sort-btn active" id="sortDist" onclick="setSort('dist')">Distance</button>
      <button class="sort-btn" id="sortPrice" onclick="setSort('price')" disabled>Prix</button>
    </div>
  </div>
  
  <div id="result">
    <div class="state-card"><div style="font-size:3rem;margin-bottom:16px">⛽</div><p>Recherche en cours...</p></div>
  </div>
</div>

<script>
'use strict';

let userLat = null, userLon = null;
let stations = [];
let activeFuel = 'all';
let sortMode = 'dist';
let isLoading = false;

// Base de données des logos
const BRAND_LOGOS = {
  'leclerc': { url: 'https://logo.clearbit.com/e.leclerc', bg: '#003ca6' },
  'carrefour': { url: 'https://logo.clearbit.com/carrefour.fr', bg: '#004a97' },
  'auchan': { url: 'https://logo.clearbit.com/auchan.fr', bg: '#e10600' },
  'intermarche': { url: 'https://logo.clearbit.com/intermarche.com', bg: '#e30613' },
  'systeme u': { url: 'https://logo.clearbit.com/magasins-u.com', bg: '#c00000' },
  'total': { url: 'https://logo.clearbit.com/totalenergies.fr', bg: '#c8102e' },
  'esso': { url: 'https://logo.clearbit.com/esso.fr', bg: '#003087' },
  'shell': { url: 'https://logo.clearbit.com/shell.fr', bg: '#fbce07' }
};

// Données de démonstration pour les stations qui n'ont pas de prix
function generateDemoPrices(brandName, stationId) {
  // Prix fictifs réalistes (varient selon l'enseigne)
  const basePrices = {
    'Gazole': 1.65 + (Math.random() * 0.15),
    'SP95': 1.75 + (Math.random() * 0.12),
    'E10': 1.70 + (Math.random() * 0.12),
    'SP98': 1.82 + (Math.random() * 0.12),
    'E85': 0.85 + (Math.random() * 0.10),
    'GPLc': 0.95 + (Math.random() * 0.10)
  };
  
  // Ajouter une variation selon l'enseigne
  const brandFactors = {
    'leclerc': 0.95, 'carrefour': 0.96, 'auchan': 0.97,
    'intermarche': 0.98, 'systeme u': 0.97, 'total': 1.02,
    'esso': 1.01, 'shell': 1.01
  };
  
  let factor = 1.0;
  for (let [key, val] of Object.entries(brandFactors)) {
    if (brandName.toLowerCase().includes(key)) factor = val;
  }
  
  const fuels = [];
  for (let [fuelName, basePrice] of Object.entries(basePrices)) {
    fuels.push({
      shortName: fuelName,
      amount: +(basePrice * factor).toFixed(3),
      updatedAt: new Date().toISOString(),
      isDemo: true
    });
  }
  return fuels;
}

function getBrandLogo(brandName) {
  if (!brandName) return null;
  const normalized = brandName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  for (let [key, value] of Object.entries(BRAND_LOGOS)) {
    if (normalized.includes(key)) return value;
  }
  return null;
}

function buildLogoElement(brandName, stationName) {
  const brandData = getBrandLogo(brandName);
  const abbr = stationName.replace(/[^a-zA-Z]/g, '').slice(0, 2).toUpperCase() || '??';
  
  if (brandData) {
    return `<div class="station-logo">
      <img src="${brandData.url}" alt="${stationName}"
        onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'logo-fallback\\' style=\\'background:${brandData.bg};color:white\\'>${abbr}</div>'">
    </div>`;
  }
  return `<div class="logo-fallback">${abbr}</div>`;
}

function updateRadius(val) {
  document.getElementById('radiusVal').textContent = val + ' km';
  if (userLat) load();
}

async function searchCity() {
  const q = document.getElementById('city').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.textContent = '⏳';
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
    const d = await r.json();
    if (!d.features?.length) throw new Error();
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch(e) {
    showState('❌', 'Ville non trouvée', true);
  } finally {
    btn.textContent = '🔍';
  }
}

function gps() {
  if (!navigator.geolocation) {
    showState('📱', 'GPS non disponible', true);
    return;
  }
  const btn = document.getElementById('gpsBtn');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      btn.textContent = '📍';
      load();
    },
    () => {
      btn.textContent = '📍';
      showState('⚠️', 'Erreur GPS', true);
    },
    { timeout: 10000 }
  );
}

async function load() {
  if (isLoading || !userLat) return;
  isLoading = true;
  const radiusM = parseInt(document.getElementById('radius').value) * 1000;
  showLoading('Recherche des stations...');
  
  try {
    const aroundUrl = `https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radiusM}`;
    const response = await fetch(aroundUrl);
    if (!response.ok) throw new Error('API indisponible');
    const list = await response.json();
    
    if (!Array.isArray(list) || list.length === 0) {
      throw new Error('Aucune station trouvée');
    }
    
    showLoading(`Chargement des prix pour ${Math.min(list.length, 20)} stations...`);
    const slice = list.slice(0, 20);
    
    // Récupérer les prix pour chaque station
    const pricePromises = slice.map(s => 
      fetch(`https://api.prix-carburants.2aaz.fr/station/${s.id}`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    );
    const priceDetails = await Promise.all(pricePromises);
    
    stations = [];
    let hasRealPrices = false;
    
    for (let i = 0; i < slice.length; i++) {
      const s = slice[i];
      const priceData = priceDetails[i];
      const brandName = s.Brand?.name || s.name || 'Station Service';
      
      // Essayer d'extraire les prix réels
      let fuels = [];
      if (priceData && priceData.Fuels && Array.isArray(priceData.Fuels)) {
        fuels = extractFuelsFromApi(priceData.Fuels);
        if (fuels.length > 0) hasRealPrices = true;
      }
      
      // Si pas de prix réels, utiliser les données de démonstration
      if (fuels.length === 0) {
        fuels = generateDemoPrices(brandName, s.id);
      }
      
      stations.push({
        id: s.id,
        nom: brandName,
        brand: brandName,
        lat: s.Coordinates.latitude,
        lon: s.Coordinates.longitude,
        address: s.Address?.street_line || '',
        city: s.Address?.city_line || '',
        fuels: fuels,
        dist: haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude),
        isDemo: fuels[0]?.isDemo || false
      });
    }
    
    // Ajouter un bandeau d'avertissement si ce sont des données de démo
    if (!hasRealPrices && stations.length > 0) {
      const warningHtml = `<div class="warning-banner">⚠️ Données de démonstration affichées. L'API ne renvoie pas de prix pour cette zone.</div>`;
      document.getElementById('result').innerHTML = warningHtml;
    }
    
    render();
  } catch(e) {
    console.error('Erreur:', e);
    showState('⚠️', e.message || 'Erreur de chargement', true);
  } finally {
    isLoading = false;
  }
}

function extractFuelsFromApi(apiFuels) {
  const fuels = [];
  if (!Array.isArray(apiFuels)) return fuels;
  
  for (let f of apiFuels) {
    let amount = null;
    let updatedAt = null;
    
    // Extraire le prix de différentes structures possibles
    if (f.Price?.amount) { amount = f.Price.amount; updatedAt = f.Price.last_update; }
    else if (f.price?.amount) { amount = f.price.amount; updatedAt = f.price.last_update; }
    else if (f.amount) { amount = f.amount; }
    else if (f.value) { amount = f.value; }
    
    if (amount && !isNaN(amount) && amount > 0) {
      let shortName = (f.shortName || f.short_name || f.name || '').trim();
      // Normaliser le nom
      if (shortName.includes('E10')) shortName = 'E10';
      else if (shortName.includes('SP95') && !shortName.includes('E10')) shortName = 'SP95';
      else if (shortName.includes('SP98')) shortName = 'SP98';
      else if (shortName.includes('Gazole') || shortName.includes('Diesel')) shortName = 'Gazole';
      else if (shortName.includes('E85')) shortName = 'E85';
      else if (shortName.includes('GPL')) shortName = 'GPLc';
      else continue;
      
      fuels.push({
        shortName: shortName,
        amount: +amount,
        updatedAt: updatedAt,
        isDemo: false
      });
    }
  }
  return fuels;
}

function render() {
  let filtered = activeFuel === 'all' ? stations : stations.filter(s => s.fuels.some(f => f.shortName === activeFuel));
  if (!filtered.length) {
    showState('⛽', activeFuel === 'all' ? 'Aucune station' : `Aucun ${activeFuel} disponible`, false);
    return;
  }
  
  // Calculer les statistiques pour chaque carburant
  const fuelStats = {};
  filtered.forEach(s => {
    s.fuels.forEach(f => {
      if (activeFuel !== 'all' && f.shortName !== activeFuel) return;
      if (!fuelStats[f.shortName]) fuelStats[f.shortName] = [];
      fuelStats[f.shortName].push({ amount: f.amount, stationId: s.id });
    });
  });
  Object.keys(fuelStats).forEach(f => fuelStats[f].sort((a,b) => a.amount - b.amount));
  
  // Trier
  const sorted = [...filtered].sort((a,b) => {
    if (sortMode === 'price' && activeFuel !== 'all') {
      const pa = a.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      const pb = b.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      return pa - pb;
    }
    return a.dist - b.dist;
  });
  
  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:16px">
    <span style="color:var(--text-secondary)">${sorted.length} station${sorted.length>1?'s':''}</span>
    <span style="background:var(--bg-secondary);padding:4px 12px;border-radius:var(--radius-full);font-size:0.75rem;color:var(--accent-primary)">${document.getElementById('radiusVal').textContent}</span>
  </div>`;
  
  sorted.forEach(s => html += buildCard(s, fuelStats));
  document.getElementById('result').innerHTML = (document.getElementById('result').innerHTML.includes('warning-banner') ? 
    document.getElementById('result').innerHTML.split('</div>')[0] + '</div>' : '') + html;
}

function buildCard(s, fuelStats) {
  const address = [s.address, s.city].filter(Boolean).join(' · ');
  const mapsUrl = `https://maps.google.com/?q=${s.lat},${s.lon}`;
  const fuelsList = activeFuel === 'all' ? s.fuels : s.fuels.filter(f => f.shortName === activeFuel);
  
  let pricesHtml = '';
  fuelsList.forEach(f => {
    const stats = fuelStats[f.shortName];
    const rank = stats ? stats.findIndex(item => item.stationId === s.id) + 1 : 0;
    const total = stats ? stats.length : 0;
    const isBest = rank === 1 && total > 1;
    const isWorst = rank === total && total > 1;
    const percentPosition = total > 1 ? ((rank - 1) / (total - 1)) * 100 : 50;
    const barColor = percentPosition < 33 ? 'cheap' : (percentPosition > 66 ? 'expensive' : 'mid');
    const age = f.updatedAt ? formatAge(f.updatedAt) : '';
    
    pricesHtml += `
      <div class="price-item">
        <div class="price-header">
          <span class="price-fuel-name">${escapeHtml(f.shortName)}</span>
          <span class="price-rank">${rank > 0 ? `#${rank}/${total}` : ''}</span>
        </div>
        <div class="price-main">
          <span class="price-amount ${isBest ? 'cheap' : (isWorst ? 'expensive' : '')}">${f.amount.toFixed(3)}€</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${isBest ? '<span class="price-badge badge-best">🏆 Meilleur prix</span>' : ''}
            ${isWorst ? '<span class="price-badge badge-worst">⚠️ Plus cher</span>' : ''}
            ${f.isDemo ? '<span class="price-badge badge-demo">🎮 Donnée démo</span>' : ''}
          </div>
        </div>
        ${total > 1 ? `
        <div class="price-bar-container">
          <div class="price-bar ${barColor}" style="width: ${percentPosition}%"></div>
        </div>
        <div class="price-footer">
          <span class="price-updated">${age ? `🕐 ${age}` : ''}</span>
          <span style="color:var(--text-tertiary)">${Math.round(percentPosition)}% des stations</span>
        </div>
        ` : `
        <div class="price-footer">
          <span class="price-updated">${age ? `🕐 ${age}` : ''}</span>
        </div>
        `}
      </div>
    `;
  });
  
  return `<div class="station-card">
    <div class="station-header">
      ${buildLogoElement(s.brand, s.nom)}
      <div class="station-info">
        <div class="station-name">${escapeHtml(s.nom)}</div>
        ${address ? `<div class="station-address">📍 ${escapeHtml(address)}</div>` : ''}
        <div class="station-distance">📏 ${s.dist.toFixed(1)} km</div>
      </div>
    </div>
    <div class="fuel-prices">${pricesHtml}</div>
    <div class="station-footer">
      <a class="maps-link" href="${mapsUrl}" target="_blank">🗺️ Ouvrir dans Maps →</a>
    </div>
  </div>`;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function formatAge(iso) { try { const h = (Date.now() - new Date(iso).getTime())/3600000; if (h<1) return 'maintenant'; if (h<24) return `${Math.floor(h)}h`; return `${Math.floor(h/24)}j`; } catch(e) { return ''; } }

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sortPrice').disabled = f === 'all';
  if (f === 'all' && sortMode === 'price') setSort('dist');
  else if (stations.length) render();
}

function setSort(m) {
  sortMode = m;
  document.getElementById('sortDist').classList.toggle('active', m === 'dist');
  document.getElementById('sortPrice').classList.toggle('active', m === 'price');
  if (stations.length) render();
}

function showLoading(msg) {
  document.getElementById('result').innerHTML = `<div class="state-card"><div class="loader"></div> ${msg}</div>`;
}

function showState(icon, msg, isError) {
  document.getElementById('result').innerHTML = `<div class="state-card${isError ? ' error' : ''}"><div style="font-size:3rem;margin-bottom:16px">${icon}</div><p>${msg}</p></div>`;
}

// Lancer la recherche automatique pour Gien
window.addEventListener('DOMContentLoaded', () => setTimeout(searchCity, 500));
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
</script>
