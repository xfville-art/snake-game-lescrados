<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --danger: #f85149;
    --bg: #0a0c0f; --card: #111318; --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif;
    min-height: 100vh; padding: 20px 16px 60px; max-width: 540px; margin: auto;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
  }
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text] {
    flex: 1; padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: #fff; font-size: 1rem; outline: none;
  }
  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #666; font-size: .85rem; }
  input[type=range] { flex: 1; accent-color: var(--orange); }
  button {
    padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer;
    font-weight: 700; font-family: 'Barlow Condensed', sans-serif; transition: transform .1s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }
  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .fuel-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: #888; font-size: .85rem; cursor: pointer;
  }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
  
  .station-logo {
    width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin-right: 12px; border: 1px solid rgba(255,255,255,.1); overflow: hidden;
    background: #fff;
  }
  .station-logo img { width: 100%; height: 100%; object-fit: contain; }
  .station-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
  .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>
<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou CP..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn-ghost" onclick="search()">🔍</button>
  <button class="btn-ghost" onclick="gps()">📍</button>
</div>

<div class="radius-row">
  <label>Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal" style="color:var(--orange); font-weight:bold">15km</span>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">Gazole</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
</div>

<div id="result"></div>

<script>
let userLat = null, userLon = null, stations = [], activeFuel = 'all';

// Configuration des styles de secours (Fallback)
const BRAND_DATA = {
  'total': {bg:'#c8102e', c:'#fff', domain:'totalenergies.fr'},
  'leclerc': {bg:'#003ca6', c:'#f7c300', domain:'e.leclerc'},
  'carrefour': {bg:'#004a97', c:'#fff', domain:'carrefour.fr'},
  'intermar': {bg:'#e30613', c:'#fff', domain:'intermarche.com'},
  'systeme u': {bg:'#c00000', c:'#fff', domain:'magasins-u.com'},
  'super u': {bg:'#c00000', c:'#fff', domain:'magasins-u.com'},
  'auchan': {bg:'#e10600', c:'#fff', domain:'auchan.fr'},
  'esso': {bg:'#003087', c:'#fff', domain:'esso.fr'},
  'bp': {bg:'#007a33', c:'#fff', domain:'bp.com'},
  'shell': {bg:'#fbce07', c:'#cc0000', domain:'shell.fr'},
  'avia': {bg:'#e30613', c:'#fff', domain:'avia-france.fr'}
};

function stationLogoBadge(s) {
  const brandRaw = (s.enseigne || s.nom || '').toLowerCase();
  let style = {bg:'#1e2229', c:'#aaa', domain:''};
  let abbr = brandRaw.substring(0, 2).toUpperCase();

  // On cherche si on connaît la marque
  for (let key in BRAND_DATA) {
    if (brandRaw.includes(key)) {
      style = BRAND_DATA[key];
      break;
    }
  }

  // Si on a un domaine précis, on l'utilise, sinon on tente un nettoyage du nom
  const domain = style.domain || brandRaw.replace(/[^a-z]/g, '') + '.fr';
  const logoUrl = `https://logo.clearbit.com/${domain}`;

  return `<div class="station-logo">
    <img src="${logoUrl}" alt="" 
         onerror="this.parentElement.style.background='${style.bg}'; this.parentElement.innerHTML='<span style=\\'color:${style.c}; font-weight:900; font-family:Barlow Condensed\\'>${abbr}</span>';">
  </div>`;
}

async function search() {
  const q = document.getElementById("city").value;
  if(!q) return;
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
  const d = await r.json();
  if (d.features.length) {
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  }
}

async function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude;
    userLon = p.coords.longitude;
    load();
  });
}

async function load() {
  const resDiv = document.getElementById("result");
  resDiv.innerHTML = '<div class="card"><span class="loader"></span> Recherche des stations...</div>';
  const radius = document.getElementById("radius").value;
  try {
    const r = await fetch(`https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radius*1000}`);
    const data = await r.json();
    stations = data.map(s => ({
      ...s,
      nom: s.Brand?.name || s.name || "Station",
      enseigne: s.Brand?.name || "",
      dist: haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude)
    })).sort((a,b) => a.dist - b.dist);
    render();
  } catch(e) {
    resDiv.innerHTML = '<div class="card" style="color:red">Erreur lors du chargement.</div>';
  }
}

function render() {
  let html = `<div class="card"><div style="font-weight:bold;margin-bottom:10px">📍 ${stations.length} stations</div>`;
  stations.forEach(s => {
    html += `<div class="station-row">
      ${stationLogoBadge(s)}
      <div style="flex:1">
        <div style="font-weight:bold">${s.nom}</div>
        <div style="font-size:0.8rem;color:#555">${s.dist.toFixed(1)}km · ${s.Address?.city_line || ''}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById("result").innerHTML = html;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>
