<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel V4 🚀</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
  :root { --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --danger: #f85149; --bg: #0a0c0f; --card: #111318; --border: #1e2229; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; padding: 20px 16px; max-width: 500px; margin: 0 auto; }
  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .search-row, .filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input, select { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
  button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; transition: 0.2s; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; width: 100%; margin-bottom: 10px; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
  .xl { font-size: 2.4rem; font-weight: 900; font-family: 'Barlow Condensed'; }
  .station-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .muted { color: #666; font-size: .85rem; }
  .green { color: var(--green); } .red { color: var(--danger); }
</style>
</head>
<body>

<h1>⛽ CarbuFuel V4</h1>
<p class="muted" style="margin-bottom:20px">Prix officiels en temps réel</p>

<div class="search-row">
  <input id="city" placeholder="Ville ou Code Postal">
  <button class="btn-ghost" onclick="search()">🔍</button>
  <button class="btn-ghost" onclick="gps()">📍</button>
</div>

<div class="filter-row">
  <select id="fuelType">
    <option value="gazole">Gazole</option>
    <option value="sp95">SP95</option>
    <option value="e10">SP95-E10</option>
    <option value="sp98">SP98</option>
    <option value="e85">E85</option>
    <option value="gplc">GPLc</option>
  </select>
  <select id="radiusRange" style="max-width: 100px;">
    <option value="10">10km</option>
    <option value="20" selected>20km</option>
    <option value="50">50km</option>
  </select>
</div>

<button class="btn-primary" onclick="bestDeal()">🔥 TROUVER LE MOINS CHER</button>
<div id="result"></div>

<script>
let userLat = 47.75, userLon = 2.63, stations = []; // Gien par défaut

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

async function search() {
  const q = document.getElementById("city").value;
  if(!q) return;
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  if(d.features.length) {
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude; userLon = p.coords.longitude;
    load();
  }, () => alert("Activez le GPS"));
}

async function load() {
  const fuel = document.getElementById("fuelType").value;
  const rad = document.getElementById("radiusRange").value;
  const res = document.getElementById("result");
  res.innerHTML = "<div class='card muted'>Mise à jour des prix...</div>";

  // URL V2.1 optimisée pour la distance
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=distance(geolocalisation,GEOM'POINT(${userLon} ${userLat})',${rad}km)&limit=50`;

  try {
    const response = await fetch(url);
    const data = await response.json();
    const raw = data.results || [];

    stations = raw.map(s => {
      // Normalisation des prix (cherche prix_gazole, gazole_prix, etc)
      const price = parseFloat(s[`prix_${fuel}`] || s[`${fuel}_prix`] || s[fuel] || 0);
      return {
        nom: s.nom || s.enseigne || "Station",
        ville: s.ville || "",
        adresse: s.adresse || "",
        prix: price,
        lat: s.geolocalisation.lat,
        lon: s.geolocalisation.lon,
        dist: haversine(userLat, userLon, s.geolocalisation.lat, s.geolocalisation.lon)
      };
    }).filter(s => s.prix > 0).sort((a, b) => a.dist - b.dist);

    renderList();
  } catch(e) {
    res.innerHTML = "<div class='card red'>Erreur API : Vérifiez votre connexion.</div>";
  }
}

function renderList() {
  const res = document.getElementById("result");
  if(!stations.length) { res.innerHTML = "<div class='card'>Aucune station trouvée.</div>"; return; }
  
  res.innerHTML = stations.map(s => `
    <div class="card">
      <div class="station-row">
        <div>
          <div style="font-weight:600">${s.nom}</div>
          <div class="muted">${s.dist.toFixed(1)} km - ${s.ville}</div>
        </div>
        <div style="font-weight:900; font-size:1.2rem">${s.prix.toFixed(3)}€</div>
      </div>
    </div>
  `).join('');
}

function bestDeal() {
  if(!stations.length) return;
  const best = [...stations].sort((a, b) => a.prix - b.prix)[0];
  document.getElementById("result").innerHTML = `
    <div class="card" style="border: 2px solid var(--green)">
      <div class="green" style="font-weight:900">MEILLEUR PRIX PROCHE</div>
      <div class="xl green">${best.prix.toFixed(3)}€</div>
      <div style="margin: 10px 0;">${best.nom}</div>
      <div class="muted">${best.adresse}</div>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${best.lat},${best.lon}" target="_blank">
        <button class="btn-primary" style="margin-top:15px">🗺️ Y ALLER MAINTENANT</button>
      </a>
    </div>
  ` + document.getElementById("result").innerHTML;
}
</script>
</body>
</html>
