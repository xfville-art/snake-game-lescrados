<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  /* Styles inchangés */
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">📡 Hors-ligne — données en cache &nbsp;<button onclick="forceUpdate()" style="padding:3px 10px;font-size:.8rem;background:var(--orange);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700">Mettre à jour</button></div>

<h1>⛽ CarbuFuel</h1>
<p class="subtitle">Prix carburants en temps réel · France</p>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou code postal..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn-ghost" onclick="search()">🔍</button>
  <button class="btn-ghost" onclick="gps()">📍</button>
</div>

<div class="radius-row">
  <label>Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal">15km</span>
</div>

<div class="fuel-grid" id="fuelGrid">
  <button class="fuel-btn active" data-fuel="all" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" data-fuel="sp95"   onclick="setFuel('sp95',this)">SP95</button>
  <button class="fuel-btn" data-fuel="sp98"   onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" data-fuel="e10"    onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" data-fuel="gazole" onclick="setFuel('gazole',this)">Gazole</button>
  <button class="fuel-btn" data-fuel="e85"    onclick="setFuel('e85',this)">E85</button>
  <button class="fuel-btn" data-fuel="gplc"   onclick="setFuel('gplc',this)">GPLc</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 Meilleur prix</button>
  <button class="btn-ghost" onclick="scanExpensive()">⚠️ Stations chères</button>
  <button class="btn-ghost" onclick="renderList()">📋 Liste</button>
  <button class="btn-ghost" onclick="renderStats()">📊 Stats</button>
  <button class="btn-ghost" onclick="generateContent()">🎬 Script TikTok</button>
  <button class="btn-ghost" onclick="autoTikTok()">🤖 Auto x4</button>
  <button class="btn-ghost wide" onclick="generateVideo()">🎥 Prompt vidéo IA</button>
</div>

<div id="result"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let userLat = null, userLon = null, userDep = '', stations = [], activeFuel = 'all', sortMode = 'dist';

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    if (reg.waiting) reg.waiting.postMessage('skipWaiting');
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }).catch(() => {});
}

// ── Offline banner ────────────────────────────────────────────────────────────
window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');

// ── Fuel filter ───────────────────────────────────────────────────────────────
function setFuel(fuel, btn) {
  activeFuel = fuel;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Haversine ─────────────────────────────────────────────────────────────────
function haversine(a, b, c, d) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(c - a), dLon = toR(d - b);
  const x = Math.sin(dLat/2)**2 + Math.cos(toR(a)) * Math.cos(toR(c)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function load() {
  if (userLat === null) { showError("Saisis une ville ou active le GPS d'abord."); return; }
  const radius = parseInt(document.getElementById('radius').value);
  const dep = userDep || '';

  let lastError = '';
  for (let i = 0; i < APIS.length; i++) {
    const url = APIS[i](userLat, userLon, radius, dep);
    if (!url) continue;
    showLoader(`Chargement... (source ${i+1}/3)`);
    try {
      const r = await fetch(url);
      if (!r.ok) { lastError = `Source ${i+1}: HTTP ${r.status}`; continue; }
      const d = await r.json();
      const raw = Array.isArray(d) ? d : (d.results || d.data || []);
      if (raw.length === 0) {
        lastError = `Source ${i+1}: aucune station trouvée.`;
        continue;
      }

      // Parsing universel
      stations = raw.map(s => {
        let lat = s.Latitude || s.latitude || s.geolocalisation?.lat || 0;
        let lon = s.Longitude || s.longitude || s.geolocalisation?.lon || 0;
        if (!lat || !lon) return null;
        const dist = haversine(userLat, userLon, lat, lon);
        const nom = s.Nom || s.nom || s.Name || s.enseigne || 'Station';
        const ville = s.Ville || s.ville || s.City || s.cp || '';
        const adresse = s.Adresse || s.adresse || s.Address || '';
        return { ...s, nom, ville, adresse, _lat: lat, _lon: lon, dist };
      }).filter(s => s && s.dist <= radius);

      if (stations.length === 0) {
        lastError = `Aucune station dans ${radius}km (${raw.length} reçues, dep=${dep||'?'})`;
        continue;
      }
      renderList();
      return; // succès
    } catch(e) {
      lastError = `Source ${i+1}: ${e.message}`;
    }
  }
  showError(`Échec toutes sources. Dernier: ${lastError}`);
}

// ── Render: Liste stations ─────────────────────────────────────────────────────
function renderList() {
  if (!requireStations()) return;

  const allP = stations.flatMap(s => Object.values(allPricesOfStation(s)));
  const mean = allP.length ? allP.reduce((a,b) => a+b, 0) / allP.length : 999;

  let sorted = [...stations];
  if (sortMode === 'dist') sorted.sort((a,b) => a.dist - b.dist);
  else if (sortMode === 'price') sorted.sort((a,b) => {
    const pa = activePriceOfStation(a) || 999;
    const pb = activePriceOfStation(b) || 999;
    return pa - pb;
  });
  else sorted.sort((a,b) => (a.nom||'').localeCompare(b.nom||''));

  sorted = sorted.slice(0, 20);

  const sortBar = `
    <div class="sort-row">
      <span class="muted" style="line-height:26px">Tri :</span>
      <button class="sort-btn ${sortMode==='dist'?'active':''}" onclick="setSortMode('dist',this)">📍 Distance</button>
      <button class="sort-btn ${sortMode==='price'?'active':''}" onclick="setSortMode('price',this)">💰 Prix</button>
      <button class="sort-btn ${sortMode==='name'?'active':''}" onclick="setSortMode('name',this)">A→Z Nom</button>
    </div>`;

  const rows = sorted.map(s => {
    const p = activePriceOfStation(s);
    const allP2 = allPricesOfStation(s);
    const isCheap = p !== null && p < mean - 0.05;
    const isExp = p !== null && p > mean + 0.10;
    const mapsUrl = `https://maps.google.com/?q=${s._lat},${s._lon}`;

    const chips = Object.entries(allP2).map(([f,v]) =>
      `<span class="price-chip">${f.toUpperCase()} ${v.toFixed(3)}€</span>`
    ).join('');

    return `
      <div class="station-row">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${s.nom || s.enseigne || 'Station'} <span class="muted">· ${s.dist.toFixed(1)} km</span></div>
          <div class="muted">${s.adresse || ''} ${s.ville || ''}</div>
          <div class="prices-mini">${chips}</div>
          ${isCheap ? '<span class="tag">🔥 Bon plan</span>' : ''}
          ${isExp ? '<span class="tag tag-red">⚠️ Cher</span>' : ''}
        </div>
        <div style="text-align:right;margin-left:10px;flex-shrink:0">
          <div style="font-weight:700;font-size:1.1rem;color:${p!==null?(isCheap?'var(--green)':(isExp?'var(--danger)':'#fff')):'#555'}">
            ${p !== null ? p.toFixed(3)+'€' : '—'}
          </div>
          <a href="${mapsUrl}" target="_blank" style="text-decoration:none">
            <button class="btn-ghost" style="padding:4px 10px;font-size:.75rem;margin-top:4px">🗺️</button>
          </a>
        </div>
      </div>`;
  }).join('');

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big" style="margin-bottom:10px">📋 ${stations.length} stations · ${sorted.length} affichées</div>
      ${sortBar}
      ${rows}
    </div>`;
}

function requireStations() {
  if (!stations.length) {
    showError("Lance d'abord une recherche par ville ou GPS 📍");
    return false;
  }
  return true;
}

// Autres fonctions non modifiées...
</script>
</body>
</html>
