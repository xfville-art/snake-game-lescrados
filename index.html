<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel V2</title>
<style>
body{background:#0a0c0f;color:#fff;font-family:sans-serif;padding:20px}
button{padding:10px;margin:5px}
.card{background:#111;padding:10px;margin:10px 0;border-radius:10px}
</style>
</head>
<body><h1>⛽ CarbuFuel V2</h1><input id="city" placeholder="Ville...">
<button onclick="search()">Rechercher</button>
<button onclick="gps()">GPS</button><div id="result"></div><script>
let userLat=null,userLon=null;

function haversine(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function search(){
const q=document.getElementById("city").value;
const geo=await fetch(`https://api-adresse.data.gouv.fr/search/?q=${q}`);
const data=await geo.json();
const f=data.features[0];
userLat=f.geometry.coordinates[1];
userLon=f.geometry.coordinates[0];
loadStations();
}

function gps(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLon=pos.coords.longitude;
loadStations();
});
}

async function loadStations(){
const res=await fetch("https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=200");
const data=await res.json();

const stations=data.results
.map(s=>{
if(!s.geolocalisation) return null;
const d=haversine(userLat,userLon,s.geolocalisation.lat,s.geolocalisation.lon);
return {...s,dist:d};
})
.filter(s=>s && s.dist<20)
.sort((a,b)=>a.dist-b.dist)
.slice(0,20);

render(stations);
}

function render(stations){
const div=document.getElementById("result");
div.innerHTML="";

stations.forEach(s=>{
const prices=[
{s:"SP95",p:s.prix_sp95},
{s:"SP98",p:s.prix_sp98},
{s:"Diesel",p:s.prix_gazole}
].filter(p=>p.p);

const cheapest=Math.min(...prices.map(p=>p.p));

const el=document.createElement("div");
el.className="card";

el.innerHTML=`
<strong>${s.nom || "Station"}</strong><br>
${s.ville}<br>
${s.dist.toFixed(1)} km<br><br>
${prices.map(p=>`<div style="color:${p.p===cheapest?"#3fb950":"#fff"}">${p.s}: ${p.p}€</div>`).join("")}
`;

 div.appendChild(el);
});
}
</script></body>
</html>
