<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CarbuFuel &#x26FD;</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;600&display=swap');
    :root {
      --orange:#f0a500; --red:#e05c2a; --green:#3fb950; --danger:#f85149;
      --blue:#58a6ff; --bg:#0a0c0f; --card:#111318; --card2:#161b22;
      --border:#1e2229; --text:#e6edf3; --muted:#8b949e;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;
      min-height:100vh;padding:24px 16px 80px;max-width:560px;margin:auto}
    .header{margin-bottom:22px}
    h1{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:900;
      background:linear-gradient(135deg,var(--orange),var(--red));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;line-height:1}
    .subtitle{color:var(--muted);font-size:.82rem;margin-top:4px}
    .search-row{display:flex;gap:8px;margin-bottom:10px}
    input[type=text]{flex:1;padding:12px 16px;background:var(--card);
      border:1.5px solid var(--border);border-radius:12px;color:var(--text);
      font-size:1rem;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
    input[type=text]:focus{border-color:var(--orange)}
    input[type=text]::placeholder{color:#3d4450}
    .icon-btn{width:46px;height:46px;border-radius:12px;border:1.5px solid var(--border);
      background:var(--card);color:var(--text);font-size:1.1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:background .15s,border-color .15s}
    .icon-btn:hover{background:var(--card2);border-color:var(--orange)}
    .icon-btn.active{background:var(--orange);border-color:var(--orange);color:#000}
    .icon-btn:disabled{opacity:.5;cursor:default}
    .radius-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;
      color:var(--muted);font-size:.85rem}
    input[type=range]{flex:1;accent-color:var(--orange);cursor:pointer}
    .radius-val{color:var(--orange);font-weight:700;min-width:38px;text-align:right}
    .fuel-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .fuel-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);
      background:var(--card);color:var(--muted);font-size:.85rem;cursor:pointer;
      font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.3px;
      transition:all .15s}
    .fuel-btn:hover{border-color:var(--orange);color:var(--text)}
    .fuel-btn.active{background:var(--orange);color:#000;border-color:var(--orange)}
    .sort-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;
      font-size:.82rem;color:var(--muted)}
    .sort-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);
      background:transparent;color:var(--muted);font-size:.82rem;cursor:pointer;
      transition:all .15s}
    .sort-btn.active{border-color:var(--orange);color:var(--orange)}
    .sort-btn:disabled{opacity:.35;cursor:default}
    .results-header{display:flex;justify-content:space-between;align-items:center;
      padding:0 2px 10px;font-size:.82rem;color:var(--muted)}
    .count-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;
      padding:3px 10px;font-size:.78rem;color:var(--orange);font-weight:700}
    .station-card{background:var(--card);border:1.5px solid var(--border);
      border-radius:14px;padding:14px 16px;margin-bottom:8px;transition:border-color .2s}
    .station-card:hover{border-color:#2d333b}
    .station-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .station-logo{width:44px;height:44px;border-radius:10px;background:#fff;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
      border:1px solid rgba(255,255,255,.07)}
    .station-logo img{width:100%;height:100%;object-fit:contain;padding:5px}
    .logo-abbr{width:44px;height:44px;border-radius:10px;display:flex;
      align-items:center;justify-content:center;flex-shrink:0;
      font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.5px}
    .station-info{flex:1;min-width:0}
    .station-name{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .station-address{font-size:.78rem;color:var(--muted);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .station-dist{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;
      color:var(--blue);margin-top:3px}
    .fuel-prices{display:flex;flex-wrap:wrap;gap:6px}
    .price-pill{display:flex;flex-direction:column;align-items:center;
      background:rgba(255,255,255,.03);border:1px solid var(--border);
      border-radius:9px;padding:6px 12px;min-width:64px}
    .price-pill.best{border-color:var(--green);background:rgba(63,185,80,.08)}
    .price-fuel-name{font-size:.68rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;
      font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .price-amount{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;
      font-weight:900;color:var(--text);line-height:1.1}
    .price-amount.cheap{color:var(--green)}
    .price-amount.expensive{color:var(--danger)}
    .price-updated{font-size:.6rem;color:#3a404a;margin-top:1px}
    .no-price{font-size:.8rem;color:#3a404a}
    .station-footer{display:flex;justify-content:flex-end;margin-top:10px}
    .maps-link{font-size:.78rem;color:var(--blue);text-decoration:none;
      display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;
      transition:background .15s}
    .maps-link:hover{background:rgba(88,166,255,.1)}
    .loader{display:inline-block;width:16px;height:16px;border:2px solid #2d333b;
      border-top-color:var(--orange);border-radius:50%;
      animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .state-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
      padding:36px 20px;text-align:center;color:var(--muted)}
    .state-card .state-icon{font-size:2.6rem;margin-bottom:10px}
    .state-card p{font-size:.88rem;line-height:1.7}
    .state-card.error{border-color:rgba(248,81,73,.25)}
    .state-card.error p{color:var(--danger)}
    .state-card.loading{border-color:rgba(240,165,0,.15)}

    /* ── Live refresh bar ────────────────────────────────── */
    .live-bar{display:none;align-items:center;justify-content:space-between;
      background:var(--card);border:1.5px solid var(--border);border-radius:12px;
      padding:9px 14px;margin-bottom:14px;font-size:.8rem}
    .live-bar.visible{display:flex}
    .live-left{display:flex;align-items:center;gap:8px;color:var(--muted)}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
      animation:pulse-dot 2s ease-in-out infinite}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .live-dot.stale{background:var(--orange);animation:none}
    .live-countdown{color:var(--orange);font-family:'Barlow Condensed',sans-serif;
      font-weight:700;font-size:.9rem}
    .live-ts{color:var(--muted);font-size:.72rem}
    .refresh-btn{background:transparent;border:1.5px solid var(--border);border-radius:8px;
      color:var(--muted);font-size:.78rem;padding:4px 10px;cursor:pointer;
      display:flex;align-items:center;gap:5px;transition:all .15s}
    .refresh-btn:hover{border-color:var(--orange);color:var(--orange)}
    .refresh-btn.spinning svg{animation:spin .7s linear infinite}
    /* Fraicheur des prix */
    .price-fresh{color:var(--green)}
    .price-recent{color:var(--orange)}
    .price-old{color:var(--danger)}
    .price-updated.fresh{color:#2a5c35}
    .price-updated.recent{color:#6e4a00}
    .price-updated.old{color:#7a1f1b}
    /* Flash si prix change entre 2 refreshs */
    @keyframes flash-up{0%{background:rgba(63,185,80,.3)}100%{background:transparent}}
    @keyframes flash-down{0%{background:rgba(248,81,73,.3)}100%{background:transparent}}
    .price-flash-up{animation:flash-up .8s ease-out}
    .price-flash-down{animation:flash-down .8s ease-out}
  </style>
</head>
<body>

<div class="header">
  <h1>&#x26FD; CarbuFuel</h1>
  <p class="subtitle">Prix carburants en temps r&#233;el &middot; France</p>
</div>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou code postal&#x2026;"
         autocomplete="off" autocorrect="off" spellcheck="false"
         onkeydown="if(event.key==='Enter')searchCity()">
  <button class="icon-btn" id="searchBtn" onclick="searchCity()" title="Rechercher">&#x1F50D;</button>
  <button class="icon-btn" id="gpsBtn"    onclick="gps()"        title="Me localiser">&#x1F4CD;</button>
</div>

<div class="radius-row">
  <label for="radius">Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15"
         oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal" class="radius-val">15km</span>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" onclick="setFuel('Gazole',this)">Gazole</button>
  <button class="fuel-btn" onclick="setFuel('SP95',this)">SP95</button>
  <button class="fuel-btn" onclick="setFuel('E10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('SP98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('E85',this)">E85</button>
  <button class="fuel-btn" onclick="setFuel('GPLc',this)">GPL</button>
</div>

<div class="sort-row">
  <span>Trier par&nbsp;:</span>
  <button class="sort-btn active" id="sortDist"  onclick="setSort('dist')">&#x1F4CD; Distance</button>
  <button class="sort-btn"        id="sortPrice" onclick="setSort('price')" disabled>&#x1F4B0; Prix</button>
</div>

<div class="live-bar" id="liveBar">
  <div class="live-left">
    <div class="live-dot" id="liveDot"></div>
    <span>Prochain refresh dans <span id="liveCountdown" class="live-countdown">15:00</span></span>
    <span class="live-ts" id="liveTs"></span>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()" title="Rafraichir maintenant">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>
    Rafraichir
  </button>
</div>

<div id="result">
  <div class="state-card">
    <div class="state-icon">&#x26FD;</div>
    <p>Entrez une ville, un code postal<br>ou activez le GPS pour d&#233;marrer.</p>
  </div>
</div>

<script>
'use strict';

/* ── Etat global ─────────────────────────────────────────────────────────── */
var userLat    = null, userLon = null;
var stations   = [];         // stations normalisees affichees
var prevPrices = {};         // {stationId_shortName: amount} pour detecter les changements
var activeFuel = 'all';
var sortMode   = 'dist';
var isLoading  = false;
/* ── Live refresh ─────────────────────────────────────────── */
var REFRESH_INTERVAL = 15 * 60;  // secondes
var refreshTimer     = null;      // setInterval countdown
var countdownLeft    = REFRESH_INTERVAL;

/* ── Marques ─────────────────────────────────────────────────────────────── */
var BRAND_MAP = {
  'total':       {bg:'#c8102e',c:'#fff',domain:'totalenergies.fr'},
  'leclerc':     {bg:'#003ca6',c:'#f7c300',domain:'e.leclerc'},
  'carrefour':   {bg:'#004a97',c:'#fff',domain:'carrefour.fr'},
  'intermarche': {bg:'#e30613',c:'#fff',domain:'intermarche.com'},
  'intermar':    {bg:'#e30613',c:'#fff',domain:'intermarche.com'},
  'systeme u':   {bg:'#c00000',c:'#fff',domain:'magasins-u.com'},
  'super u':     {bg:'#c00000',c:'#fff',domain:'magasins-u.com'},
  'hyper u':     {bg:'#c00000',c:'#fff',domain:'magasins-u.com'},
  'auchan':      {bg:'#e10600',c:'#fff',domain:'auchan.fr'},
  'esso':        {bg:'#003087',c:'#fff',domain:'esso.fr'},
  'bp':          {bg:'#007a33',c:'#fff',domain:'bp.com'},
  'shell':       {bg:'#fbce07',c:'#cc0000',domain:'shell.fr'},
  'avia':        {bg:'#e30613',c:'#fff',domain:'avia-france.fr'},
  'casino':      {bg:'#c41230',c:'#fff',domain:'casino.fr'},
  'cora':        {bg:'#e30613',c:'#fff',domain:'cora.fr'}
};

/* ── getPrice : teste toutes les variantes possibles de l'API ────────────── */
function getPrice(f) {
  if (!f) return null;
  // Variante capitalisee : Price.amount
  if (f.Price && f.Price.amount != null)
    return {amount: +f.Price.amount, updatedAt: f.Price.last_update || null};
  // Variante minuscule : price.amount
  if (f.price && f.price.amount != null)
    return {amount: +f.price.amount, updatedAt: f.price.last_update || null};
  // Price est directement un nombre
  if (typeof f.Price === 'number') return {amount: +f.Price, updatedAt: null};
  if (typeof f.price === 'number') return {amount: +f.price, updatedAt: null};
  // Price.value au lieu de Price.amount
  if (f.Price && f.Price.value != null)
    return {amount: +f.Price.value, updatedAt: f.Price.last_update || null};
  if (f.price && f.price.value != null)
    return {amount: +f.price.value, updatedAt: f.price.last_update || null};
  // Variantes francophones
  if (f.prix    != null) return {amount: +f.prix,     updatedAt: f.maj || null};
  if (f.valeur  != null) return {amount: +f.valeur,   updatedAt: null};
  // Autres variantes generiques
  if (f.value   != null) return {amount: +f.value,    updatedAt: null};
  if (f.amount  != null) return {amount: +f.amount,   updatedAt: null};
  if (f.unitPrice != null) return {amount: +f.unitPrice, updatedAt: null};
  return null;
}

function canonicalFuelShortName(name) {
  var raw = String(name || '').trim();
  var key = raw.toUpperCase().replace(/\s+/g, '').replace(/_/g, '-');
  if (key === 'SP95-E10' || key === 'SP95E10' || key === 'E10') return 'E10';
  if (key === 'GPL' || key === 'GPLC') return 'GPLc';
  if (key === 'DIESEL' || key === 'GASOIL') return 'Gazole';
  return raw;
}

/* ── normalizeFuels : structure unifiee depuis n'importe quelle API ──────── */
function normalizeFuels(rawFuels) {
  var byFuel = {};
  rawFuels.forEach(function(f) {
    var p = getPrice(f);
    if (!p || p.amount === null || !isFinite(p.amount) || p.amount <= 0) return;

    var shortName = canonicalFuelShortName(f.shortName || f.short_name || f.name || String(f.id || '?'));
    var name = f.name || shortName || '';
    var existing = byFuel[shortName];

    if (!existing || p.amount < existing.amount) {
      byFuel[shortName] = {
        shortName: shortName,
        name: name,
        amount: p.amount,
        updatedAt: p.updatedAt
      };
    }
  });
  return Object.values(byFuel);
}

/* ── Live refresh ─────────────────────────────────────────────────────────────────────── */

function startLiveRefresh() {
  stopLiveRefresh();
  countdownLeft = REFRESH_INTERVAL;
  updateLiveBar();
  refreshTimer = setInterval(function() {
    countdownLeft--;
    if (countdownLeft <= 0) {
      countdownLeft = REFRESH_INTERVAL;
      refreshPricesOnly();  // rafraichit uniquement les prix, pas la liste
    }
    updateLiveBar();
  }, 1000);
}

function stopLiveRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

function updateLiveBar() {
  var bar = document.getElementById('liveBar');
  var cd  = document.getElementById('liveCountdown');
  var dot = document.getElementById('liveDot');
  if (!bar) return;
  bar.classList.add('visible');
  var m = Math.floor(countdownLeft / 60);
  var s = countdownLeft % 60;
  cd.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  // Dot jaune dans les 30 dernieres secondes
  dot.className = 'live-dot' + (countdownLeft <= 30 ? ' stale' : '');
}

function setLastFetchTime() {
  var el = document.getElementById('liveTs');
  if (!el) return;
  var now = new Date();
  el.textContent = '· mis à jour ' +
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0') + ':' +
    now.getSeconds().toString().padStart(2,'0');
}

function manualRefresh() {
  if (isLoading || !userLat) return;
  var btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');
  countdownLeft = REFRESH_INTERVAL;
  refreshPricesOnly().then(function() {
    if (btn) btn.classList.remove('spinning');
  });
}

/* Rafraichit seulement les prix des stations deja affichees (pas le /around/) */
async function refreshPricesOnly() {
  if (isLoading || stations.length === 0) return;
  try {
    var BASE = 'https://api.prix-carburants.2aaz.fr/station/';
    var promises = stations.map(function(s) {
      return fetch(BASE + s.id)
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function()  { return null; });
    });
    var details = await Promise.all(promises);

    /* Sauvegarde des anciens prix pour comparaison */
    var oldPrices = {};
    stations.forEach(function(s) {
      s.fuels.forEach(function(f) {
        oldPrices[s.id + '_' + f.shortName] = f.amount;
      });
    });

    /* Mise a jour des fuels en place */
    for (var i = 0; i < stations.length; i++) {
      var det = details[i];
      if (!det || !Array.isArray(det.Fuels)) continue;
      stations[i].fuels = normalizeFuels(det.Fuels);
    }

    setLastFetchTime();
    renderWithDiff(oldPrices);  // render avec detection des changements
  } catch(e) {
    console.warn('Refresh silencieux echoue:', e.message);
  }
}

/* render() avec animation flash sur les prix changes */
function renderWithDiff(oldPrices) {
  render();  // render normal d'abord
  if (!oldPrices) return;
  /* Apres render, flasher les pills dont le prix a change */
  setTimeout(function() {
    stations.forEach(function(s) {
      s.fuels.forEach(function(f) {
        var key = s.id + '_' + f.shortName;
        var oldAmt = oldPrices[key];
        if (oldAmt == null || oldAmt === f.amount) return;
        /* Trouver la pill dans le DOM — on cherche par data-key */
        var pill = document.querySelector('[data-key="' + key + '"]');
        if (!pill) return;
        var cls = f.amount < oldAmt ? 'price-flash-up' : 'price-flash-down';
        pill.classList.remove('price-flash-up', 'price-flash-down');
        void pill.offsetWidth;  // reflow pour reset animation
        pill.classList.add(cls);
      });
    });
  }, 50);
}

/* ── Geocoding ───────────────────────────────────────────────────────────── */
async function searchCity() {
  var q = document.getElementById('city').value.trim();
  if (!q) return;
  setSearching(true);
  try {
    var r = await fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(q) + '&limit=1');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var d = await r.json();
    if (!d.features || !d.features.length) {
      showState('&#x1F50D;', 'Ville ou code postal non trouv&#233;. Essayez autrement.'); return;
    }
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch(e) {
    showState('&#x26A0;&#xFE0F;', 'Erreur r&#233;seau lors de la recherche.', true);
  } finally { setSearching(false); }
}

function gps() {
  if (!navigator.geolocation) {
    showState('&#x1F4F5;', 'G&#233;olocalisation non disponible sur ce navigateur.'); return;
  }
  var btn = document.getElementById('gpsBtn');
  btn.textContent = '\u23F3'; btn.classList.add('active'); btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude; userLon = pos.coords.longitude;
      resetGpsBtn(); load();
    },
    function(err) {
      resetGpsBtn();
      var msgs = {
        1:'Permission refus&#233;e. Autorisez la localisation dans les param&#232;tres.',
        2:'Position indisponible. V&#233;rifiez que le GPS est activ&#233;.',
        3:'D&#233;lai d&#233;pass&#233;. R&#233;essayez dans quelques instants.'
      };
      showState('&#x1F4CD;', msgs[err.code] || 'Impossible de r&#233;cup&#233;rer votre position.', true);
    },
    {timeout:12000, maximumAge:60000, enableHighAccuracy:false}
  );
}
function resetGpsBtn() {
  var btn = document.getElementById('gpsBtn');
  btn.textContent = '\uD83D\uDCCD'; btn.classList.remove('active'); btn.disabled = false;
}
function setSearching(on) {
  var btn = document.getElementById('searchBtn');
  btn.textContent = on ? '\u23F3' : '\uD83D\uDD0D'; btn.disabled = on;
}

/* ── Chargement API 2aaz ─────────────────────────────────────────────────── */
async function load() {
  if (isLoading) return;
  stopLiveRefresh();  // reset le timer a chaque nouvelle recherche
  isLoading = true;
  var radiusM = parseInt(document.getElementById('radiusVal').textContent) * 1000;
  // Recalcul propre du rayon en metres
  radiusM = parseInt(document.getElementById('radius').value) * 1000;
  showLoading();
  try {
    /* ETAPE 1 : liste des stations autour (sans prix) */
    var urlAround = 'https://api.prix-carburants.2aaz.fr/stations/around/' + userLat + ',' + userLon + '/?m=' + radiusM;
    var r1 = await fetch(urlAround);
    if (!r1.ok) throw new Error('HTTP ' + r1.status);
    var listRaw = await r1.json();

    if (!Array.isArray(listRaw) || listRaw.length === 0) {
      showState('\uD83C\uDFDC\uFE0F',
        'Aucune station dans ' + document.getElementById('radiusVal').textContent + '.<br>Essayez d\'agrandir le rayon.');
      return;
    }

    /* On prend au max 20 stations (les plus proches, deja triees par l'API) */
    var slice = listRaw.slice(0, 20);

    /* ETAPE 2 : fetch /station/{id} en parallele pour obtenir les prix */
    var BASE = 'https://api.prix-carburants.2aaz.fr/station/';
    var detailPromises = slice.map(function(s) {
      return fetch(BASE + s.id)
        .then(function(res) { return res.ok ? res.json() : null; })
        .catch(function()   { return null; });
    });
    showLoading('Chargement des prix (' + slice.length + ' stations)\u2026');
    var details = await Promise.all(detailPromises);

    /* ETAPE 3 : fusion metadata (around) + prix (detail) */
    stations = [];
    for (var i = 0; i < slice.length; i++) {
      var s    = slice[i];
      var det  = details[i];
      if (!s.Coordinates || !s.Coordinates.latitude) continue;

      var brandName = (s.Brand && s.Brand.name) ? s.Brand.name : (s.name || 'Station');
      /* Fuels depuis le detail si disponible, sinon fallback sur l'objet around */
      var rawFuels = (det && Array.isArray(det.Fuels) && det.Fuels.length > 0)
        ? det.Fuels
        : (Array.isArray(s.Fuels) ? s.Fuels : []);

      stations.push({
        id:      s.id,
        nom:     brandName,
        brand:   brandName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(),
        lat:     s.Coordinates.latitude,
        lon:     s.Coordinates.longitude,
        address: (s.Address && s.Address.street_line) ? s.Address.street_line : '',
        city:    (s.Address && s.Address.city_line)   ? s.Address.city_line   : '',
        fuels:   normalizeFuels(rawFuels),
        dist:    haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude)
      });
    }

    setLastFetchTime();
    startLiveRefresh();
    render();
  } catch(e) {
    showState('&#x274C;', 'Erreur lors du chargement. (' + e.message + ')', true);
  } finally { isLoading = false; }
}

/* ── Rendu ───────────────────────────────────────────────────────────────── */
function render() {
  var filtered = stations;
  if (activeFuel !== 'all') {
    filtered = stations.filter(function(s) {
      return s.fuels.some(function(f) { return f.shortName === activeFuel; });
    });
  }

  if (filtered.length === 0) {
    showState('&#x1F50D;',
      activeFuel === 'all'
        ? 'Aucune station trouv&#233;e.'
        : 'Aucune station ne propose du <strong>' + activeFuel + '</strong> dans ce rayon.');
    return;
  }

  /* Min / max pour coloration */
  var minPrice = null, maxPrice = null;
  if (activeFuel !== 'all') {
    var prices = filtered.map(function(s) {
      var f = s.fuels.find(function(f) { return f.shortName === activeFuel; });
      return f ? f.amount : null;
    }).filter(function(p) { return p != null; });
    if (prices.length > 1) {
      minPrice = Math.min.apply(null, prices);
      maxPrice = Math.max.apply(null, prices);
    }
  }

  /* Tri */
  var sorted = filtered.slice();
  if (sortMode === 'price' && activeFuel !== 'all') {
    sorted.sort(function(a, b) {
      var fa = a.fuels.find(function(f){return f.shortName===activeFuel;});
      var fb = b.fuels.find(function(f){return f.shortName===activeFuel;});
      return ((fa&&fa.amount)||Infinity) - ((fb&&fb.amount)||Infinity);
    });
  } else {
    sorted.sort(function(a,b){ return a.dist - b.dist; });
  }

  var radiusLabel = document.getElementById('radiusVal').textContent;
  var html = '<div class="results-header"><span>' +
    sorted.length + ' station' + (sorted.length>1?'s':'') + ' trouv' + (sorted.length>1?'ées':'ée') +
    '</span><span class="count-badge">' + radiusLabel + '</span></div>';

  for (var i = 0; i < sorted.length; i++) html += buildCard(sorted[i], minPrice, maxPrice);
  document.getElementById('result').innerHTML = html;
}

function buildCard(s, minPrice, maxPrice) {
  var address = [s.address, s.city].filter(Boolean).join(' \u00B7 ');
  var mapsUrl = 'https://maps.google.com/?q=' + s.lat + ',' + s.lon;

  var fuelRows = activeFuel === 'all'
    ? s.fuels.slice()
    : s.fuels.filter(function(f){ return f.shortName === activeFuel; });
  fuelRows.sort(function(a,b){ return (a.amount||0)-(b.amount||0); });

  var pricesHtml = '';
  if (fuelRows.length === 0) {
    pricesHtml = '<span class="no-price">Prix non disponibles</span>';
  } else {
    for (var i=0; i<fuelRows.length; i++) {
      var f = fuelRows[i];
      var price = f.amount;
      var isBest = activeFuel !== 'all' && price === minPrice && minPrice !== maxPrice;
      var cls = '';
      if (minPrice !== null && maxPrice !== null) {
        if (price <= minPrice) cls = ' cheap';
        else if (price >= maxPrice) cls = ' expensive';
      }
      var age       = f.updatedAt ? formatAge(f.updatedAt) : '';
      var freshClass = f.updatedAt ? getFreshClass(f.updatedAt) : '';
      var dataKey    = 'data-key="' + s.id + '_' + escHtml(f.shortName) + '"';
      pricesHtml += '<div class="price-pill' + (isBest?' best':'') + '" ' + dataKey + '>' +
        '<span class="price-fuel-name">' + escHtml(f.shortName) + '</span>' +
        '<span class="price-amount' + cls + '">' + price.toFixed(3) + '\u20AC</span>' +
        (age ? '<span class="price-updated ' + freshClass + '">' + age + '</span>' : '') +
        '</div>';
    }
  }

  return '<div class="station-card">' +
    '<div class="station-top">' +
      buildLogo(s.brand, s.nom) +
      '<div class="station-info">' +
        '<div class="station-name">' + escHtml(s.nom) + '</div>' +
        (address ? '<div class="station-address">' + escHtml(address) + '</div>' : '') +
        '<div class="station-dist">\uD83D\uDCCD ' + s.dist.toFixed(1) + ' km</div>' +
      '</div>' +
    '</div>' +
    '<div class="fuel-prices">' + pricesHtml + '</div>' +
    '<div class="station-footer">' +
      '<a class="maps-link" href="' + mapsUrl + '" target="_blank" rel="noopener noreferrer">' +
        '\uD83D\uDDFA\uFE0F Ouvrir dans Maps' +
      '</a>' +
    '</div>' +
  '</div>';
}

/* ── Logo ────────────────────────────────────────────────────────────────── */
function buildLogo(brandNorm, nom) {
  var style = {bg:'#1e2229', c:'#7d8590', domain:''};
  var keys = Object.keys(BRAND_MAP);
  for (var i=0; i<keys.length; i++) {
    if (brandNorm.indexOf(keys[i]) !== -1) { style = BRAND_MAP[keys[i]]; break; }
  }
  var abbr = nom.replace(/[^a-zA-Z\u00C0-\u024F]/g,'').slice(0,2).toUpperCase() || '??';
  if (style.domain) {
    return '<div class="station-logo">' +
      '<img src="https://logo.clearbit.com/' + style.domain + '"' +
      ' alt="' + escHtml(abbr) + '" loading="lazy"' +
      ' data-abbr="' + escHtml(abbr) + '"' +
      ' data-bg="' + escHtml(style.bg) + '"' +
      ' data-fg="' + escHtml(style.c) + '"' +
      ' onerror="imgFallback(this)">' +
      '</div>';
  }
  return '<div class="logo-abbr" style="background:' + style.bg + ';color:' + style.c + '">' + abbr + '</div>';
}

function imgFallback(img) {
  var abbr = img.dataset.abbr || '?';
  var bg   = img.dataset.bg   || '#1e2229';
  var fg   = img.dataset.fg   || '#aaa';
  var w = img.closest('.station-logo');
  if (!w) return;
  var d = document.createElement('div');
  d.className = 'logo-abbr';
  d.style.cssText = 'background:' + bg + ';color:' + fg;
  d.textContent = abbr;
  w.replaceWith(d);
}

/* ── Utilitaires ─────────────────────────────────────────────────────────── */
function haversine(lat1, lon1, lat2, lon2) {
  var R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+
        Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
        Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatAge(iso) {
  try {
    var h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 1)  return 'maintenant';
    if (h < 24) return Math.floor(h) + 'h';
    return Math.floor(h/24) + 'j';
  } catch(e) { return ''; }
}

/* Classe CSS selon l'age du prix : fresh < 2h, recent < 12h, old >= 12h */
function getFreshClass(iso) {
  try {
    var h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 2)  return 'fresh';
    if (h < 12) return 'recent';
    return 'old';
  } catch(e) { return ''; }
}

function showLoading(msg) {
  msg = msg || 'Chargement des stations\u2026';
  document.getElementById('result').innerHTML =
    '<div class="state-card loading"><span class="loader"></span> ' + msg + '</div>';
}
function showState(icon, msg, isError) {
  document.getElementById('result').innerHTML =
    '<div class="state-card' + (isError?' error':'') + '">' +
    '<div class="state-icon">' + icon + '</div><p>' + msg + '</p></div>';
}

/* ── Controles ───────────────────────────────────────────────────────────── */
function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  var pb = document.getElementById('sortPrice');
  pb.disabled = (f === 'all');
  if (f === 'all' && sortMode === 'price') setSort('dist');
  else if (stations.length) render();
}
function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortDist').classList.toggle('active',  mode==='dist');
  document.getElementById('sortPrice').classList.toggle('active', mode==='price');
  if (stations.length) render();
}

/* ── Raccourci PWA ───────────────────────────────────────────────────────── */
if (new URLSearchParams(location.search).get('action') === 'gps')
  window.addEventListener('DOMContentLoaded', function(){ gps(); });

/* ── Service Worker ──────────────────────────────────────────────────────── */
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
