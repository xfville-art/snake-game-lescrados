<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CarbuFuel · Prix carburants en temps réel</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #11161f;
      --bg-card: #0d121c;
      --border-subtle: #1e2532;
      --border-medium: #2a3342;
      --accent-primary: #f59e0b;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      --accent-info: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --gradient-hero: linear-gradient(135deg, #f59e0b 0%, #dc2626 100%);
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, 'Inter', sans-serif;
      padding: 20px 16px 100px;
      line-height: 1.5;
    }

    .container { max-width: 640px; margin: 0 auto; }

    .hero { text-align: center; margin-bottom: 28px; }
    .hero-icon { font-size: 3.5rem; margin-bottom: 8px; }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: var(--text-tertiary); font-size: 0.85rem; }

    .search-card, .station-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 20px;
      transition: var(--transition-base);
    }
    .station-card:hover {
      border-color: var(--border-medium);
      transform: translateY(-2px);
    }

    .search-group { display: flex; gap: 12px; margin-bottom: 20px; }
    .input-wrapper { flex: 1; position: relative; }
    .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); }
    input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: var(--accent-primary); }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      cursor: pointer;
      font-size: 1.2rem;
      transition: var(--transition-base);
    }
    .icon-btn:hover { border-color: var(--accent-primary); }
    .icon-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .radius-section { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
    }
    .radius-value {
      background: var(--bg-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-weight: 600;
      color: var(--accent-primary);
    }

    .fuel-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .fuel-btn {
      padding: 8px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-base);
    }
    .fuel-btn.active {
      background: var(--gradient-hero);
      border-color: transparent;
      color: white;
    }

    .sort-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sort-group { display: flex; gap: 8px; }
    .sort-btn {
      padding: 6px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition-base);
    }
    .sort-btn.active { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(245,158,11,0.1); }
    .sort-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .live-bar {
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(220,38,38,0.08));
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .live-left { display: flex; align-items: center; gap: 12px; }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.5; transform: scale(0.8); } }
    .live-countdown { font-weight: 700; color: var(--accent-primary); }
    .refresh-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition-base);
    }
    .refresh-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    /* Styles pour les logos */
    .station-logo {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      transition: var(--transition-base);
    }
    .station-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }
    .station-logo.fallback {
      background: var(--bg-secondary);
    }
    .logo-fallback {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }
    
    .station-header { display: flex; gap: 14px; margin-bottom: 16px; }
    .station-info { flex: 1; }
    .station-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .station-address { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 4px; }
    .station-distance {
      font-size: 0.7rem;
      color: var(--accent-info);
      background: rgba(59,130,246,0.1);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      display: inline-block;
    }

    .fuel-prices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .price-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 12px;
      transition: var(--transition-base);
    }
    .price-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .price-fuel-name {
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .price-rank {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.3);
      color: var(--text-tertiary);
    }
    .price-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .price-amount {
      font-size: 1.4rem;
      font-weight: 800;
    }
    .price-amount.cheap { color: var(--accent-success); }
    .price-amount.expensive { color: var(--accent-danger); }
    .price-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-best {
      background: rgba(16,185,129,0.2);
      color: var(--accent-success);
      border: 1px solid var(--accent-success);
    }
    .badge-worst {
      background: rgba(239,68,68,0.2);
      color: var(--accent-danger);
      border: 1px solid var(--accent-danger);
    }
    .price-bar-container {
      width: 100%;
      height: 6px;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: 8px 0;
    }
    .price-bar {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.5s ease;
    }
    .price-bar.cheap { background: linear-gradient(90deg, var(--accent-success), #34d399); }
    .price-bar.expensive { background: linear-gradient(90deg, var(--accent-danger), #f87171); }
    .price-bar.mid { background: linear-gradient(90deg, var(--accent-warning), #fbbf24); }
    .price-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.7rem;
    }
    .price-updated { color: var(--text-tertiary); }
    .price-updated.fresh { color: var(--accent-success); }
    .price-updated.recent { color: var(--accent-warning); }
    .price-updated.old { color: var(--accent-danger); }
    .no-price-message {
      text-align: center;
      padding: 20px;
      color: var(--text-tertiary);
      font-style: italic;
    }
    
    .station-footer { display: flex; justify-content: flex-end; }
    .maps-link {
      color: var(--accent-info);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      transition: var(--transition-base);
    }
    .maps-link:hover { background: rgba(59,130,246,0.1); }

    .state-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 48px 24px;
      text-align: center;
    }
    .state-card.error { border-color: var(--accent-danger); }
    .state-card.error p { color: var(--accent-danger); }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @keyframes flash-up { 0% { background: rgba(16,185,129,0.3); } 100% { background: transparent; } }
    @keyframes flash-down { 0% { background: rgba(239,68,68,0.3); } 100% { background: transparent; } }
    .price-flash-up { animation: flash-up 0.6s ease-out; }
    .price-flash-down { animation: flash-down 0.6s ease-out; }
    
    @media (max-width: 480px) {
      body { padding: 16px 12px 80px; }
      h1 { font-size: 2rem; }
      .price-amount { font-size: 1.2rem; }
      .station-logo, .logo-fallback { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-icon">⛽</div>
    <h1>CarbuFuel</h1>
    <p class="subtitle">Prix carburants en temps réel · France</p>
  </div>
  
  <div class="search-card">
    <div class="search-group">
      <div class="input-wrapper">
        <span class="input-icon">📍</span>
        <input type="text" id="city" placeholder="Ville, code postal ou adresse" value="Gien" autocomplete="off">
      </div>
      <button class="icon-btn" id="searchBtn" onclick="searchCity()">🔍</button>
      <button class="icon-btn" id="gpsBtn" onclick="gps()">📍</button>
    </div>
    <div class="radius-section">
      <span>⭕ Rayon</span>
      <input type="range" id="radius" min="2" max="50" value="15" oninput="updateRadius(this.value)">
      <div class="radius-value" id="radiusVal">15 km</div>
    </div>
  </div>
  
  <div class="fuel-grid">
    <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
    <button class="fuel-btn" onclick="setFuel('Gazole',this)">Gazole</button>
    <button class="fuel-btn" onclick="setFuel('SP95',this)">SP95</button>
    <button class="fuel-btn" onclick="setFuel('E10',this)">E10</button>
    <button class="fuel-btn" onclick="setFuel('SP98',this)">SP98</button>
    <button class="fuel-btn" onclick="setFuel('E85',this)">E85</button>
    <button class="fuel-btn" onclick="setFuel('GPLc',this)">GPL</button>
  </div>
  
  <div class="sort-section">
    <span>📊 Trier par</span>
    <div class="sort-group">
      <button class="sort-btn active" id="sortDist" onclick="setSort('dist')">Distance</button>
      <button class="sort-btn" id="sortPrice" onclick="setSort('price')" disabled>Prix</button>
    </div>
  </div>
  
  <div class="live-bar" id="liveBar" style="display: none;">
    <div class="live-left">
      <div class="live-dot" id="liveDot"></div>
      <span>Refresh <span id="liveCountdown" class="live-countdown">15:00</span></span>
      <span id="liveTs" style="font-size:0.7rem"></span>
    </div>
    <button class="refresh-btn" onclick="manualRefresh()">🔄 Rafraîchir</button>
  </div>
  
  <div id="result">
    <div class="state-card"><div style="font-size:3rem;margin-bottom:16px">⛽</div><p>Recherchez une ville ou activez la géolocalisation</p></div>
  </div>
</div>

<script>
'use strict';

let userLat = null, userLon = null;
let stations = [];
let activeFuel = 'all';
let sortMode = 'dist';
let isLoading = false;
let refreshTimer = null;
let countdownLeft = 900;
const REFRESH_INTERVAL = 900;

// Base de données des logos officiels des enseignes
const BRAND_LOGOS = {
  // Supermarchés
  'leclerc': { url: 'https://logo.clearbit.com/e.leclerc', bg: '#003ca6', fallbackColor: '#003ca6', domain: 'e.leclerc' },
  'carrefour': { url: 'https://logo.clearbit.com/carrefour.fr', bg: '#004a97', fallbackColor: '#004a97', domain: 'carrefour.fr' },
  'auchan': { url: 'https://logo.clearbit.com/auchan.fr', bg: '#e10600', fallbackColor: '#e10600', domain: 'auchan.fr' },
  'intermarche': { url: 'https://logo.clearbit.com/intermarche.com', bg: '#e30613', fallbackColor: '#e30613', domain: 'intermarche.com' },
  'systeme u': { url: 'https://logo.clearbit.com/magasins-u.com', bg: '#c00000', fallbackColor: '#c00000', domain: 'magasins-u.com' },
  'casino': { url: 'https://logo.clearbit.com/casino.fr', bg: '#c41230', fallbackColor: '#c41230', domain: 'casino.fr' },
  'cora': { url: 'https://logo.clearbit.com/cora.fr', bg: '#e30613', fallbackColor: '#e30613', domain: 'cora.fr' },
  
  // Pétroliers
  'total': { url: 'https://logo.clearbit.com/totalenergies.fr', bg: '#c8102e', fallbackColor: '#c8102e', domain: 'totalenergies.fr' },
  'totalenergies': { url: 'https://logo.clearbit.com/totalenergies.fr', bg: '#c8102e', fallbackColor: '#c8102e', domain: 'totalenergies.fr' },
  'esso': { url: 'https://logo.clearbit.com/esso.fr', bg: '#003087', fallbackColor: '#003087', domain: 'esso.fr' },
  'bp': { url: 'https://logo.clearbit.com/bp.com', bg: '#007a33', fallbackColor: '#007a33', domain: 'bp.com' },
  'shell': { url: 'https://logo.clearbit.com/shell.fr', bg: '#fbce07', fallbackColor: '#fbce07', domain: 'shell.fr' },
  'avia': { url: 'https://logo.clearbit.com/avia-france.fr', bg: '#e30613', fallbackColor: '#e30613', domain: 'avia-france.fr' },
  'elf': { url: 'https://logo.clearbit.com/elf.fr', bg: '#ffcd00', fallbackColor: '#ffcd00', domain: 'elf.fr' },
  
  // Autres
  'agip': { url: 'https://logo.clearbit.com/eni.com', bg: '#0066cc', fallbackColor: '#0066cc', domain: 'eni.com' },
  'eni': { url: 'https://logo.clearbit.com/eni.com', bg: '#0066cc', fallbackColor: '#0066cc', domain: 'eni.com' },
  'socar': { url: 'https://logo.clearbit.com/socar.az', bg: '#00a651', fallbackColor: '#00a651', domain: 'socar.az' },
  'darty': { url: 'https://logo.clearbit.com/darty.com', bg: '#e31837', fallbackColor: '#e31837', domain: 'darty.com' }
};

// Table de correspondance des noms de carburants
const FUEL_NAME_MAP = {
  'E10': 'E10',
  'SP95-E10': 'E10',
  'SP95E10': 'E10',
  'Sans Plomb 95-E10': 'E10',
  '95-E10': 'E10',
  'SP95': 'SP95',
  'Sans Plomb 95': 'SP95',
  '95': 'SP95',
  'SP98': 'SP98',
  'Sans Plomb 98': 'SP98',
  '98': 'SP98',
  'Gazole': 'Gazole',
  'Diesel': 'Gazole',
  'Gasoil': 'Gazole',
  'GO': 'Gazole',
  'E85': 'E85',
  'Superethanol': 'E85',
  'Superéthanol': 'E85',
  'Ethanol': 'E85',
  'GPLc': 'GPLc',
  'GPL': 'GPLc',
  'LPG': 'GPLc'
};

function normalizeFuelName(rawName) {
  if (!rawName) return null;
  const cleanName = rawName.trim().toUpperCase();
  if (FUEL_NAME_MAP[cleanName]) return FUEL_NAME_MAP[cleanName];
  for (let [key, value] of Object.entries(FUEL_NAME_MAP)) {
    if (cleanName.includes(key) || key.includes(cleanName)) return value;
  }
  return cleanName.replace(/\s+/g, '').substring(0, 15);
}

function extractPrice(fuelObj) {
  if (!fuelObj) return null;
  const paths = [
    () => fuelObj.Price?.amount,
    () => fuelObj.price?.amount,
    () => fuelObj.Price?.value,
    () => fuelObj.price?.value,
    () => fuelObj.amount,
    () => fuelObj.value,
    () => fuelObj.prix,
    () => typeof fuelObj === 'number' ? fuelObj : null
  ];
  for (let getter of paths) {
    const val = getter();
    if (val !== undefined && val !== null && !isNaN(val) && val > 0) {
      return {
        amount: parseFloat(val),
        updatedAt: fuelObj.last_update || fuelObj.Price?.last_update || fuelObj.price?.last_update || null
      };
    }
  }
  return null;
}

function normalizeFuels(rawFuels) {
  const byFuel = {};
  if (!Array.isArray(rawFuels)) return [];
  rawFuels.forEach(fuel => {
    const priceData = extractPrice(fuel);
    if (!priceData || priceData.amount <= 0) return;
    let rawName = fuel.shortName || fuel.short_name || fuel.name || '';
    const normalizedName = normalizeFuelName(rawName);
    if (!normalizedName) return;
    if (!byFuel[normalizedName] || priceData.amount < byFuel[normalizedName].amount) {
      byFuel[normalizedName] = {
        shortName: normalizedName,
        amount: priceData.amount,
        updatedAt: priceData.updatedAt,
        originalName: rawName
      };
    }
  });
  return Object.values(byFuel);
}

// Fonction améliorée pour obtenir le logo d'une enseigne
function getBrandLogo(brandName) {
  if (!brandName) return null;
  const normalized = brandName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  
  // Recherche exacte
  if (BRAND_LOGOS[normalized]) return BRAND_LOGOS[normalized];
  
  // Recherche partielle
  for (let [key, value] of Object.entries(BRAND_LOGOS)) {
    if (normalized.includes(key) || key.includes(normalized)) {
      return value;
    }
  }
  return null;
}

function buildLogoElement(brandName, stationName) {
  const brandData = getBrandLogo(brandName);
  const abbr = stationName.replace(/[^a-zA-Z]/g, '').slice(0, 2).toUpperCase() || '??';
  
  if (brandData) {
    // Logo officiel
    return `<div class="station-logo">
      <img src="${brandData.url}" 
           alt="${stationName}"
           data-fallback-bg="${brandData.bg}"
           data-abbr="${abbr}"
           onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'logo-fallback\\' style=\\'background:${brandData.bg};color:white\\'>${abbr}</div>'">
    </div>`;
  } else {
    // Pas de logo trouvé, afficher une abréviation avec couleur générique
    const colors = ['#c8102e', '#003ca6', '#e10600', '#e30613', '#c00000', '#004a97', '#007a33'];
    const color = colors[Math.abs(brandName.length) % colors.length];
    return `<div class="logo-fallback" style="background:${color};color:white">${abbr}</div>`;
  }
}

function updateRadius(val) {
  document.getElementById('radiusVal').textContent = val + ' km';
  if (userLat) load();
}

async function searchCity() {
  const q = document.getElementById('city').value.trim();
  if (!q) return;
  const searchBtn = document.getElementById('searchBtn');
  searchBtn.textContent = '⏳';
  searchBtn.disabled = true;
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
    const d = await r.json();
    if (!d.features || !d.features.length) throw new Error('Ville non trouvée');
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch(e) {
    showState('❌', 'Ville ou code postal non trouvé', true);
  } finally {
    searchBtn.textContent = '🔍';
    searchBtn.disabled = false;
  }
}

function gps() {
  if (!navigator.geolocation) {
    showState('📱', 'Géolocalisation non disponible', true);
    return;
  }
  const gpsBtn = document.getElementById('gpsBtn');
  gpsBtn.textContent = '⏳';
  gpsBtn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      gpsBtn.textContent = '📍';
      gpsBtn.disabled = false;
      load();
    },
    function(err) {
      gpsBtn.textContent = '📍';
      gpsBtn.disabled = false;
      let errorMsg = '';
      switch(err.code) {
        case 1: errorMsg = 'Permission refusée. Activez la localisation.'; break;
        case 2: errorMsg = 'Position indisponible. Vérifiez le GPS.'; break;
        case 3: errorMsg = 'Délai dépassé. Réessayez.'; break;
        default: errorMsg = 'Erreur de géolocalisation.';
      }
      showState('⚠️', errorMsg, true);
    },
    { timeout: 10000, enableHighAccuracy: false }
  );
}

async function load() {
  if (isLoading || !userLat || !userLon) return;
  isLoading = true;
  stopLiveRefresh();
  const radiusM = parseInt(document.getElementById('radius').value) * 1000;
  showLoading('Recherche des stations...');
  
  try {
    const aroundUrl = `https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radiusM}`;
    const response = await fetch(aroundUrl);
    if (!response.ok) throw new Error('Erreur API');
    const list = await response.json();
    if (!Array.isArray(list) || list.length === 0) throw new Error('Aucune station trouvée');
    
    showLoading(`Chargement des prix pour ${Math.min(list.length, 20)} stations...`);
    const slice = list.slice(0, 20);
    const details = await Promise.all(slice.map(s => 
      fetch(`https://api.prix-carburants.2aaz.fr/station/${s.id}`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    
    stations = [];
    for (let i = 0; i < slice.length; i++) {
      const s = slice[i];
      const det = details[i];
      if (!s.Coordinates || !s.Coordinates.latitude) continue;
      
      let fuels = [];
      if (det && det.Fuels && Array.isArray(det.Fuels)) fuels = normalizeFuels(det.Fuels);
      if (fuels.length === 0 && s.Fuels && Array.isArray(s.Fuels)) fuels = normalizeFuels(s.Fuels);
      
      const brandName = (s.Brand && s.Brand.name) ? s.Brand.name : (s.name || 'Station Service');
      
      stations.push({
        id: s.id,
        nom: brandName,
        brand: brandName,
        lat: s.Coordinates.latitude,
        lon: s.Coordinates.longitude,
        address: (s.Address && s.Address.street_line) || '',
        city: (s.Address && s.Address.city_line) || '',
        fuels: fuels,
        dist: haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude)
      });
    }
    
    if (stations.length === 0) throw new Error('Aucune station avec prix disponibles');
    startLiveRefresh();
    render();
  } catch(e) {
    console.error('Erreur load:', e);
    showState('⚠️', e.message || 'Erreur de chargement', true);
  } finally {
    isLoading = false;
  }
}

function render() {
  let filtered = stations;
  if (activeFuel !== 'all') {
    filtered = stations.filter(s => s.fuels.some(f => f.shortName === activeFuel));
  }
  
  if (!filtered.length) {
    const availableFuels = new Set();
    stations.forEach(s => s.fuels.forEach(f => availableFuels.add(f.shortName)));
    const availableList = Array.from(availableFuels).join(', ');
    const msg = activeFuel === 'all' 
      ? `Aucune station avec prix disponibles dans ce rayon`
      : `Aucune station proposant du "${activeFuel}" avec prix disponibles. Carburants trouvés : ${availableList || 'aucun'}`;
    showState('⛽', msg, false);
    return;
  }
  
  const fuelStats = {};
  filtered.forEach(s => {
    s.fuels.forEach(f => {
      if (activeFuel !== 'all' && f.shortName !== activeFuel) return;
      if (!fuelStats[f.shortName]) fuelStats[f.shortName] = [];
      fuelStats[f.shortName].push({ amount: f.amount, stationId: s.id });
    });
  });
  
  Object.keys(fuelStats).forEach(fuel => {
    fuelStats[fuel].sort((a, b) => a.amount - b.amount);
  });
  
  const sorted = [...filtered].sort((a, b) => {
    if (sortMode === 'price' && activeFuel !== 'all') {
      const pa = a.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      const pb = b.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      return pa - pb;
    }
    return a.dist - b.dist;
  });
  
  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:16px">
    <span style="color:var(--text-secondary)">${sorted.length} station${sorted.length>1?'s':''} avec prix</span>
    <span style="background:var(--bg-secondary);padding:4px 12px;border-radius:var(--radius-full);font-size:0.75rem;color:var(--accent-primary)">${document.getElementById('radiusVal').textContent}</span>
  </div>`;
  
  sorted.forEach(s => html += buildCard(s, fuelStats));
  document.getElementById('result').innerHTML = html;
  document.getElementById('liveBar').style.display = 'flex';
}

function buildCard(s, fuelStats) {
  const address = [s.address, s.city].filter(Boolean).join(' · ');
  const mapsUrl = `https://maps.google.com/?q=${s.lat},${s.lon}`;
  const fuelsList = activeFuel === 'all' ? s.fuels : s.fuels.filter(f => f.shortName === activeFuel);
  
  let pricesHtml = '';
  if (fuelsList.length === 0) {
    pricesHtml = '<div class="no-price-message">📊 Prix non disponibles pour ce carburant</div>';
  } else {
    fuelsList.forEach(f => {
      const stats = fuelStats[f.shortName];
      const rank = stats ? stats.findIndex(item => item.stationId === s.id) + 1 : 0;
      const total = stats ? stats.length : 0;
      const isBest = rank === 1 && total > 1;
      const isWorst = rank === total && total > 1;
      const percentPosition = total > 1 ? ((rank - 1) / (total - 1)) * 100 : 50;
      const barColor = percentPosition < 33 ? 'cheap' : (percentPosition > 66 ? 'expensive' : 'mid');
      const age = f.updatedAt ? formatAge(f.updatedAt) : '';
      const freshClass = f.updatedAt ? getFreshClass(f.updatedAt) : '';
      
      pricesHtml += `
        <div class="price-item" data-key="${s.id}_${f.shortName}">
          <div class="price-header">
            <span class="price-fuel-name">${escapeHtml(f.shortName)}</span>
            <span class="price-rank">${rank > 0 ? `#${rank}/${total}` : ''}</span>
          </div>
          <div class="price-main">
            <span class="price-amount ${isBest ? 'cheap' : (isWorst ? 'expensive' : '')}">${f.amount.toFixed(3)}€</span>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${isBest ? '<span class="price-badge badge-best">🏆 Meilleur prix</span>' : ''}
              ${isWorst ? '<span class="price-badge badge-worst">⚠️ Plus cher</span>' : ''}
            </div>
          </div>
          ${total > 1 ? `
          <div class="price-bar-container">
            <div class="price-bar ${barColor}" style="width: ${percentPosition}%"></div>
          </div>
          <div class="price-footer">
            <span class="price-updated ${freshClass}">${age ? `🕐 ${age}` : ''}</span>
            <span style="color:var(--text-tertiary)">${Math.round(percentPosition)}% des stations</span>
          </div>
          ` : `
          <div class="price-footer">
            <span class="price-updated ${freshClass}">${age ? `🕐 ${age}` : ''}</span>
          </div>
          `}
        </div>
      `;
    });
  }
  
  return `<div class="station-card">
    <div class="station-header">
      ${buildLogoElement(s.brand, s.nom)}
      <div class="station-info">
        <div class="station-name">${escapeHtml(s.nom)}</div>
        ${address ? `<div class="station-address">📍 ${escapeHtml(address)}</div>` : ''}
        <div class="station-distance">📏 ${s.dist.toFixed(1)} km</div>
      </div>
    </div>
    <div class="fuel-prices">${pricesHtml}</div>
    <div class="station-footer">
      <a class="maps-link" href="${mapsUrl}" target="_blank">🗺️ Ouvrir dans Maps →</a>
    </div>
  </div>`;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function formatAge(iso) {
  try {
    const h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 1) return 'maintenant';
    if (h < 24) return `${Math.floor(h)}h`;
    return `${Math.floor(h/24)}j`;
  } catch(e) { return ''; }
}

function getFreshClass(iso) {
  try {
    const h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 2) return 'fresh';
    if (h < 12) return 'recent';
    return 'old';
  } catch(e) { return ''; }
}

function startLiveRefresh() {
  stopLiveRefresh();
  countdownLeft = REFRESH_INTERVAL;
  updateLiveBar();
  refreshTimer = setInterval(function() {
    countdownLeft--;
    if (countdownLeft <= 0) {
      countdownLeft = REFRESH_INTERVAL;
      refreshPricesOnly();
    }
    updateLiveBar();
  }, 1000);
}

function stopLiveRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
}

function updateLiveBar() {
  const m = Math.floor(countdownLeft / 60);
  const s = countdownLeft % 60;
  document.getElementById('liveCountdown').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('liveTs').textContent = `· ${new Date().toLocaleTimeString()}`;
}

async function refreshPricesOnly() {
  if (!stations.length) return;
  const oldPrices = {};
  stations.forEach(s => s.fuels.forEach(f => oldPrices[`${s.id}_${f.shortName}`] = f.amount));
  const details = await Promise.all(stations.map(s => 
    fetch(`https://api.prix-carburants.2aaz.fr/station/${s.id}`)
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
  ));
  stations.forEach((s, i) => {
    if (details[i] && details[i].Fuels) s.fuels = normalizeFuels(details[i].Fuels);
  });
  render();
  setTimeout(function() {
    for (let key in oldPrices) {
      const [id, fuel] = key.split('_');
      const station = stations.find(s => s.id == id);
      const fuelData = station?.fuels.find(f => f.shortName === fuel);
      if (fuelData && fuelData.amount !== oldPrices[key]) {
        const pill = document.querySelector(`[data-key="${key}"]`);
        if (pill) {
          const cls = fuelData.amount < oldPrices[key] ? 'price-flash-up' : 'price-flash-down';
          pill.classList.add(cls);
          setTimeout(() => pill.classList.remove('price-flash-up', 'price-flash-down'), 600);
        }
      }
    }
  }, 100);
}

async function manualRefresh() {
  if (isLoading || !userLat) return;
  countdownLeft = REFRESH_INTERVAL;
  await refreshPricesOnly();
}

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const priceBtn = document.getElementById('sortPrice');
  priceBtn.disabled = (f === 'all');
  if (f === 'all' && sortMode === 'price') setSort('dist');
  else if (stations.length) render();
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortDist').classList.toggle('active', mode === 'dist');
  document.getElementById('sortPrice').classList.toggle('active', mode === 'price');
  if (stations.length) render();
}

function showLoading(msg) {
  document.getElementById('result').innerHTML = `<div class="state-card"><div class="loader"></div> ${msg}</div>`;
}

function showState(icon, msg, isError) {
  document.getElementById('result').innerHTML = `<div class="state-card${isError ? ' error' : ''}"><div style="font-size:3rem;margin-bottom:16px">${icon}</div><p>${msg}</p></div>`;
}

window.addEventListener('DOMContentLoaded', function() {
  if (document.getElementById('city').value === 'Gien') setTimeout(searchCity, 500);
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
</script>
