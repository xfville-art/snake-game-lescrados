<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500;
    --red: #e05c2a;
    --green: #3fb950;
    --danger: #f85149;
    --bg: #0a0c0f;
    --card: #111318;
    --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 60px;
    max-width: 540px;
    margin: auto;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 20px; }

  .search-row {
    display: flex; gap: 8px; margin-bottom: 12px;
  }

  input[type=text], select {
    flex: 1;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    font-family: 'Barlow', sans-serif;
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--orange); }
  input::placeholder { color: #444; }

  .radius-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .radius-row label { color: #666; font-size: .85rem; white-space: nowrap; }
  input[type=range] {
    flex: 1; accent-color: var(--orange); cursor: pointer;
  }
  .radius-row span { color: var(--orange); font-weight: 700; min-width: 40px; text-align: right; }

  button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: .5px;
    transition: transform .1s, opacity .2s;
    white-space: nowrap;
  }
  button:active { transform: scale(.97); }

  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }
  .btn-ghost:hover { color: #fff; border-color: #444; }

  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .action-grid .wide { grid-column: 1 / -1; }

  .fuel-grid {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
  }
  .fuel-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: #888;
    cursor: pointer;
    font-size: .85rem;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    transition: all .15s;
  }
  .fuel-btn.active {
    background: var(--orange);
    color: #000;
    border-color: var(--orange);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 10px;
    animation: fadeUp .35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .big { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 900; }
  .xl  { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; }
  .green { color: var(--green); }
  .red   { color: var(--danger); }
  .orange { color: var(--orange); }
  .muted { color: #666; font-size: .85rem; }

  .station-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .station-row:last-child { border-bottom: none; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: .75rem;
    font-weight: 700;
    background: #1a2a1a;
    color: var(--green);
    margin-top: 4px;
  }
  .tag-red {
    background: #2a1a1a;
    color: var(--danger);
  }

  .prices-mini {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .price-chip {
    padding: 2px 7px;
    border-radius: 5px;
    font-size: .78rem;
    font-weight: 600;
    background: #1a1e25;
    color: #ccc;
    border: 1px solid var(--border);
  }

  textarea {
    width: 100%;
    background: #0d0f12;
    color: #3fb950;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'Barlow', sans-serif;
    font-size: .85rem;
    resize: vertical;
    margin-top: 10px;
  }

  .loader {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #333;
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .offline-banner {
    background: #2a1a0a;
    border: 1px solid var(--orange);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: .85rem;
    color: var(--orange);
    display: none;
  }

  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
  }
  .stat-box {
    background: #0d0f12;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; font-weight: 900; }
  .stat-box .lbl { color: #555; font-size: .78rem; margin-top: 2px; }

  .sort-row {
    display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .sort-btn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: #666;
    cursor: pointer;
    font-size: .8rem;
    font-family: 'Barlow', sans-serif;
  }
  .sort-btn.active { border-color: var(--orange); color: var(--orange); }

  /* ── Station logo badge ── */
  .station-logo {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: .95rem;
    flex-shrink: 0;
    letter-spacing: -0.5px;
    margin-right: 10px;
    border: 1px solid rgba(255,255,255,.08);
    text-transform: uppercase;
  }
  .station-row { align-items: flex-start; }
</style>
</head>
<body>

<div class="offline-banner" id="offlineBanner">📡 Hors-ligne — données en cache &nbsp;<button onclick="forceUpdate()" style="padding:3px 10px;font-size:.8rem;background:var(--orange);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:700">Mettre à jour</button></div>

<h1>⛽ CarbuFuel</h1>
<p class="subtitle">Prix carburants en temps réel · France</p>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou code postal..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn-ghost" onclick="search()">🔍</button>
  <button class="btn-ghost" onclick="gps()">📍</button>
</div>

<div class="radius-row">
  <label>Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal">15km</span>
</div>

<div class="fuel-grid" id="fuelGrid">
  <button class="fuel-btn active" data-fuel="all" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" data-fuel="sp95"   onclick="setFuel('sp95',this)">SP95</button>
  <button class="fuel-btn" data-fuel="sp98"   onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" data-fuel="e10"    onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" data-fuel="gazole" onclick="setFuel('gazole',this)">Gazole</button>
  <button class="fuel-btn" data-fuel="e85"    onclick="setFuel('e85',this)">E85</button>
  <button class="fuel-btn" data-fuel="gplc"   onclick="setFuel('gplc',this)">GPLc</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 Meilleur prix</button>
  <button class="btn-ghost" onclick="scanExpensive()">⚠️ Stations chères</button>
  <button class="btn-ghost" onclick="renderList()">📋 Liste</button>
  <button class="btn-ghost" onclick="renderStats()">📊 Stats</button>
  <button class="btn-ghost" onclick="generateContent()">🎬 Script TikTok</button>
  <button class="btn-ghost" onclick="autoTikTok()">🤖 Auto x4</button>
  <button class="btn-ghost wide" onclick="generateVideo()">🎥 Prompt vidéo IA</button>
</div>

<div id="result"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let userLat = null, userLon = null, userDep = '', stations = [], activeFuel = 'all', sortMode = 'dist';

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    // Forcer la mise à jour immédiate du SW
    reg.update();
    if (reg.waiting) reg.waiting.postMessage('skipWaiting');
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }).catch(() => {});
}

// ── Offline banner ────────────────────────────────────────────────────────────
window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');

// ── Fuel filter ───────────────────────────────────────────────────────────────
function setFuel(fuel, btn) {
  activeFuel = fuel;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Haversine ─────────────────────────────────────────────────────────────────
function haversine(a, b, c, d) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(c - a), dLon = toR(d - b);
  const x = Math.sin(dLat/2)**2 + Math.cos(toR(a)) * Math.cos(toR(c)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function normalizeCoord(value, type = 'lat') {
  const n = parseFloat(value);
  if (!Number.isFinite(n)) return null;
  const max = type === 'lon' ? 180 : 90;
  return Math.abs(n) > max ? n / 100000 : n;
}

// ── Extract prices from a station record ─────────────────────────────────────
// Parsing des prix — supporte plusieurs formats d'API :
//  - data.economie.gouv.fr v2.1 : prix_sp95, prix_gazole...
//  - api.prix-carburants.2aaz.fr : Prix_SP95, Prix_Gazole...  (clé Capitalisée)
//  - Tableau { nom, valeur } ou { nom, prix }
const FUEL_KEYS = {
  sp95:   ['sp95_prix', 'prix_sp95',  'Prix_SP95',  'SP95',  'sp95'],
  sp98:   ['sp98_prix', 'prix_sp98',  'Prix_SP98',  'SP98',  'sp98'],
  e10:    ['e10_prix',  'prix_e10',   'Prix_E10',   'E10',   'e10'],
  gazole: ['gazole_prix','prix_gazole','Prix_Gazole','Gazole','gazole','DIESEL'],
  e85:    ['e85_prix',  'prix_e85',   'Prix_E85',   'E85',   'e85'],
  gplc:   ['gplc_prix', 'prix_gplc',  'Prix_GPLc',  'GPLc',  'gplc','GPL'],
};

function extractFuelPrice(s, fuel) {
  // Method 1: flat fields (essaie toutes les variantes de clé)
  for (const key of FUEL_KEYS[fuel] || []) {
    const v = parseFloat(s[key]);
    if (v > 0) return v;
  }
  // Method 2: tableau Carburants[] format 2aaz : [{Nom:"SP95", Prix:1.789}]
  const carbs = s.Carburants || s.carburants;
  if (Array.isArray(carbs)) {
    const names = FUEL_KEYS[fuel] || [];
    for (const entry of carbs) {
      const nom = (entry.Nom || entry.nom || entry.name || entry['@nom'] || '').toLowerCase();
      const val = parseFloat(entry.Prix || entry.prix || entry.valeur || entry.value || entry['@valeur'] || 0);
      if (val > 0 && names.some(n => nom.includes(n.toLowerCase()))) return val;
    }
  }
  // Method 3: tableau prix[] format govt : [{nom:"SP95", valeur:1.789}]
  if (Array.isArray(s.prix)) {
    const names = FUEL_KEYS[fuel] || [];
    for (const entry of s.prix) {
      const nom = (entry.nom || entry.name || entry['@nom'] || '').toLowerCase();
      const val = parseFloat(entry.valeur || entry.prix || entry.value || entry['@valeur'] || 0);
      if (val > 0 && names.some(n => nom.includes(n.toLowerCase()))) return val;
    }
  }
  // Method 4: prix as JSON string
  if (typeof s.prix === 'string') {
    try {
      const arr = JSON.parse(s.prix);
      const names = FUEL_KEYS[fuel] || [];
      for (const entry of arr) {
        const nom = (entry.nom || entry.name || entry['@nom'] || '').toLowerCase();
        const val = parseFloat(entry.valeur || entry.prix || entry['@valeur'] || 0);
        if (val > 0 && names.some(n => nom.includes(n.toLowerCase()))) return val;
      }
    } catch {}
  }
  return null;
}

function allPricesOfStation(s) {
  const fuels = ['sp95','sp98','e10','gazole','e85','gplc'];
  const result = {};
  for (const f of fuels) {
    const v = extractFuelPrice(s, f);
    if (v) result[f] = v;
  }
  return result;
}

function minPriceOfStation(s) {
  const p = Object.values(allPricesOfStation(s)).filter(v => v > 0);
  return p.length ? Math.min(...p) : null;
}

function activePriceOfStation(s) {
  if (activeFuel === 'all') return minPriceOfStation(s);
  return extractFuelPrice(s, activeFuel);
}

// ── Geocode city ──────────────────────────────────────────────────────────────
async function search() {
  const q = document.getElementById("city").value.trim();
  if (!q) return;
  showLoader("Géolocalisation...");
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
    const d = await r.json();
    if (!d.features || !d.features.length) { showError("Ville introuvable."); return; }
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    // Extraire le code département depuis le code postal
    const cp = d.features[0].properties.postcode || '';
    userDep = cp.startsWith('97') ? cp.substring(0,3) : cp.substring(0,2);
    await load();
  } catch(e) { showError("Erreur géolocalisation : " + e.message); }
}

// ── GPS ───────────────────────────────────────────────────────────────────────
function gps() {
  if (!navigator.geolocation) { showError("Géolocalisation non supportée."); return; }
  showLoader("Position GPS...");
  navigator.geolocation.getCurrentPosition(
    async p => {
      userLat = p.coords.latitude;
      userLon = p.coords.longitude;
      try {
        const r = await fetch(`https://api-adresse.data.gouv.fr/reverse/?lon=${encodeURIComponent(userLon)}&lat=${encodeURIComponent(userLat)}&limit=1`);
        const d = await r.json();
        const cp = d?.features?.[0]?.properties?.postcode || '';
        userDep = cp.startsWith('97') ? cp.substring(0,3) : cp.substring(0,2);
      } catch {}
      await load();
    },
    () => showError("Accès GPS refusé. Essaie de saisir ta ville manuellement.")
  );
}

// ── Load data ─────────────────────────────────────────────────────────────────
// ── Stratégie API : 2aaz EN PREMIER (fournit nom+enseigne+adresse+ville+prix)
// 2aaz enrichit les données gouv avec nom/enseigne scrapés de prix-carburants.gouv.fr
// L'API gouv seule ne contient PAS ces champs — uniquement prix et coordonnées.

// Extrait le tableau brut de stations depuis la réponse JSON (format variable selon source)
function extractRaw(d) {
  if (Array.isArray(d)) return d;                 // 2aaz retourne un tableau direct
  if (Array.isArray(d.results)) return d.results; // OpenDataSoft v2.1
  if (Array.isArray(d.data))    return d.data;
  return [];
}

// Parse les coordonnées GPS depuis tous les formats connus
function parseCoords(s) {
  // 2aaz v2 : { Coordonnees: { latitude, longitude } }
  if (s.Coordonnees?.latitude  != null) return [normalizeCoord(s.Coordonnees.latitude,'lat'), normalizeCoord(s.Coordonnees.longitude,'lon')];
  // 2aaz v1 / OpenEventDB : champs plats capitalisés
  if (s.Latitude  != null) return [normalizeCoord(s.Latitude,'lat'),  normalizeCoord(s.Longitude,'lon')];
  // OpenDataSoft gouv : champs minuscules
  if (s.latitude  != null) return [normalizeCoord(s.latitude,'lat'),  normalizeCoord(s.longitude,'lon')];
  // OpenDataSoft geom GeoJSON
  if (s.geom?.geometry?.coordinates) return [normalizeCoord(s.geom.geometry.coordinates[1],'lat'), normalizeCoord(s.geom.geometry.coordinates[0],'lon')];
  // geolocalisation object
  if (s.geolocalisation) return [normalizeCoord(s.geolocalisation.lat||s.geolocalisation.latitude,'lat'), normalizeCoord(s.geolocalisation.lon||s.geolocalisation.longitude,'lon')];
  return [null, null];
}

// Parse tous les champs texte d'une station (nom, enseigne, adresse, ville)
function parseStationMeta(s) {
  // 2aaz fournit ces champs : Nom, Enseigne, Adresse (dans Informations), Ville (dans Informations)
  const infos    = s.Informations || {};
  const enseigne = (s.Enseigne    || infos.Enseigne || s.enseigne || s.brand || s.marque || s.Marque || '').trim();
  const nom      = (s.Nom         || infos.Nom      || s.nom      || s.name  || '').trim();
  const adresse  = (infos.Adresse || s.Adresse || s.adresse || s.Address || '').trim();
  const ville    = (infos.Ville   || s.Ville   || s.ville   || s.City    || s.cp || '').trim();
  // Fallback intelligent : si nom et enseigne vides, utilise adresse
  const displayNom = enseigne || nom || adresse || 'Station';
  return { enseigne, nom: displayNom, adresse, ville };
}

const APIS = [
  // 1. 2aaz autour du point GPS — NOM + ENSEIGNE + ADRESSE + prix en temps réel
  (lat, lon, radius) => `https://api.prix-carburants.2aaz.fr/stations/around/${lat},${lon}/?m=${Math.min(radius*1000,50000)}&max=200`,
  // 2. 2aaz par département (si GPS échoue ou rayon trop grand)
  (lat, lon, radius, dep) => dep ? `https://api.prix-carburants.2aaz.fr/stations/?dep=${dep}&max=500` : null,
  // 3. OpenDataSoft gouv par département (fallback — sans nom/enseigne)
  (lat, lon, radius, dep) => {
    const where = dep ? `startswith(cp, "${dep}")` : `gazole_prix is not null`;
    return `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${encodeURIComponent(where)}&limit=100`;
  },
];

async function load() {
  if (userLat === null) { showError("Saisis une ville ou active le GPS d'abord."); return; }
  const radius = parseInt(document.getElementById('radius').value);
  const dep = userDep || '';

  let lastError = '';
  for (let i = 0; i < APIS.length; i++) {
    const url = APIS[i](userLat, userLon, radius, dep);
    if (!url) continue;
    showLoader(`Chargement... (source ${i+1}/${APIS.length})`);
    try {
      const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!r.ok) { lastError = `Source ${i+1}: HTTP ${r.status}`; continue; }
      const d = await r.json();
      let raw = extractRaw(d);

      // Pagination OpenDataSoft (source 3)
      if (i === 2 && d.total_count && raw.length < d.total_count) {
        const total = Math.min(d.total_count, 1000);
        for (let offset = raw.length; offset < total; offset += 100) {
          const u2 = new URL(url); u2.searchParams.set('offset', offset);
          const r2 = await fetch(u2.toString());
          if (!r2.ok) break;
          const rows2 = extractRaw(await r2.json());
          if (!rows2.length) break;
          raw = raw.concat(rows2);
          if (rows2.length < 100) break;
        }
      }

      if (raw.length === 0) { lastError = `Source ${i+1}: 0 résultats`; continue; }

      stations = raw.map(s => {
        const [lat, lon] = parseCoords(s);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
        const dist = haversine(userLat, userLon, lat, lon);
        if (dist > radius) return null;
        const { enseigne, nom, adresse, ville } = parseStationMeta(s);
        return { ...s, nom, enseigne, ville, adresse, _lat: lat, _lon: lon, dist };
      }).filter(Boolean);

      if (stations.length === 0) {
        lastError = `Source ${i+1}: aucune station dans ${radius}km (${raw.length} reçues, dep=${dep||'?'})`;
        continue;
      }
      renderList();
      return;
    } catch(e) {
      lastError = `Source ${i+1}: ${e.message}`;
    }
  }
  showError(`Échec toutes sources. Dernier: ${lastError}`);
}

// ── Station brand / logo helpers ──────────────────────────────────────────────
const BRAND_STYLES = {
  'total':        { bg: '#c8102e', color: '#fff' },
  'totalenergies':{ bg: '#c8102e', color: '#fff' },
  'bp':           { bg: '#007a33', color: '#fff' },
  'shell':        { bg: '#fbce07', color: '#cc0000' },
  'esso':         { bg: '#003087', color: '#ff0000' },
  'leclerc':      { bg: '#003ca6', color: '#f7c300' },

  'intermarché':  { bg: '#e30613', color: '#fff' },

  'auchan':       { bg: '#e10600', color: '#fff' },

  'système u':    { bg: '#c00000', color: '#fff' },
  'systeme u':    { bg: '#c00000', color: '#fff' },

  'geant':        { bg: '#c00000', color: '#fff' },

  'relais':       { bg: '#444', color: '#fff' },
  'autoroute':    { bg: '#333', color: '#f0a500' },
};

function getStationBrand(s) {
  // Après parseStationMeta, s.enseigne et s.nom sont déjà normalisés
  return (s.enseigne || s.nom || '').trim();
}

function getStationDisplayName(s) {
  const enseigne = (s.enseigne || '').trim();
  const nom      = (s.nom      || '').trim();
  // Si enseigne connue et différente du nom → affiche les deux
  if (enseigne && nom && enseigne.toLowerCase() !== nom.toLowerCase()) {
    return { primary: enseigne, secondary: nom };
  }
  return { primary: enseigne || nom || 'Station', secondary: '' };
}

function stationLogoBadge(s) {
  const brand = getStationBrand(s).toLowerCase();
  let style = null;
  for (const key of Object.keys(BRAND_STYLES)) {
    if (brand.includes(key)) { style = BRAND_STYLES[key]; break; }
  }
  const abbr = getStationBrand(s).substring(0, 3) || '⛽';
  const bg    = style ? style.bg    : '#1e2229';
  const color = style ? style.color : '#aaa';
  return `<div class="station-logo" style="background:${bg};color:${color}">${abbr}</div>`;
}

// ── Render: Liste stations ─────────────────────────────────────────────────────
function renderList() {
  if (!requireStations()) return;

  const allP = stations.flatMap(s => Object.values(allPricesOfStation(s)));
  const mean = allP.length ? allP.reduce((a,b) => a+b, 0) / allP.length : 999;

  let sorted = [...stations];
  if (sortMode === 'dist') sorted.sort((a,b) => a.dist - b.dist);
  else if (sortMode === 'price') sorted.sort((a,b) => {
    const pa = activePriceOfStation(a) || 999;
    const pb = activePriceOfStation(b) || 999;
    return pa - pb;
  });
  else sorted.sort((a,b) => (a.nom||'').localeCompare(b.nom||''));

  sorted = sorted.slice(0, 20);

  const sortBar = `
    <div class="sort-row">
      <span class="muted" style="line-height:26px">Tri :</span>
      <button class="sort-btn ${sortMode==='dist'?'active':''}"   onclick="setSortMode('dist')">📍 Distance</button>
      <button class="sort-btn ${sortMode==='price'?'active':''}"  onclick="setSortMode('price')">💰 Prix</button>
      <button class="sort-btn ${sortMode==='name'?'active':''}"   onclick="setSortMode('name')">A→Z Nom</button>
    </div>`;

  const rows = sorted.map(s => {
    const p = activePriceOfStation(s);
    const allP2 = allPricesOfStation(s);
    const isCheap = p !== null && p < mean - 0.05;
    const isExp   = p !== null && p > mean + 0.10;
    const mapsUrl = `https://maps.google.com/?q=${s._lat},${s._lon}`;
    const { primary, secondary } = getStationDisplayName(s);

    const chips = Object.entries(allP2).map(([f,v]) =>
      `<span class="price-chip">${f.toUpperCase()} ${v.toFixed(3)}€</span>`
    ).join('');

    return `
      <div class="station-row">
        ${stationLogoBadge(s)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700">${primary} <span class="muted" style="font-weight:400">· ${s.dist.toFixed(1)} km</span></div>
          ${secondary ? `<div style="font-size:.82rem;color:#666">${secondary}</div>` : ''}
          <div class="muted">${s.adresse || ''} ${s.ville || ''}</div>
          <div class="prices-mini">${chips}</div>
          ${isCheap ? '<span class="tag">🔥 Bon plan</span>' : ''}
          ${isExp   ? '<span class="tag tag-red">⚠️ Cher</span>' : ''}
        </div>
        <div style="text-align:right;margin-left:10px;flex-shrink:0">
          <div style="font-weight:700;font-size:1.1rem;color:${p!==null?(isCheap?'var(--green)':(isExp?'var(--danger)':'#fff')):'#555'}">
            ${p !== null ? p.toFixed(3)+'€' : '—'}
          </div>
          <a href="${mapsUrl}" target="_blank" style="text-decoration:none">
            <button class="btn-ghost" style="padding:4px 10px;font-size:.75rem;margin-top:4px">🗺️</button>
          </a>
        </div>
      </div>`;
  }).join('');

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big" style="margin-bottom:10px">📋 ${stations.length} stations · ${sorted.length} affichées</div>
      ${sortBar}
      ${rows}
    </div>`;
}

function setSortMode(mode) {
  sortMode = mode;
  renderList();
}

// ── Render: Meilleur prix ─────────────────────────────────────────────────────
function bestDeal() {
  if (!requireStations()) return;
  const { best, worst } = getBestWorst();
  if (!best) { showError("Aucun prix disponible pour ce carburant."); return; }
  const eco = ((worst.price - best.price) * 50).toFixed(2);
  const mapsUrl = `https://maps.google.com/?q=${best.s._lat},${best.s._lon}`;

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big orange">🔥 MEILLEUR PRIX</div>
      <div style="margin:10px 0 4px;font-weight:600">${best.s.nom || best.s.enseigne || 'Station'}</div>
      <div class="muted">${best.s.adresse || ''} — ${best.s.ville || ''}</div>
      <div class="muted">${best.s.dist.toFixed(1)} km</div>
      <div style="margin:14px 0"><span class="xl green">${best.price.toFixed(3)}€</span><span class="muted"> /L</span></div>
      <div style="color:#aaa;font-size:.9rem">💸 Gain vs station la plus chère : <strong class="green">${eco}€</strong> sur un plein</div>
      <div style="margin-top:14px">
        <a href="${mapsUrl}" target="_blank" style="text-decoration:none">
          <button class="btn-primary" style="width:100%">🗺️ Y aller sur Maps</button>
        </a>
      </div>
    </div>`;
}

// ── Render: Stations chères ───────────────────────────────────────────────────
function scanExpensive() {
  if (!requireStations()) return;
  const allP = stations.flatMap(s => Object.values(allPricesOfStation(s)));
  if (!allP.length) { showError("Aucun prix disponible."); return; }
  const mean = allP.reduce((a,b) => a+b, 0) / allP.length;
  const bad = stations
    .filter(s => { const p = activePriceOfStation(s); return p !== null && p > mean + 0.10; })
    .sort((a,b) => (activePriceOfStation(b)||0) - (activePriceOfStation(a)||0));

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big red">⚠️ ${bad.length} stations au-dessus de la moyenne</div>
      <div class="muted" style="margin:6px 0 14px">Prix moyen local : ${mean.toFixed(3)}€/L · seuil +0.10€</div>
      ${bad.map(s => `
        <div class="station-row">
          <div>
            <div style="font-weight:600">${s.nom || 'Station'}</div>
            <div class="muted">${s.dist.toFixed(1)} km — ${s.ville || ''}</div>
          </div>
          <span class="red" style="font-weight:700">${(activePriceOfStation(s)||0).toFixed(3)}€</span>
        </div>`).join('')}
    </div>`;
}

// ── Render: Stats ─────────────────────────────────────────────────────────────
function renderStats() {
  if (!requireStations()) return;
  const { best, worst } = getBestWorst();
  if (!best) { showError("Aucun prix disponible."); return; }
  const allP = stations.flatMap(s => Object.values(allPricesOfStation(s)));
  const mean = (allP.reduce((a,b) => a+b, 0) / allP.length);
  const median = [...allP].sort((a,b)=>a-b)[Math.floor(allP.length/2)];
  const diff = worst.price - best.price;

  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big" style="margin-bottom:4px">📊 Statistiques locales</div>
      <div class="muted" style="margin-bottom:10px">${stations.length} stations · ${allP.length} prix relevés</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="val green">${best.price.toFixed(3)}€</div><div class="lbl">🔥 Prix le + bas</div></div>
        <div class="stat-box"><div class="val red">${worst.price.toFixed(3)}€</div><div class="lbl">💸 Prix le + haut</div></div>
        <div class="stat-box"><div class="val orange">${mean.toFixed(3)}€</div><div class="lbl">📈 Moyenne</div></div>
        <div class="stat-box"><div class="val" style="color:#aaa">${median.toFixed(3)}€</div><div class="lbl">⚖️ Médiane</div></div>
      </div>
      <div style="margin-top:14px;color:#aaa;font-size:.9rem">
        💡 Écart max : <strong style="color:var(--orange)">${diff.toFixed(3)}€/L</strong> —
        soit <strong style="color:var(--green)">${(diff*50).toFixed(2)}€</strong> sur un plein de 50L
      </div>
    </div>`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getBestWorst() {
  let best = null, worst = null;
  for (const s of stations) {
    const p = activePriceOfStation(s);
    if (p === null) continue;
    if (!best || p < best.price) best = { s, price: p };
    if (!worst || p > worst.price) worst = { s, price: p };
  }
  return { best, worst };
}

function renderTextArea(title, text) {
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="big" style="margin-bottom:8px">${title}</div>
      <textarea rows="10">${text}</textarea>
      <div style="margin-top:12px">
        <button class="btn-primary" style="width:100%" onclick='copyText(${JSON.stringify(text)}, this)'>📋 Copier</button>
      </div>
    </div>`;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const targetBtn = btn || event?.target;
    if (!targetBtn) return;
    const orig = targetBtn.textContent;
    targetBtn.textContent = "✅ Copié !";
    setTimeout(() => targetBtn.textContent = orig, 1800);
  });
}

function forceUpdate() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
  }
  caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
    location.reload(true);
  });
}

function showLoader(msg) {
  document.getElementById("result").innerHTML =
    `<div class="card" style="color:#666"><span class="loader"></span>${msg}</div>`;
}

function showError(msg) {
  document.getElementById("result").innerHTML =
    `<div class="card red">❌ ${msg}</div>`;
}

function requireStations() {
  if (!stations.length) {
    showError("Lance d'abord une recherche par ville ou GPS 📍");
    return false;
  }
  return true;
}
