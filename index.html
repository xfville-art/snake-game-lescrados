<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>CarbuFuel · Prix carburants en temps réel</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');

    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #11161f;
      --bg-card: #0d121c;
      --border-subtle: #1e2532;
      --border-medium: #2a3342;
      --accent-primary: #f59e0b;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --accent-warning: #f59e0b;
      --accent-info: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --gradient-hero: linear-gradient(135deg, #f59e0b 0%, #dc2626 100%);
      --shadow-glow: 0 0 20px rgba(245,158,11,0.2);
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      padding: 20px 16px 100px;
      line-height: 1.5;
    }

    .container { max-width: 640px; margin: 0 auto; }

    /* Header */
    .hero { text-align: center; margin-bottom: 28px; }
    .hero-icon { font-size: 3.5rem; margin-bottom: 8px; }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: var(--text-tertiary); font-size: 0.85rem; }

    /* Cartes */
    .search-card, .station-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 20px;
      margin-bottom: 20px;
      transition: var(--transition-base);
    }
    .station-card:hover {
      border-color: var(--border-medium);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    }

    /* Recherche */
    .search-group { display: flex; gap: 12px; margin-bottom: 20px; }
    .input-wrapper { flex: 1; position: relative; }
    .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); }
    input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
    }
    input:focus { border-color: var(--accent-primary); }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      cursor: pointer;
      font-size: 1.2rem;
    }
    .icon-btn:hover { border-color: var(--accent-primary); }

    /* Slider */
    .radius-section { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
    }
    .radius-value {
      background: var(--bg-secondary);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-weight: 600;
      color: var(--accent-primary);
    }

    /* Filtres */
    .fuel-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .fuel-btn {
      padding: 8px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border-subtle);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 600;
      cursor: pointer;
    }
    .fuel-btn.active {
      background: var(--gradient-hero);
      border-color: transparent;
      color: white;
    }

    /* Tri */
    .sort-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .sort-group { display: flex; gap: 8px; }
    .sort-btn {
      padding: 6px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .sort-btn.active { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(245,158,11,0.1); }
    .sort-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Live bar */
    .live-bar {
      background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(220,38,38,0.08));
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .live-left { display: flex; align-items: center; gap: 12px; }
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: var(--radius-full);
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.5; transform: scale(0.8); } }
    .live-countdown { font-weight: 700; color: var(--accent-primary); }

    /* Cartes stations */
    .station-header { display: flex; gap: 14px; margin-bottom: 16px; }
    .station-logo {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .station-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .station-address { font-size: 0.75rem; color: var(--text-tertiary); }
    .station-distance {
      font-size: 0.7rem;
      color: var(--accent-info);
      background: rgba(59,130,246,0.1);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      display: inline-block;
    }

    /* Prix - VERSION AMÉLIORÉE AVEC INDICATEURS VISUELS */
    .fuel-prices { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .price-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 12px;
      position: relative;
      transition: var(--transition-base);
    }
    .price-item:hover { transform: translateX(4px); }
    
    .price-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .price-fuel-name {
      font-weight: 800;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .price-rank {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.3);
    }
    
    .price-main {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .price-amount {
      font-size: 1.4rem;
      font-weight: 800;
    }
    .price-amount.cheap { color: var(--accent-success); }
    .price-amount.expensive { color: var(--accent-danger); }
    
    .price-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-best {
      background: rgba(16,185,129,0.2);
      color: var(--accent-success);
      border: 1px solid var(--accent-success);
    }
    .badge-worst {
      background: rgba(239,68,68,0.2);
      color: var(--accent-danger);
      border: 1px solid var(--accent-danger);
    }
    .badge-trend-up { color: var(--accent-danger); }
    .badge-trend-down { color: var(--accent-success); }
    
    /* Barre de progression */
    .price-bar-container {
      width: 100%;
      height: 6px;
      background: var(--border-subtle);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: 8px 0;
    }
    .price-bar {
      height: 100%;
      border-radius: var(--radius-full);
      transition: width 0.5s ease;
    }
    .price-bar.cheap { background: linear-gradient(90deg, var(--accent-success), #34d399); }
    .price-bar.expensive { background: linear-gradient(90deg, var(--accent-danger), #f87171); }
    .price-bar.mid { background: linear-gradient(90deg, var(--accent-warning), #fbbf24); }
    
    .price-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.7rem;
    }
    .price-updated { color: var(--text-tertiary); }
    .price-updated.fresh { color: var(--accent-success); }
    .price-updated.recent { color: var(--accent-warning); }
    .price-updated.old { color: var(--accent-danger); }
    .price-indicator { font-size: 0.9rem; }
    
    .station-footer { display: flex; justify-content: flex-end; }
    .maps-link {
      color: var(--accent-info);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: var(--radius-md);
    }
    
    /* États */
    .state-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 48px 24px;
      text-align: center;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Animations flash */
    @keyframes flash-up { 0% { background: rgba(16,185,129,0.3); } 100% { background: transparent; } }
    @keyframes flash-down { 0% { background: rgba(239,68,68,0.3); } 100% { background: transparent; } }
    .price-flash-up { animation: flash-up 0.6s ease-out; }
    .price-flash-down { animation: flash-down 0.6s ease-out; }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="hero-icon">⛽</div>
    <h1>CarbuFuel</h1>
    <p class="subtitle">Prix carburants en temps réel · France</p>
  </div>
  
  <div class="search-card">
    <div class="search-group">
      <div class="input-wrapper">
        <span class="input-icon">📍</span>
        <input type="text" id="city" placeholder="Ville, code postal ou adresse">
      </div>
      <button class="icon-btn" id="searchBtn" onclick="searchCity()">🔍</button>
      <button class="icon-btn" id="gpsBtn" onclick="gps()">📍</button>
    </div>
    <div class="radius-section">
      <span>⭕ Rayon</span>
      <input type="range" id="radius" min="2" max="50" value="15" oninput="updateRadius(this.value)">
      <div class="radius-value" id="radiusVal">15 km</div>
    </div>
  </div>
  
  <div class="fuel-grid">
    <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
    <button class="fuel-btn" onclick="setFuel('Gazole',this)">Gazole</button>
    <button class="fuel-btn" onclick="setFuel('SP95',this)">SP95</button>
    <button class="fuel-btn" onclick="setFuel('E10',this)">E10</button>
    <button class="fuel-btn" onclick="setFuel('SP98',this)">SP98</button>
    <button class="fuel-btn" onclick="setFuel('E85',this)">E85</button>
    <button class="fuel-btn" onclick="setFuel('GPLc',this)">GPL</button>
  </div>
  
  <div class="sort-section">
    <span class="section-title">📊 Trier par</span>
    <div class="sort-group">
      <button class="sort-btn active" id="sortDist" onclick="setSort('dist')">Distance</button>
      <button class="sort-btn" id="sortPrice" onclick="setSort('price')" disabled>Prix</button>
    </div>
  </div>
  
  <div class="live-bar" id="liveBar" style="display: none;">
    <div class="live-left">
      <div class="live-dot" id="liveDot"></div>
      <span>Refresh <span id="liveCountdown" class="live-countdown">15:00</span></span>
      <span id="liveTs" style="font-size:0.7rem"></span>
    </div>
    <button class="refresh-btn" onclick="manualRefresh()" style="background:transparent;border:1px solid var(--border-subtle);padding:6px 12px;border-radius:8px;cursor:pointer">🔄</button>
  </div>
  
  <div id="result">
    <div class="state-card"><div class="state-icon">⛽</div><p>Recherchez une ville ou activez la géolocalisation</p></div>
  </div>
</div>

<script>
'use strict';

let userLat = null, userLon = null;
let stations = [];
let prevPrices = {};
let activeFuel = 'all';
let sortMode = 'dist';
let isLoading = false;
let refreshTimer = null;
let countdownLeft = 900;
const REFRESH_INTERVAL = 900;

const BRAND_MAP = {
  'total': {bg: '#c8102e', c: '#fff', domain: 'totalenergies.fr'},
  'leclerc': {bg: '#003ca6', c: '#f7c300', domain: 'e.leclerc'},
  'carrefour': {bg: '#004a97', c: '#fff', domain: 'carrefour.fr'},
  'intermarche': {bg: '#e30613', c: '#fff', domain: 'intermarche.com'},
  'auchan': {bg: '#e10600', c: '#fff', domain: 'auchan.fr'},
  'systeme u': {bg: '#c00000', c: '#fff', domain: 'magasins-u.com'},
  'esso': {bg: '#003087', c: '#fff', domain: 'esso.fr'},
  'shell': {bg: '#fbce07', c: '#cc0000', domain: 'shell.fr'}
};

function getPrice(f) {
  if (!f) return null;
  if (f.Price?.amount != null) return {amount: +f.Price.amount, updatedAt: f.Price.last_update};
  if (f.price?.amount != null) return {amount: +f.price.amount, updatedAt: f.price.last_update};
  return null;
}

function normalizeFuels(rawFuels) {
  const byFuel = {};
  rawFuels.forEach(f => {
    const p = getPrice(f);
    if (!p || p.amount <= 0) return;
    let shortName = (f.shortName || f.short_name || f.name || '').trim();
    if (shortName.includes('E10')) shortName = 'E10';
    else if (shortName.includes('GPL')) shortName = 'GPLc';
    else if (shortName === 'Diesel' || shortName === 'Gasoil') shortName = 'Gazole';
    if (!byFuel[shortName] || p.amount < byFuel[shortName].amount) {
      byFuel[shortName] = { shortName, amount: p.amount, updatedAt: p.updatedAt };
    }
  });
  return Object.values(byFuel);
}

function updateRadius(val) {
  document.getElementById('radiusVal').textContent = val + ' km';
  if (userLat) load();
}

async function searchCity() {
  const q = document.getElementById('city').value.trim();
  if (!q) return;
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
    const d = await r.json();
    if (!d.features?.length) throw new Error();
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch(e) {
    showState('❌', 'Ville non trouvée', true);
  }
}

function gps() {
  if (!navigator.geolocation) { showState('📱', 'GPS non disponible', true); return; }
  const btn = document.getElementById('gpsBtn');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; btn.textContent = '📍'; load(); },
    () => { btn.textContent = '📍'; showState('⚠️', 'Erreur GPS', true); },
    { timeout: 10000 }
  );
}

async function load() {
  if (isLoading || !userLat) return;
  isLoading = true;
  stopLiveRefresh();
  const radiusM = parseInt(document.getElementById('radius').value) * 1000;
  showLoading('Recherche des stations...');
  
  try {
    const aroundUrl = `https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radiusM}`;
    const list = await (await fetch(aroundUrl)).json();
    if (!list.length) throw new Error('Aucune station');
    
    const slice = list.slice(0, 20);
    const details = await Promise.all(slice.map(s => 
      fetch(`https://api.prix-carburants.2aaz.fr/station/${s.id}`).then(r => r.ok ? r.json() : null).catch(() => null)
    ));
    
    stations = slice.map((s, i) => ({
      id: s.id,
      nom: s.Brand?.name || s.name || 'Station',
      brand: (s.Brand?.name || s.name || '').toLowerCase(),
      lat: s.Coordinates.latitude,
      lon: s.Coordinates.longitude,
      address: s.Address?.street_line || '',
      city: s.Address?.city_line || '',
      fuels: normalizeFuels(details[i]?.Fuels || []),
      dist: haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude)
    })).filter(s => s.fuels.length);
    
    startLiveRefresh();
    render();
  } catch(e) {
    showState('⚠️', e.message || 'Erreur', true);
  } finally {
    isLoading = false;
  }
}

function render() {
  let filtered = activeFuel === 'all' ? stations : stations.filter(s => s.fuels.some(f => f.shortName === activeFuel));
  if (!filtered.length) {
    showState('🔍', activeFuel === 'all' ? 'Aucune station' : `Aucune station avec ${activeFuel}`, false);
    return;
  }
  
  // Calcul des statistiques par carburant
  const fuelStats = {};
  filtered.forEach(s => {
    s.fuels.forEach(f => {
      if (activeFuel !== 'all' && f.shortName !== activeFuel) return;
      if (!fuelStats[f.shortName]) fuelStats[f.shortName] = [];
      fuelStats[f.shortName].push({ amount: f.amount, stationId: s.id });
    });
  });
  
  Object.keys(fuelStats).forEach(fuel => {
    fuelStats[fuel].sort((a,b) => a.amount - b.amount);
  });
  
  const sorted = [...filtered].sort((a, b) => {
    if (sortMode === 'price' && activeFuel !== 'all') {
      const pa = a.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      const pb = b.fuels.find(f => f.shortName === activeFuel)?.amount || Infinity;
      return pa - pb;
    }
    return a.dist - b.dist;
  });
  
  let html = `<div class="results-header" style="display:flex;justify-content:space-between;margin-bottom:16px"><span>${sorted.length} station${sorted.length>1?'s':''}</span><span class="results-badge">${document.getElementById('radiusVal').textContent}</span></div>`;
  sorted.forEach(s => html += buildCard(s, fuelStats));
  document.getElementById('result').innerHTML = html;
  document.getElementById('liveBar').style.display = 'flex';
}

function buildCard(s, fuelStats) {
  const address = [s.address, s.city].filter(Boolean).join(' · ');
  const mapsUrl = `https://maps.google.com/?q=${s.lat},${s.lon}`;
  const fuelsList = activeFuel === 'all' ? s.fuels : s.fuels.filter(f => f.shortName === activeFuel);
  
  let pricesHtml = '';
  fuelsList.forEach(f => {
    const stats = fuelStats[f.shortName];
    const rank = stats ? stats.findIndex(item => item.stationId === s.id) + 1 : 0;
    const total = stats ? stats.length : 0;
    const isBest = rank === 1 && total > 1;
    const isWorst = rank === total && total > 1 && total > 1;
    const percentPosition = total > 1 ? ((rank - 1) / (total - 1)) * 100 : 50;
    const barColor = percentPosition < 33 ? 'cheap' : (percentPosition > 66 ? 'expensive' : 'mid');
    
    const age = f.updatedAt ? formatAge(f.updatedAt) : '';
    const freshClass = f.updatedAt ? getFreshClass(f.updatedAt) : '';
    
    pricesHtml += `
      <div class="price-item" data-key="${s.id}_${f.shortName}">
        <div class="price-header">
          <span class="price-fuel-name">${escapeHtml(f.shortName)}</span>
          <span class="price-rank">${rank > 0 ? `#${rank}/${total}` : ''}</span>
        </div>
        <div class="price-main">
          <span class="price-amount ${isBest ? 'cheap' : (isWorst ? 'expensive' : '')}">${f.amount.toFixed(3)}€</span>
          <div style="display:flex;gap:6px">
            ${isBest ? '<span class="price-badge badge-best">🏆 Meilleur prix</span>' : ''}
            ${isWorst ? '<span class="price-badge badge-worst">⚠️ Plus cher</span>' : ''}
            ${!isBest && !isWorst && total > 2 ? `<span class="price-indicator">${percentPosition < 33 ? '📉' : (percentPosition > 66 ? '📈' : '➡️')}</span>` : ''}
          </div>
        </div>
        <div class="price-bar-container">
          <div class="price-bar ${barColor}" style="width: ${percentPosition}%"></div>
        </div>
        <div class="price-footer">
          <span class="price-updated ${freshClass}">${age ? `🕐 ${age}` : ''}</span>
          <span style="color:var(--text-tertiary)">${percentPosition.toFixed(0)}% des stations</span>
        </div>
      </div>
    `;
  });
  
  return `<div class="station-card">
    <div class="station-header">
      ${buildLogo(s.brand, s.nom)}
      <div class="station-info">
        <div class="station-name">${escapeHtml(s.nom)}</div>
        ${address ? `<div class="station-address">📍 ${escapeHtml(address)}</div>` : ''}
        <div class="station-distance">📏 ${s.dist.toFixed(1)} km</div>
      </div>
    </div>
    <div class="fuel-prices">${pricesHtml}</div>
    <div class="station-footer">
      <a class="maps-link" href="${mapsUrl}" target="_blank">🗺️ Ouvrir dans Maps →</a>
    </div>
  </div>`;
}

function buildLogo(brandNorm, nom) {
  let style = {bg: '#1e2532', c: '#94a3b8', domain: ''};
  for (let [key, val] of Object.entries(BRAND_MAP)) {
    if (brandNorm.includes(key)) { style = val; break; }
  }
  const abbr = nom.replace(/[^a-zA-Z]/g, '').slice(0, 2).toUpperCase() || '??';
  if (style.domain) {
    return `<div class="station-logo"><img src="https://logo.clearbit.com/${style.domain}" alt="${abbr}" style="width:100%;height:100%;object-fit:contain;padding:8px" onerror="this.parentElement.innerHTML='<div class=\'logo-abbr\' style=\'background:${style.bg};color:${style.c};width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;font-weight:800\'>${abbr}</div>'"></div>`;
  }
  return `<div class="station-logo" style="background:${style.bg};color:${style.c};font-weight:800">${abbr}</div>`;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function escapeHtml(str) { return String(str||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function formatAge(iso) { try { const h = (Date.now() - new Date(iso).getTime())/3600000; if (h<1) return 'maintenant'; if (h<24) return `${Math.floor(h)}h`; return `${Math.floor(h/24)}j`; } catch(e) { return ''; } }
function getFreshClass(iso) { try { const h = (Date.now() - new Date(iso).getTime())/3600000; if (h<2) return 'fresh'; if (h<12) return 'recent'; return 'old'; } catch(e) { return ''; } }

function startLiveRefresh() {
  stopLiveRefresh();
  countdownLeft = REFRESH_INTERVAL;
  updateLiveBar();
  refreshTimer = setInterval(() => { countdownLeft--; if (countdownLeft <= 0) { countdownLeft = REFRESH_INTERVAL; refreshPricesOnly(); } updateLiveBar(); }, 1000);
}
function stopLiveRefresh() { if (refreshTimer) clearInterval(refreshTimer); }
function updateLiveBar() { const m = Math.floor(countdownLeft/60), s = countdownLeft%60; document.getElementById('liveCountdown').textContent = `${m}:${s.toString().padStart(2,'0')}`; document.getElementById('liveTs').textContent = `· ${new Date().toLocaleTimeString()}`; }
async function refreshPricesOnly() { if (!stations.length) return; const oldPrices = {}; stations.forEach(s => s.fuels.forEach(f => oldPrices[`${s.id}_${f.shortName}`] = f.amount)); const details = await Promise.all(stations.map(s => fetch(`https://api.prix-carburants.2aaz.fr/station/${s.id}`).then(r => r.ok ? r.json() : null).catch(() => null))); stations.forEach((s,i) => { if (details[i]?.Fuels) s.fuels = normalizeFuels(details[i].Fuels); }); render(); setTimeout(() => { Object.entries(oldPrices).forEach(([key, oldAmt]) => { const [id, fuel] = key.split('_'); const station = stations.find(s => s.id == id); const fuelData = station?.fuels.find(f => f.shortName === fuel); if (fuelData && fuelData.amount !== oldAmt) { const pill = document.querySelector(`[data-key="${key}"]`); if(pill) pill.classList.add(fuelData.amount < oldAmt ? 'price-flash-up' : 'price-flash-down'); setTimeout(() => pill?.classList.remove('price-flash-up','price-flash-down'), 600); } }); }, 100); }
async function manualRefresh() { if (isLoading || !userLat) return; countdownLeft = REFRESH_INTERVAL; await refreshPricesOnly(); }
function setFuel(f, btn) { activeFuel = f; document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); const priceBtn = document.getElementById('sortPrice'); priceBtn.disabled = f === 'all'; if (f === 'all' && sortMode === 'price') setSort('dist'); else if (stations.length) render(); }
function setSort(mode) { sortMode = mode; document.getElementById('sortDist').classList.toggle('active', mode === 'dist'); document.getElementById('sortPrice').classList.toggle('active', mode === 'price'); if (stations.length) render(); }
function showLoading(msg) { document.getElementById('result').innerHTML = `<div class="state-card"><div class="loader"></div> ${msg}</div>`; }
function showState(icon, msg, isError) { document.getElementById('result').innerHTML = `<div class="state-card${isError ? ' error' : ''}" style="${isError ? 'border-color:#ef4444' : ''}"><div style="font-size:3rem;margin-bottom:16px">${icon}</div><p>${msg}</p></div>`; }

if (new URLSearchParams(location.search).get('action') === 'gps') window.addEventListener('DOMContentLoaded', () => setTimeout(gps, 100));
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
</script>
