<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');
  :root { --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --bg: #0a0c0f; --card: #111318; --border: #1e2229; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; padding: 15px; max-width: 500px; margin: auto; }
  
  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; }
  
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  input { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
  .btn-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--orange); cursor: pointer; }

  .fuel-grid { display: flex; flex-wrap: wrap; gap: 5px; margin: 15px 0; }
  .fuel-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: #666; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }
  button { padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-family: 'Barlow Condensed'; cursor: pointer; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
  .st-header { display: flex; align-items: center; gap: 12px; }
  .logo { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #fff; flex-shrink: 0; }
  .st-info { flex: 1; min-width: 0; }
  .st-name { font-family: 'Barlow Condensed'; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .st-city { color: #555; font-size: 0.75rem; }
  .price { text-align: right; font-family: 'Barlow Condensed'; font-size: 1.6rem; font-weight: 900; }

  textarea { width: 100%; background: #000; color: var(--green); border: 1px solid var(--border); border-radius: 10px; padding: 10px; font-family: monospace; font-size: 0.8rem; margin-top: 10px; }
  .loader { width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou CP..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 LE MOINS CHER</button>
  <button class="btn-ghost" onclick="renderList()">📋 LISTE</button>
  <button class="btn-ghost" onclick="autoTikTok()">🎬 SCRIPT TIKTOK</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', lat, lon;

const FUEL_MAP = {
  gazole: ['gazole_prix','Gazole'], e10: ['e10_prix','E10'],
  sp98: ['sp98_prix','SP98'], e85: ['e85_prix','E85']
};

function getLogo(s) {
  const t = ((s.enseigne || s.nom || "") + " " + (s.adresse || "")).toUpperCase();
  if (t.includes('TOTAL')) return {t:'TE', c:'#ff3030'};
  if (t.includes('LECLERC')) return {t:'E.L', c:'#0066ad'};
  if (t.includes('CARREFOUR')) return {t:'C.F', c:'#3b5998'};
  if (t.includes('INTERMARCHE')) return {t:'I.M', c:'#ca2128'};
  if (t.includes('U') && (t.includes('SUPER') || t.includes('SYSTEME'))) return {t:'U', c:'#0055a4'};
  if (t.includes('ESSO')) return {t:'ES', c:'#ed1c24'};
  return {t:'⛽', c:'#333'};
}

function getP(s, f) {
  if (f === 'all') f = 'gazole';
  for (let k of FUEL_MAP[f]) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  return null;
}

function setFuel(f, b) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
  const d = await r.json();
  if (d.features.length) {
    lat = d.features[0].geometry.coordinates[1];
    lon = d.features[0].geometry.coordinates[0];
    fetchData();
  }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    lat = p.coords.latitude; lon = p.coords.longitude; fetchData();
  });
}

async function fetchData() {
  document.getElementById('result').innerHTML = '<div class="card"><div class="loader"></div> Recherche...</div>';
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=50&where=within_distance(geom%2C%20geom'POINT(${lon}%20${lat})'%2C%2020km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => ({
      ...s,
      nom: s.enseigne || s.nom || "Station",
      dist: Math.sqrt((s.geom.lat-lat)**2 + (s.geom.lon-lon)**2) * 111
    })).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { document.getElementById('result').innerHTML = "Erreur réseau"; }
}

function renderList() {
  let html = "";
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    const logo = getLogo(s);
    html += `
    <div class="card">
      <div class="st-header">
        <div class="logo" style="background:${logo.c}">${logo.t}</div>
        <div class="st-info">
          <div class="st-name">${s.nom}</div>
          <div class="st-city">${s.ville} • ${s.dist.toFixed(1)}km</div>
        </div>
        <div class="price">${p ? p.toFixed(3) : '---'}€</div>
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html || "Aucune station.";
}

function bestDeal() {
  let best = null, worst = null;
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    if (!p) return;
    if (!best || p < best.p) best = {s, p};
    if (!worst || p > worst.p) worst = {s, p};
  });
  if (!best) return;
  const logo = getLogo(best.s);
  document.getElementById('result').innerHTML = `
    <div class="card" style="border: 2px solid var(--green)">
      <div class="st-header">
        <div class="logo" style="background:${logo.c}">${logo.t}</div>
        <div class="st-name" style="color:var(--green)">MOINS CHER TROUVÉ</div>
      </div>
      <div style="text-align:center; padding:15px 0">
        <div style="font-size:3rem; font-weight:900; color:var(--green)">${best.p.toFixed(3)}€</div>
        <div style="color:#666">${best.s.nom} - ${best.s.ville}</div>
      </div>
      <button class="btn-primary wide" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${best.s.geom.lat},${best.s.geom.lon}')">Y ALLER</button>
    </div>`;
}

function autoTikTok() {
  let b = null, w = null;
  stations.forEach(s => {
    const p = getP(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p}; if (!w || p > w.p) w = {s, p};
  });
  if (!b) return;
  const gain = ((w.p - b.p)*50).toFixed(2);
  const txt = `🚨 ALERTE PRIX ESSENCE\n\nCher : ${w.p.toFixed(3)}€\nMoins cher : ${b.p.toFixed(3)}€\n\n💸 Tu gagnes ${gain}€ sur ton plein !\n📍 Ça se passe à ${b.s.ville} (${b.s.nom})`;
  document.getElementById('result').innerHTML = `<div class="card"><div class="st-name">SCRIPT TIKTOK</div><textarea rows="6">${txt}</textarea></div>`;
}
</script>
</body>
</html>
