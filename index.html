<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --danger: #f85149;
    --bg: #0a0c0f; --card: #111318; --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; padding: 20px 16px 80px; max-width: 540px; margin: auto; }

  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900; background: linear-gradient(135deg, var(--orange), var(--red)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 20px; }

  /* Recherche */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text] { flex: 1; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; }
  .btn-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--orange); cursor: pointer; font-size: 1.2rem; }

  /* Filtres */
  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: #555; font-size: 0.9rem; }
  input[type=range] { flex: 1; accent-color: var(--orange); }
  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
  .fuel-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: #666; font-size: 0.8rem; font-weight: 700; cursor: pointer; }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

  /* Actions */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }
  button { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }

  /* Station Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .station-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo-box { 
    width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1rem; color: #fff; flex-shrink: 0; text-align: center; line-height: 1;
  }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .station-city { color: #555; font-size: 0.8rem; }

  .price-main { text-align: right; }
  .price-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.7rem; font-weight: 900; line-height: 1; }
  .price-unit { font-size: 0.6rem; color: #555; font-weight: 700; }

  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2229; }
  .chip { padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; background: #1a1e25; color: #888; border: 1px solid var(--border); }
  .chip.active { border-color: var(--orange); color: var(--orange); }

  .loader { width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  textarea { width: 100%; background: #080a0d; color: var(--green); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.8rem; margin-top: 10px; }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>
<p class="subtitle">Prix en temps réel · Gien & France</p>

<div class="search-row">
  <input id="city" type="text" placeholder="Gien, 45500..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="radius-row">
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('rv').textContent=this.value+'km'">
  <span id="rv">15km</span>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('sp95',this)">SP95</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 TROUVER LE MOINS CHER</button>
  <button class="btn-ghost" onclick="renderList()">📋 LISTE</button>
  <button class="btn-ghost" onclick="renderStats()">📊 STATS</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', uLat, uLon;

const MAP = {
  gazole: ['gazole_prix','Gazole','DIESEL'], e10: ['e10_prix','E10'],
  sp98: ['sp98_prix','SP98'], sp95: ['sp95_prix','SP95'], e85: ['e85_prix','E85']
};

// LOGIQUE DES LOGOS : Détection par texte
function getLogo(s) {
  const t = ((s.enseigne || s.nom || "") + " " + (s.adresse || "")).toUpperCase();
  if (t.includes('TOTAL')) return {t:'TE', c:'#ff3030'};
  if (t.includes('LECLERC')) return {t:'E.L', c:'#0066ad'};
  if (t.includes('CARREFOUR')) return {t:'C.F', c:'#3b5998'};
  if (t.includes('INTERMARCHE')) return {t:'I.M', c:'#ca2128'};
  if (t.includes('U') && (t.includes('SUPER') || t.includes('SYSTEME'))) return {t:'U', c:'#0055a4'};
  if (t.includes('ESSO')) return {t:'ES', c:'#ed1c24'};
  if (t.includes('AVIA')) return {t:'AV', c:'#e30613'};
  if (t.includes('BP')) return {t:'BP', c:'#00a651'};
  if (t.includes('AUCHAN')) return {t:'AU', c:'#ff0000'};
  return {t:'⛽', c:'#333'};
}

function getP(s, f) {
  if (f === 'all') f = 'gazole';
  for (let k of MAP[f]) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  const arr = s.prix || s.Carburants || [];
  if (Array.isArray(arr)) {
    for (let p of arr) {
      let n = (p.nom || p['@nom'] || "").toLowerCase();
      let v = parseFloat(p.valeur || p['@valeur'] || p.prix || 0);
      if (v > 0 && MAP[f].some(m => n.includes(m.toLowerCase()))) return v;
    }
  }
  return null;
}

function setFuel(f, b) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  showLoad("Localisation...");
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
    const d = await r.json();
    if (d.features.length) {
      uLat = d.features[0].geometry.coordinates[1];
      uLon = d.features[0].geometry.coordinates[0];
      fetchData();
    }
  } catch(e) { showError("Ville introuvable"); }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    uLat = p.coords.latitude; uLon = p.coords.longitude; fetchData();
  }, () => showError("GPS refusé"));
}

async function fetchData() {
  const rad = document.getElementById('radius').value;
  showLoad("Récupération des prix...");
  // On utilise un filtre géographique direct pour plus de rapidité
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=100&where=within_distance(geom%2C%20geom'POINT(${uLon}%20${uLat})'%2C%20${rad}km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => ({
      ...s,
      // CORRECTION NOM : On vérifie l'enseigne d'abord
      nom: s.enseigne || s.nom || "Station",
      dist: calcDist(uLat, uLon, s.geom.lat, s.geom.lon)
    })).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { showError("Erreur réseau"); }
}

function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderList() {
  if (!stations.length) return showError("Aucune station trouvée");
  let html = `<p style="color:#555; font-size:0.7rem; margin-bottom:10px; font-weight:700">📍 ${stations.length} STATIONS À PROXIMITÉ</p>`;
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    const logo = getLogo(s);
    html += `
    <div class="card">
      <div class="station-header">
        <div class="logo-box" style="background:${logo.c}">${logo.t}</div>
        <div class="station-info">
          <div class="station-name">${s.nom}</div>
          <div class="station-city">${s.ville} • ${s.dist.toFixed(1)} km</div>
        </div>
        <div class="price-main">
          <div class="price-val">${p ? p.toFixed(3) : '---'}</div>
          <div class="price-unit">€ / LITRE</div>
        </div>
      </div>
      <div class="chips">
        ${Object.keys(MAP).map(f => {
          const val = getP(s, f);
          return val ? `<div class="chip ${activeFuel===f?'active':''}">${f.toUpperCase()} ${val.toFixed(3)}</div>` : '';
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html;
}

function bestDeal() {
  if (!stations.length) return;
  let best = null;
  stations.forEach(s => {
    const p = getP(s, activeFuel);
    if (p && (!best || p < best.p)) best = {s, p};
  });
  if (best) {
    const logo = getLogo(best.s);
    document.getElementById('result').innerHTML = `
      <div class="card" style="border-color:var(--green); background: #1a2a1a;">
        <div class="station-header">
           <div class="logo-box" style="background:${logo.c}">${logo.t}</div>
           <div class="station-name" style="color:var(--green)">LE MOINS CHER À PROXIMITÉ</div>
        </div>
        <div style="text-align:center; padding:20px 0;">
          <div class="station-name" style="font-size:1.5rem">${best.s.nom}</div>
          <div style="font-size:3.5rem; font-weight:900; color:var(--green); font-family:'Barlow Condensed'">${best.p.toFixed(3)}€</div>
          <div style="color:#aaa">${best.s.ville} (${best.s.dist.toFixed(1)} km)</div>
        </div>
        <button class="btn-primary wide" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${best.s.geom.lat},${best.s.geom.lon}')">Y ALLER MAINTENANT</button>
      </div>`;
  }
}

function showLoad(m) { document.getElementById('result').innerHTML = `<div class="card"><div class="loader"></div>${m}</div>`; }
function showError(m) { document.getElementById('result').innerHTML = `<div class="card" style="border-color:var(--danger)">❌ ${m}</div>`; }
</script>
</body>
</html>
