<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel Pro ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;600;700&display=swap');
  
  :root {
    --orange: #ff9f0a; --red: #ff453a; --green: #32d74b; --blue: #0a84ff;
    --bg: #000000; --card: #1c1c1e; --border: #2c2c2e; --text: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 16px; max-width: 500px; margin: auto; line-height: 1.4; }

  h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; background: linear-gradient(180deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; text-align: left; }

  /* Input Style Pro */
  .search-container { position: relative; margin-bottom: 20px; display: flex; gap: 8px; }
  input { flex: 1; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem; transition: 0.2s; }
  input:focus { border-color: var(--orange); }
  .btn-icon { width: 50px; height: 50px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--orange); }

  /* Fuel Selector */
  .fuel-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 10px; scrollbar-width: none; }
  .fuel-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: #8e8e93; font-size: 0.8rem; font-weight: 700; white-space: nowrap; cursor: pointer; }
  .fuel-btn.active[data-f="gazole"] { background: #ffd60a; color: #000; border-color: #ffd60a; }
  .fuel-btn.active[data-f="e10"], .fuel-btn.active[data-f="sp98"] { background: var(--green); color: #000; border-color: var(--green); }
  .fuel-btn.active[data-f="e85"] { background: var(--blue); color: #fff; border-color: var(--blue); }
  .fuel-btn.active[data-f="all"] { background: #fff; color: #000; border-color: #fff; }

  /* Action Buttons */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .btn-best { grid-column: 1 / -1; padding: 16px; background: #fff; border: none; border-radius: 12px; font-weight: 800; font-family: 'Barlow Condensed'; font-size: 1.1rem; color: #000; text-transform: uppercase; }
  .btn-tool { padding: 12px; background: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 10px; font-weight: 600; font-size: 0.85rem; cursor: pointer; }

  /* Station Card Style */
  .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; border: 1px solid transparent; transition: 0.2s; }
  .card:active { transform: scale(0.98); background: #2c2c2e; }
  
  .logo-circle { 
    width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; 
    font-weight: 900; font-size: 0.75rem; text-align: center; color: #fff; flex-shrink: 0;
    font-family: 'Barlow Condensed'; line-height: 1; text-transform: uppercase;
  }
  
  .st-content { flex: 1; min-width: 0; }
  .st-name { font-weight: 700; font-size: 1.05rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .st-meta { color: #8e8e93; font-size: 0.8rem; font-weight: 500; }

  .st-price { text-align: right; }
  .price-val { font-family: 'Barlow Condensed'; font-size: 1.7rem; font-weight: 900; line-height: 1; }
  .price-label { font-size: 0.6rem; color: #48484a; font-weight: 800; margin-top: 2px; }

  /* TikTok Output */
  textarea { width: 100%; background: #1c1c1e; color: var(--green); border: 1px solid var(--border); border-radius: 12px; padding: 16px; font-family: monospace; font-size: 0.9rem; margin-top: 15px; resize: none; }
  
  .loader { border: 3px solid #333; border-top: 3px solid #fff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 20px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>CarbuFuel <span style="font-weight:400; color:#444">PRO</span></h1>

<div class="search-container">
  <input id="city" type="text" placeholder="Gien, 45500..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="fuel-bar">
  <button class="fuel-btn active" data-f="all" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" data-f="gazole" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" data-f="e10" onclick="setFuel('e10',this)">SP95-E10</button>
  <button class="fuel-btn" data-f="sp98" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" data-f="e85" onclick="setFuel('e85',this)">E85</button>
</div>

<div class="action-grid">
  <button class="btn-best" onclick="bestDeal()">🔥 TROUVER LE PRIX LE PLUS BAS</button>
  <button class="btn-tool" onclick="autoTikTok()">🎬 SCRIPT TIKTOK</button>
  <button class="btn-tool" onclick="generateVideo()">🎥 PROMPT VIDÉO</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', lat, lon;

// LOGIQUE LOGO : Mots-clés -> Nom affiché / Couleur / Label Logo
const BRAND_DB = [
  { match: 'TOTAL', name: 'TOTALENERGIES', color: '#ff3030', label: 'TOTAL' },
  { match: 'LECLERC', name: 'E.LECLERC', color: '#0066ad', label: 'E.L' },
  { match: 'CARREFOUR', name: 'CARREFOUR', color: '#3b5998', label: 'C.F' },
  { match: 'INTERMARCHE', name: 'INTERMARCHÉ', color: '#ca2128', label: 'I.M' },
  { match: 'SYSTEME U', name: 'SYSTÈME U', color: '#0055a4', label: 'U' },
  { match: 'SUPER U', name: 'SUPER U', color: '#0055a4', label: 'U' },
  { match: 'ESSO', name: 'ESSO', color: '#ed1c24', label: 'ESSO' },
  { match: 'AVIA', name: 'AVIA', color: '#e30613', label: 'AVIA' },
  { match: 'BP', name: 'BP', color: '#00a651', label: 'BP' },
  { match: 'AUCHAN', name: 'AUCHAN', color: '#e1000f', label: 'AU' },
  { match: 'CASINO', name: 'CASINO', color: '#006a32', label: 'CAS' }
];

function identifyStation(s) {
  // On scanne l'enseigne, le nom et l'adresse pour être sûr
  const raw = (s.enseigne + " " + s.nom + " " + s.adresse).toUpperCase();
  for (let b of BRAND_DB) {
    if (raw.includes(b.match)) return b;
  }
  // Par défaut si non reconnu
  return { name: s.enseigne || s.nom || "STATION", color: '#48484a', label: '⛽' };
}

function getPrice(s, f) {
  const fuel = f === 'all' ? 'gazole' : f;
  const keys = { gazole:['gazole_prix','Gazole'], e10:['e10_prix','E10'], sp98:['sp98_prix','SP98'], e85:['e85_prix','E85'] };
  for (let k of keys[fuel]) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  return null;
}

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  document.getElementById('result').innerHTML = '<div class="loader"></div>';
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
  const d = await r.json();
  if (d.features.length) {
    [lon, lat] = d.features[0].geometry.coordinates;
    fetchData();
  }
}

function gps() {
  navigator.geolocation.getCurrentPosition(p => {
    lat = p.coords.latitude; lon = p.coords.longitude; fetchData();
  });
}

async function fetchData() {
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=60&where=within_distance(geom%2C%20geom'POINT(${lon}%20${lat})'%2C%2025km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => ({
      ...s,
      info: identifyStation(s),
      dist: Math.sqrt((s.geom.lat-lat)**2 + (s.geom.lon-lon)**2) * 111
    })).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { document.getElementById('result').innerHTML = "Erreur de connexion"; }
}

function renderList() {
  let html = "";
  stations.forEach(s => {
    const p = getPrice(s, activeFuel);
    html += `
    <div class="card" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${s.geom.lat},${s.geom.lon}')">
      <div class="logo-circle" style="background:${s.info.color}">${s.info.label}</div>
      <div class="st-content">
        <div class="st-name">${s.info.name}</div>
        <div class="st-meta">${s.ville} • ${s.dist.toFixed(1)} km</div>
      </div>
      <div class="st-price">
        <div class="price-val" style="color:${p ? '#fff' : '#444'}">${p ? p.toFixed(3) : '---'}</div>
        <div class="price-label">€ / LITRE</div>
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html;
}

function bestDeal() {
  let best = null;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel);
    if (p && (!best || p < best.p)) best = {s, p};
  });
  if (!best) return;
  document.getElementById('result').innerHTML = `
    <div class="card" style="border: 2px solid var(--green); background:rgba(50, 215, 75, 0.1)">
      <div class="logo-circle" style="background:${best.s.info.color}">${best.s.info.label}</div>
      <div class="st-content">
        <div class="st-name" style="color:var(--green)">MOINS CHER ICI</div>
        <div class="st-meta">${best.s.info.name} • ${best.s.ville}</div>
      </div>
      <div class="st-price">
        <div class="price-val" style="color:var(--green); font-size:2.2rem">${best.p.toFixed(3)}€</div>
      </div>
    </div>
    <button class="btn-best" style="margin-top:10px" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${best.s.geom.lat},${best.s.geom.lon}')">📍 Y ALLER MAINTENANT</button>`;
}

function autoTikTok() {
  let b = null, w = null;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p}; if (!w || p > w.p) w = {s, p};
  });
  const gain = ((w.p - b.p) * 50).toFixed(2);
  const script = `🚨 ALERTE PRIX ESSENCE\n\nStation CHÈRE : ${w.p.toFixed(3)}€\nStation MOINS CHÈRE : ${b.p.toFixed(3)}€\n\n💸 Gain de ${gain}€ sur ton plein !\n📍 Ça se passe à ${b.s.ville}\n⛽ Enseigne : ${b.s.info.name}`;
  document.getElementById('result').innerHTML = `<textarea rows="8" readonly>${script}</textarea>`;
}

function generateVideo() {
  let b = null, w = null;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p}; if (!w || p > w.p) w = {s, p};
  });
  const prompt = `Vertical TikTok Video, 4k. Background: blur gas station. Text 1: "DON'T PAY ${w.p.toFixed(3)}€/L". Text 2: "GO TO ${b.s.info.name} in ${b.s.ville}". Text 3: "${b.p.toFixed(3)}€ ONLY. Save ${((w.p-b.p)*50).toFixed(2)}€"`;
  document.getElementById('result').innerHTML = `<textarea rows="6" readonly>${prompt}</textarea>`;
}
</script>
</body>
</html>
