<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500; --red: #e05c2a; --green: #3fb950; --danger: #f85149;
    --bg: #0a0c0f; --card: #111318; --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif;
    min-height: 100vh; padding: 20px 16px 60px; max-width: 540px; margin: auto;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif; font-size: 2.4rem; font-weight: 900;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
  }
  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 20px; }
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  input[type=text], select {
    flex: 1; padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; color: #fff; font-size: 1rem; outline: none;
  }
  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; color: #666; font-size: .85rem; }
  input[type=range] { flex: 1; accent-color: var(--orange); }
  button {
    padding: 12px 18px; border-radius: 10px; border: none; cursor: pointer;
    font-weight: 700; font-family: 'Barlow Condensed', sans-serif; transition: transform .1s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }
  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .fuel-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: #888; font-size: .85rem; cursor: pointer;
  }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 10px; }
  .station-logo {
    width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; margin-right: 12px; border: 1px solid rgba(255,255,255,.1); overflow: hidden;
  }
  .station-logo img { width: 100%; height: 100%; object-fit: contain; }
  .station-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .prices-mini { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .price-chip { padding: 2px 7px; border-radius: 5px; font-size: .78rem; background: #1a1e25; border: 1px solid var(--border); }
  .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="offlineBanner" style="display:none; background:#2a1a0a; color:var(--orange); padding:10px; margin-bottom:10px; border-radius:10px; font-size:.85rem; border:1px solid var(--orange)">
  📡 Mode hors-ligne <button onclick="forceUpdate()" style="float:right; background:var(--orange); border:none; padding:2px 8px; border-radius:4px; font-weight:bold">Update</button>
</div>

<h1>⛽ CarbuFuel</h1>
<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou CP..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn-ghost" onclick="search()">🔍</button>
  <button class="btn-ghost" onclick="gps()">📍</button>
</div>

<div class="radius-row">
  <label>Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal" style="color:var(--orange); font-weight:bold">15km</span>
</div>

<div class="fuel-grid" id="fuelGrid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">Gazole</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
</div>

<div id="result"></div>

<script>
let userLat = null, userLon = null, userDep = '', stations = [], activeFuel = 'all';

// --- CONFIG LOGOS LOCAUX ---
const LOGO_PATH = './assets/logos/';
const BRAND_LOGOS = {
  'total': 'total.png', 'totalenergies': 'total.png', 'leclerc': 'leclerc.png',
  'carrefour': 'carrefour.png', 'intermarche': 'intermarche.png', 'systemeu': 'systemeu.png',
  'auchan': 'auchan.png', 'esso': 'esso.png', 'bp': 'bp.png', 'shell': 'shell.png',
  'casino': 'casino.png', 'netto': 'netto.png', 'avia': 'avia.png'
};

const BRAND_STYLES = {
  'total': {bg:'#c8102e', c:'#fff'}, 'leclerc': {bg:'#003ca6', c:'#f7c300'},
  'carrefour': {bg:'#004a97', c:'#fff'}, 'intermarche': {bg:'#e30613', c:'#fff'}
};

function stationLogoBadge(s) {
  const brandRaw = (s.enseigne || s.nom || '').toLowerCase();
  let logoFile = null;
  for (let key in BRAND_LOGOS) { if (brandRaw.includes(key)) { logoFile = BRAND_LOGOS[key]; break; } }

  let bg = '#1e2229', color = '#aaa';
  for (let key in BRAND_STYLES) { if (brandRaw.includes(key)) { bg = BRAND_STYLES[key].bg; color = BRAND_STYLES[key].c; break; } }

  const abbr = brandRaw.substring(0,2).toUpperCase();

  if (logoFile) {
    return `<div class="station-logo" style="background:#fff;padding:4px">
      <img src="${LOGO_PATH}${logoFile}" alt="logo" 
           onerror="this.parentElement.style.background='${bg}'; this.parentElement.innerHTML='<span style=\\'color:${color};font-weight:900\\'>${abbr}</span>';">
    </div>`;
  }
  return `<div class="station-logo" style="background:${bg};color:${color};font-weight:900">${abbr}</div>`;
}

// --- LOGIQUE API ---
async function search() {
  const q = document.getElementById("city").value;
  const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
  const d = await r.json();
  if (d.features.length) {
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    userDep = d.features[0].properties.postcode.substring(0,2);
    load();
  }
}

async function load() {
  document.getElementById("result").innerHTML = '<div class="card"><span class="loader"></span> Recherche...</div>';
  const radius = document.getElementById("radius").value;
  const url = `https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radius*1000}`;
  const r = await fetch(url);
  const data = await r.json();
  stations = data.map(s => ({
    ...s,
    nom: s.Brand?.name || s.name || "Station",
    enseigne: s.Brand?.name || "",
    dist: haversine(userLat, userLon, s.Coordinates.latitude, s.Coordinates.longitude)
  })).sort((a,b) => a.dist - b.dist);
  render();
}

function render() {
  let html = `<div class="card"><div style="font-weight:bold;margin-bottom:10px">📍 ${stations.length} stations trouvées</div>`;
  stations.forEach(s => {
    html += `<div class="station-row">
      ${stationLogoBadge(s)}
      <div style="flex:1">
        <div style="font-weight:bold">${s.nom} <span style="color:#666;font-size:0.8rem">· ${s.dist.toFixed(1)}km</span></div>
        <div style="font-size:0.8rem;color:#555">${s.Address?.street_line || ''}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById("result").innerHTML = html;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>
