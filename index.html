<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CarbuFuel ⛽</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;600&display=swap');

    :root {
      --orange: #f0a500;
      --red:    #e05c2a;
      --green:  #3fb950;
      --danger: #f85149;
      --blue:   #58a6ff;
      --bg:     #0a0c0f;
      --card:   #111318;
      --card2:  #161b22;
      --border: #1e2229;
      --text:   #e6edf3;
      --muted:  #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 80px;
      max-width: 560px;
      margin: auto;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header { margin-bottom: 22px; }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--orange), var(--red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .subtitle { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }

    /* ── Search ──────────────────────────────────────────── */
    .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
    input[type=text] {
      flex: 1;
      padding: 12px 16px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Barlow', sans-serif;
      outline: none;
      transition: border-color .2s;
    }
    input[type=text]:focus { border-color: var(--orange); }
    input[type=text]::placeholder { color: #3d4450; }

    .icon-btn {
      width: 46px; height: 46px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .icon-btn:hover  { background: var(--card2); border-color: var(--orange); }
    .icon-btn.active { background: var(--orange); border-color: var(--orange); color: #000; }
    .icon-btn:disabled { opacity: .5; cursor: default; }

    /* ── Radius ──────────────────────────────────────────── */
    .radius-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      color: var(--muted); font-size: .85rem;
    }
    input[type=range] { flex: 1; accent-color: var(--orange); cursor: pointer; }
    .radius-val { color: var(--orange); font-weight: 700; min-width: 38px; text-align: right; }

    /* ── Fuel chips ──────────────────────────────────────── */
    .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .fuel-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: .85rem;
      cursor: pointer;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      letter-spacing: .3px;
      transition: all .15s;
    }
    .fuel-btn:hover  { border-color: var(--orange); color: var(--text); }
    .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

    /* ── Sort row ────────────────────────────────────────── */
    .sort-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
      font-size: .82rem; color: var(--muted);
    }
    .sort-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      cursor: pointer;
      transition: all .15s;
    }
    .sort-btn.active   { border-color: var(--orange); color: var(--orange); }
    .sort-btn:disabled { opacity: .35; cursor: default; }

    /* ── Results header ──────────────────────────────────── */
    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 2px 10px;
      font-size: .82rem; color: var(--muted);
    }
    .count-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: .78rem; color: var(--orange); font-weight: 700;
    }

    /* ── Station card ────────────────────────────────────── */
    .station-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: border-color .2s;
    }
    .station-card:hover { border-color: #2d333b; }

    .station-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }

    /* Logo */
    .station-logo {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
      border: 1px solid rgba(255,255,255,.07);
    }
    .station-logo img {
      width: 100%; height: 100%; object-fit: contain; padding: 5px;
    }
    .logo-abbr {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 1rem; letter-spacing: .5px;
    }

    /* Info texte */
    .station-info { flex: 1; min-width: 0; }
    .station-name {
      font-weight: 700; font-size: 1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .station-address {
      font-size: .78rem; color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .station-dist {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .82rem; color: var(--blue); margin-top: 3px;
    }

    /* Prix */
    .fuel-prices { display: flex; flex-wrap: wrap; gap: 6px; }
    .price-pill {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 6px 12px; min-width: 64px;
    }
    .price-pill.best { border-color: var(--green); background: rgba(63,185,80,.08); }
    .price-fuel-name {
      font-size: .68rem; color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    }
    .price-amount {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem; font-weight: 900; color: var(--text);
      line-height: 1.1;
    }
    .price-amount.cheap     { color: var(--green); }
    .price-amount.expensive { color: var(--danger); }
    .price-updated { font-size: .6rem; color: #3a404a; margin-top: 1px; }
    .no-price { font-size: .8rem; color: #3a404a; }

    /* Footer carte */
    .station-footer {
      display: flex; justify-content: flex-end; margin-top: 10px;
    }
    .maps-link {
      font-size: .78rem; color: var(--blue);
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 7px;
      transition: background .15s;
    }
    .maps-link:hover { background: rgba(88,166,255,.1); }

    /* ── Loader / états ──────────────────────────────────── */
    .loader {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #2d333b;
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 36px 20px;
      text-align: center; color: var(--muted);
    }
    .state-card .state-icon { font-size: 2.6rem; margin-bottom: 10px; }
    .state-card p { font-size: .88rem; line-height: 1.7; }
    .state-card.error { border-color: rgba(248,81,73,.25); }
    .state-card.error p { color: var(--danger); }
    .state-card.loading { border-color: rgba(240,165,0,.15); }
  </style>
</head>
<body>

<div class="header">
  <h1>⛽ CarbuFuel</h1>
  <p class="subtitle">Prix carburants en temps réel · France</p>
</div>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou code postal…"
         autocomplete="off" autocorrect="off" spellcheck="false"
         onkeydown="if(event.key==='Enter')searchCity()">
  <button class="icon-btn" id="searchBtn" onclick="searchCity()" title="Rechercher">🔍</button>
  <button class="icon-btn" id="gpsBtn"    onclick="gps()"        title="Me localiser">📍</button>
</div>

<div class="radius-row">
  <label for="radius">Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15"
         oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal" class="radius-val">15km</span>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" onclick="setFuel('Gazole',this)">Gazole</button>
  <button class="fuel-btn" onclick="setFuel('SP95',this)">SP95</button>
  <button class="fuel-btn" onclick="setFuel('E10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('SP98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('E85',this)">E85</button>
  <button class="fuel-btn" onclick="setFuel('GPLc',this)">GPL</button>
</div>

<div class="sort-row">
  <span>Trier par :</span>
  <button class="sort-btn active" id="sortDist"  onclick="setSort('dist')">📍 Distance</button>
  <button class="sort-btn"        id="sortPrice" onclick="setSort('price')" disabled>💰 Prix</button>
</div>

<div id="result">
  <div class="state-card">
    <div class="state-icon">⛽</div>
    <p>Entrez une ville, un code postal<br>ou activez le GPS pour démarrer.</p>
  </div>
</div>

<script>
'use strict';

/* ── État global ──────────────────────────────────────────────────────────── */
let userLat    = null;
let userLon    = null;
let stations   = [];
let activeFuel = 'all';
let sortMode   = 'dist';   // 'dist' | 'price'
let isLoading  = false;

/* ── Données marques ─────────────────────────────────────────────────────── */
const BRAND_MAP = {
  'total':        { bg: '#c8102e', c: '#fff', domain: 'totalenergies.fr' },
  'leclerc':      { bg: '#003ca6', c: '#f7c300', domain: 'e.leclerc' },
  'carrefour':    { bg: '#004a97', c: '#fff', domain: 'carrefour.fr' },
  'intermarche':  { bg: '#e30613', c: '#fff', domain: 'intermarche.com' },
  'intermar':     { bg: '#e30613', c: '#fff', domain: 'intermarche.com' },
  'systeme u':    { bg: '#c00000', c: '#fff', domain: 'magasins-u.com' },
  'super u':      { bg: '#c00000', c: '#fff', domain: 'magasins-u.com' },
  'hyper u':      { bg: '#c00000', c: '#fff', domain: 'magasins-u.com' },
  'auchan':       { bg: '#e10600', c: '#fff', domain: 'auchan.fr' },
  'esso':         { bg: '#003087', c: '#fff', domain: 'esso.fr' },
  'bp':           { bg: '#007a33', c: '#fff', domain: 'bp.com' },
  'shell':        { bg: '#fbce07', c: '#cc0000', domain: 'shell.fr' },
  'avia':         { bg: '#e30613', c: '#fff', domain: 'avia-france.fr' },
  'casino':       { bg: '#c41230', c: '#fff', domain: 'casino.fr' },
  'cora':         { bg: '#e30613', c: '#fff', domain: 'cora.fr' },
  'dyneff':       { bg: '#004990', c: '#fff', domain: '' },
  'neopass':      { bg: '#ff6600', c: '#fff', domain: '' },
};

/* ── Géocoding ───────────────────────────────────────────────────────────── */

async function searchCity() {
  const q = document.getElementById('city').value.trim();
  if (!q) return;
  setSearching(true);
  try {
    const r = await fetch(
      `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (!d.features?.length) {
      showState('🔍', 'Ville ou code postal non trouvé. Essayez autrement.');
      return;
    }
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch {
    showState('⚠️', 'Erreur réseau lors de la recherche. Vérifiez votre connexion.', true);
  } finally {
    setSearching(false);
  }
}

function gps() {
  if (!navigator.geolocation) {
    showState('📵', 'La géolocalisation n\'est pas disponible sur ce navigateur.');
    return;
  }
  const btn = document.getElementById('gpsBtn');
  btn.textContent = '⏳';
  btn.classList.add('active');
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      resetGpsBtn();
      load();
    },
    err => {
      resetGpsBtn();
      const msgs = {
        1: 'Permission refusée. Autorisez la localisation dans les paramètres du navigateur.',
        2: 'Position indisponible. Vérifiez que le GPS est activé.',
        3: 'Délai dépassé. Réessayez dans quelques instants.',
      };
      showState('📍', msgs[err.code] || 'Impossible de récupérer votre position.', true);
    },
    { timeout: 12000, maximumAge: 60000, enableHighAccuracy: false }
  );
}

function resetGpsBtn() {
  const btn = document.getElementById('gpsBtn');
  btn.textContent = '📍';
  btn.classList.remove('active');
  btn.disabled = false;
}

function setSearching(on) {
  const btn = document.getElementById('searchBtn');
  btn.textContent = on ? '⏳' : '🔍';
  btn.disabled = on;
}

/* ── Chargement API 2aaz ─────────────────────────────────────────────────── */

async function load() {
  if (isLoading) return;
  isLoading = true;
  const radiusM = parseInt(document.getElementById('radius').value) * 1000;
  showLoading();

  try {
    const url = `https://api.prix-carburants.2aaz.fr/stations/around/${userLat},${userLon}/?m=${radiusM}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const raw = await r.json();

    if (!Array.isArray(raw) || raw.length === 0) {
      showState('🏜️',
        `Aucune station dans ${document.getElementById('radiusVal').textContent}.\n` +
        'Essayez d\'élargir le rayon de recherche.');
      return;
    }

    /* Normalisation : on garde uniquement les stations avec coordonnées valides */
    stations = raw
      .filter(s => s.Coordinates?.latitude && s.Coordinates?.longitude)
      .map(s => ({
        id:      s.id,
        nom:     s.Brand?.name || s.name || 'Station',
        brand:   (s.Brand?.name || s.name || '').toLowerCase()
                   .normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim(),
        lat:     s.Coordinates.latitude,
        lon:     s.Coordinates.longitude,
        address: s.Address?.street_line || '',
        city:    s.Address?.city_line   || '',
        fuels:   Array.isArray(s.Fuels) ? s.Fuels : [],
        dist:    haversine(userLat, userLon,
                           s.Coordinates.latitude,
                           s.Coordinates.longitude),
      }));

    render();
  } catch (e) {
    showState('❌', `Erreur lors du chargement. (${e.message})`, true);
  } finally {
    isLoading = false;
  }
}

/* ── Rendu principal ─────────────────────────────────────────────────────── */

function render() {
  /* 1. Filtrage */
  let filtered = stations;
  if (activeFuel !== 'all') {
    filtered = stations.filter(s =>
      s.fuels.some(f =>
        f.shortName === activeFuel &&
        f.available !== false &&
        f.Price?.amount != null
      )
    );
  }

  if (filtered.length === 0) {
    showState('🔍',
      activeFuel === 'all'
        ? 'Aucune station trouvée.'
        : `Aucune station ne propose du <strong>${activeFuel}</strong> dans ce rayon.`
    );
    return;
  }

  /* 2. Prix min / max pour coloration relative */
  let minPrice = null, maxPrice = null;
  if (activeFuel !== 'all') {
    const prices = filtered
      .map(s => s.fuels.find(f => f.shortName === activeFuel)?.Price?.amount)
      .filter(p => p != null);
    if (prices.length > 1) {
      minPrice = Math.min(...prices);
      maxPrice = Math.max(...prices);
    }
  }

  /* 3. Tri */
  const sorted = [...filtered];
  if (sortMode === 'price' && activeFuel !== 'all') {
    sorted.sort((a, b) => {
      const pa = a.fuels.find(f => f.shortName === activeFuel)?.Price?.amount ?? Infinity;
      const pb = b.fuels.find(f => f.shortName === activeFuel)?.Price?.amount ?? Infinity;
      return pa - pb;
    });
  } else {
    sorted.sort((a, b) => a.dist - b.dist);
  }

  /* 4. HTML */
  const radiusLabel = document.getElementById('radiusVal').textContent;
  let html = `<div class="results-header">
    <span>${sorted.length} station${sorted.length > 1 ? 's' : ''} trouvée${sorted.length > 1 ? 's' : ''}</span>
    <span class="count-badge">${radiusLabel}</span>
  </div>`;

  for (const s of sorted) html += buildCard(s, minPrice, maxPrice);

  document.getElementById('result').innerHTML = html;
}

function buildCard(s, minPrice, maxPrice) {
  const address  = [s.address, s.city].filter(Boolean).join(' · ');
  const mapsUrl  = `https://maps.google.com/?q=${s.lat},${s.lon}`;

  /* Carburants visibles selon le filtre actif */
  const fuelRows = (activeFuel === 'all'
    ? s.fuels.filter(f => f.available !== false && f.Price?.amount != null)
    : s.fuels.filter(f => f.shortName === activeFuel && f.available !== false && f.Price?.amount != null)
  ).sort((a, b) => (a.Price?.amount ?? 0) - (b.Price?.amount ?? 0));

  let pricesHtml = '';
  if (fuelRows.length === 0) {
    pricesHtml = '<span class="no-price">Prix non disponibles</span>';
  } else {
    for (const f of fuelRows) {
      const price = f.Price.amount;
      const isBest = activeFuel !== 'all' && price === minPrice && minPrice !== maxPrice;
      let priceClass = '';
      if (minPrice !== null && maxPrice !== null) {
        if (price <= minPrice)      priceClass = 'cheap';
        else if (price >= maxPrice) priceClass = 'expensive';
      }
      const age = f.Price.last_update ? formatAge(f.Price.last_update) : '';
      pricesHtml += `<div class="price-pill${isBest ? ' best' : ''}">
        <span class="price-fuel-name">${escHtml(f.shortName)}</span>
        <span class="price-amount${priceClass ? ' ' + priceClass : ''}">${price.toFixed(3)}€</span>
        ${age ? `<span class="price-updated">${age}</span>` : ''}
      </div>`;
    }
  }

  return `<div class="station-card">
    <div class="station-top">
      ${buildLogo(s.brand, s.nom)}
      <div class="station-info">
        <div class="station-name">${escHtml(s.nom)}</div>
        ${address ? `<div class="station-address">${escHtml(address)}</div>` : ''}
        <div class="station-dist">📍 ${s.dist.toFixed(1)} km</div>
      </div>
    </div>
    <div class="fuel-prices">${pricesHtml}</div>
    <div class="station-footer">
      <a class="maps-link" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">
        🗺️ Ouvrir dans Maps
      </a>
    </div>
  </div>`;
}

/* ── Logo / badge marque ─────────────────────────────────────────────────── */

function buildLogo(brandNormalized, nom) {
  let style = { bg: '#1e2229', c: '#7d8590', domain: '' };
  for (const key of Object.keys(BRAND_MAP)) {
    if (brandNormalized.includes(key)) { style = BRAND_MAP[key]; break; }
  }
  const abbr = nom.replace(/[^a-zA-Z\u00C0-\u024F]/g, '').slice(0, 2).toUpperCase() || '??';

  if (style.domain) {
    /*
     * On utilise des data-attributes pour éviter l'enfer des guillemets
     * dans onerror inline. imgFallback() lit ces attributs proprement.
     */
    return `<div class="station-logo">
      <img src="https://logo.clearbit.com/${style.domain}"
           alt="${escHtml(abbr)}"
           loading="lazy"
           data-abbr="${escHtml(abbr)}"
           data-bg="${escHtml(style.bg)}"
           data-fg="${escHtml(style.c)}"
           onerror="imgFallback(this)">
    </div>`;
  }
  return `<div class="logo-abbr" style="background:${style.bg};color:${style.c}">${abbr}</div>`;
}

/* Appelé quand clearbit renvoie une erreur → remplace proprement le conteneur */
function imgFallback(img) {
  const abbr = img.dataset.abbr || '?';
  const bg   = img.dataset.bg   || '#1e2229';
  const fg   = img.dataset.fg   || '#aaa';
  const wrapper = img.closest('.station-logo');
  if (!wrapper) return;
  const badge = document.createElement('div');
  badge.className = 'logo-abbr';
  badge.style.cssText = `background:${bg};color:${fg}`;
  badge.textContent = abbr;
  wrapper.replaceWith(badge);
}

/* ── Utilitaires ─────────────────────────────────────────────────────────── */

function haversine(lat1, lon1, lat2, lon2) {
  const R    = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a    = Math.sin(dLat/2)**2
             + Math.cos(lat1 * Math.PI/180)
             * Math.cos(lat2 * Math.PI/180)
             * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

function formatAge(iso) {
  try {
    const h = (Date.now() - new Date(iso).getTime()) / 3600000;
    if (h < 1)   return 'à l\'instant';
    if (h < 24)  return `${Math.floor(h)}h`;
    return `${Math.floor(h / 24)}j`;
  } catch { return ''; }
}

function showLoading() {
  document.getElementById('result').innerHTML =
    `<div class="state-card loading">
      <span class="loader"></span> Chargement des stations…
    </div>`;
}

function showState(icon, msg, isError = false) {
  document.getElementById('result').innerHTML =
    `<div class="state-card${isError ? ' error' : ''}">
      <div class="state-icon">${icon}</div>
      <p>${msg}</p>
    </div>`;
}

/* ── Contrôles ───────────────────────────────────────────────────────────── */

function setFuel(f, btn) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  /* Tri par prix n'a de sens qu'avec un carburant spécifique */
  const priceBtn = document.getElementById('sortPrice');
  priceBtn.disabled = (f === 'all');
  if (f === 'all' && sortMode === 'price') setSort('dist');
  else if (stations.length) render();
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortDist').classList.toggle('active',  mode === 'dist');
  document.getElementById('sortPrice').classList.toggle('active', mode === 'price');
  if (stations.length) render();
}

/* ── Raccourci PWA (?action=gps dans le manifest) ────────────────────────── */
if (new URLSearchParams(location.search).get('action') === 'gps') {
  window.addEventListener('DOMContentLoaded', () => gps());
}

/* ── Service Worker ──────────────────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
