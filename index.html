<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarbuFuel V4 🚀</title>
<style>
body{background:#0a0c0f;color:#fff;font-family:sans-serif;padding:20px;text-align:center}
button{padding:14px;margin:6px;border-radius:10px;border:none;cursor:pointer;font-weight:bold}
.primary{background:linear-gradient(135deg,#f0a500,#e05c2a);color:#000}
.card{background:#111;padding:20px;margin:15px 0;border-radius:14px;border:1px solid #222;animation:fade .4s}
.big{font-size:26px;font-weight:bold}
.green{color:#3fb950}
.red{color:#f85149}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>
<body><h1>⛽ CarbuFuel V4</h1><input id="city" placeholder="Ville...">
<br>
<button onclick="search()">Rechercher</button>
<button onclick="gps()">GPS</button>
<br>
<button class="primary" onclick="bestDeal()">🔥 Meilleur prix</button>
<button onclick="scanExpensive()">⚠️ Stations chères</button><div id="result"></div><script>
let userLat=null,userLon=null,stations=[];

function haversine(a,b,c,d){
const R=6371;
const dLat=(c-a)*Math.PI/180;
const dLon=(d-b)*Math.PI/180;
const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function search(){
const q=document.getElementById("city").value;
const r=await fetch(`https://api-adresse.data.gouv.fr/search/?q=${q}`);
const d=await r.json();
const f=d.features[0];
userLat=f.geometry.coordinates[1];
userLon=f.geometry.coordinates[0];
load();
}

function gps(){
navigator.geolocation.getCurrentPosition(p=>{
userLat=p.coords.latitude;
userLon=p.coords.longitude;
load();
});
}

async function load(){
const r=await fetch("https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=300");
const d=await r.json();

stations=d.results.map(s=>{
if(!s.geolocalisation) return null;
return {...s,dist:haversine(userLat,userLon,s.geolocalisation.lat,s.geolocalisation.lon)};
}).filter(s=>s && s.dist<30);

renderList();
}

function prices(s){
return [s.prix_sp95,s.prix_sp98,s.prix_gazole].filter(x=>x);
}

function bestDeal(){
let best=null;
stations.forEach(s=>{
prices(s).forEach(p=>{
if(!best||p<best.price){best={s,price:p}};
});
});
renderBest(best);
}

function scanExpensive(){
let avg=[];
stations.forEach(s=>avg=avg.concat(prices(s)));
const mean=avg.reduce((a,b)=>a+b,0)/avg.length;

const bad=stations.filter(s=>Math.min(...prices(s))>mean+0.1);

const div=document.getElementById("result");
div.innerHTML='<div class="card red">⚠️ '+bad.length+' stations trop chères autour de toi</div>';
}

function renderBest(b){
const eco=(2.1-b.price)*50;
const div=document.getElementById("result");
div.innerHTML=`
<div class="card">
<div class="big">🔥 MEILLEUR PRIX</div><br>
${b.s.nom||"Station"}<br>
${b.s.ville}<br>
${b.s.dist.toFixed(1)} km<br><br>
<div class="big green">${b.price}€</div>
<br>💸 Gain estimé: ${eco.toFixed(2)}€
<br><br>
<a href="https://maps.google.com/?q=${b.s.geolocalisation.lat},${b.s.geolocalisation.lon}" target="_blank">
<button class="primary">Y aller</button>
</a>
</div>`;
}

function renderList(){
const div=document.getElementById("result");
div.innerHTML="";

stations.sort((a,b)=>a.dist-b.dist).slice(0,10).forEach(s=>{
const p=Math.min(...prices(s));
const el=document.createElement("div");
el.className="card";
el.innerHTML=`${s.nom||"Station"}<br>${s.ville}<br>${s.dist.toFixed(1)} km<br><span class="green">${p}€</span>`;
div.appendChild(el);
});
}
// 🎬 GENERATEUR CONTENU TIKTOK
function generateContent(){
  if(!stations.length){alert("Charge des données d'abord");return;}

  let best=null,worst=null;

  stations.forEach(s=>{
    prices(s).forEach(p=>{
      if(!best||p<best.price) best={s,price:p};
      if(!worst||p>worst.price) worst={s,price:p};
    });
  });

  const diff=(worst.price-best.price).toFixed(2);
  const gain=(diff*50).toFixed(2);

  const script=`🚨 TU PAYES TON ESSENCE TROP CHER

Station chère: ${worst.price}€
Station moins chère: ${best.price}€

💸 Différence: ${diff}€/L
🔥 Gain sur un plein: ${gain}€

👉 Va ici maintenant: ${best.s.ville}`;

  const div=document.getElementById("result");
  div.innerHTML=`
  <div class="card">
  <div class="big">🎬 SCRIPT TIKTOK</div><br>
  <textarea style="width:100%;height:180px;background:#000;color:#0f0;padding:10px;border-radius:8px">${script}</textarea><br><br> <button class="primary" onclick="navigator.clipboard.writeText(\`${script}\`)">📋 Copier</button>

  </div>`;
}// 🤖 AUTO TIKTOK GENERATOR (multi scripts) function autoTikTok(){ if(!stations.length){alert("Charge des données d'abord");return;}

let best=null,worst=null;

stations.forEach(s=>{ prices(s).forEach(p=>{ if(!best||p<best.price) best={s,price:p}; if(!worst||p>worst.price) worst={s,price:p}; }); });

const diff=(worst.price-best.price).toFixed(2); const gain=(diff*50).toFixed(2);

const hooks=[ "🚨 Tu te fais arnaquer à la pompe", "💸 Arrête de payer trop cher ton essence", "😳 Cette station abuse clairement", "🔥 J’ai trouvé le meilleur prix autour de moi" ];

const scripts=hooks.map(h=>`${h}

⛽ ${worst.price}€ vs ${best.price}€ 💸 Gain: ${gain}€ 📍 ${best.s.ville} 👉 Go maintenant`);

const div=document.getElementById("result"); div.innerHTML=`

  <div class="card">
  <div class="big">🤖 AUTO TIKTOK x${scripts.length}</div><br>
  ${scripts.map(s=>`
    <textarea style="width:100%;height:120px;margin-bottom:10px;background:#000;color:#0f0;padding:10px;border-radius:8px">${s}</textarea>
  `).join("")}
  <button class="primary" onclick="navigator.clipboard.writeText(\`${scripts.join("
---

")}`)">📋 Tout copier</button>

  </div>`;
}// 🎬 GENERATE VIDEO PROMPTS (ready for IA tools like Runway / Pika / Meta) function generateVideo(){ if(!stations.length){alert("Charge des données d'abord");return;}

let best=null,worst=null;

stations.forEach(s=>{ prices(s).forEach(p=>{ if(!best||p<best.price) best={s,price:p}; if(!worst||p>worst.price) worst={s,price:p}; }); });

const diff=(worst.price-best.price).toFixed(2); const gain=(diff*50).toFixed(2);

const prompt=Vertical video 9:16, realistic scene at a gas station, dramatic lighting. Scene 1: Close-up shocked person looking at fuel price ${worst.price}€/L. Text overlay: "🚨 STOP PAYING TOO MUCH" Scene 2: Quick transition to cheaper station price ${best.price}€/L. Text overlay: "SAVE ${gain}€ PER TANK" Scene 3: Map animation zoom to ${best.s.ville}. Final text: "GO NOW" Style: viral TikTok, fast cuts, subtitles, high contrast.;

const div=document.getElementById("result"); div.innerHTML=`

  <div class="card">
  <div class="big">🎬 PROMPT VIDÉO AUTO</div><br>
  <textarea style="width:100%;height:220px;background:#000;color:#0f0;padding:10px;border-radius:8px">${prompt}</textarea>
  <br><br>
  <button class="primary" onclick="navigator.clipboard.writeText(\`${prompt}\`)">📋 Copier prompt</button>
  </div>`;
}</script></body>
</html>
