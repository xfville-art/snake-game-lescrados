<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500;
    --red: #e05c2a;
    --green: #3fb950;
    --danger: #f85149;
    --bg: #0a0c0f;
    --card: #111318;
    --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 80px;
    max-width: 540px;
    margin: auto;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 20px; }

  /* Barre de recherche optimisée */
  .search-row { 
    display: flex; 
    gap: 8px; 
    margin-bottom: 12px; 
    width: 100%;
  }
  input[type=text] {
    flex: 1; 
    min-width: 0; 
    padding: 12px 16px; 
    background: var(--card); 
    border: 1px solid var(--border);
    border-radius: 12px; 
    color: #fff; 
    font-size: 1rem; 
    outline: none;
  }
  .btn-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--orange);
    cursor: pointer;
    flex-shrink: 0;
    font-size: 1.2rem;
  }

  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  input[type=range] { flex: 1; accent-color: var(--orange); height: 6px; }
  #radiusVal { color: var(--orange); font-weight: 700; min-width: 45px; text-align: right; font-size: 0.9rem; }

  /* Boutons d'action */
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }
  button {
    padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.96); }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }

  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
  .fuel-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: #666; font-size: 0.8rem; font-weight: 700;
  }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

  /* Station Card avec Logo Correction */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; margin-bottom: 12px; animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .station-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .logo-box {
    width: 50px; height: 50px; background: #000; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.1rem; color: var(--orange);
    border: 1px solid var(--border); flex-shrink: 0; line-height: 1;
  }
  .station-info { flex: 1; min-width: 0; }
  .station-name { 
    font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 800; 
    text-transform: uppercase; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .station-city { color: #555; font-size: 0.8rem; font-weight: 600; }

  .price-box { text-align: right; }
  .price-big { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; line-height: 1; }
  .price-label { font-size: 0.65rem; color: #555; text-transform: uppercase; font-weight: 700; }

  .prices-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2229; }
  .chip { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; background: #1a1e25; color: #999; border: 1px solid var(--border); }
  .chip.highlight { border-color: var(--orange); color: var(--orange); }

  textarea { width: 100%; background: #080a0d; color: var(--green); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: monospace; font-size: 0.85rem; margin-top: 10px; }
  .loader { width: 20px; height: 20px; border: 3px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>
<p class="subtitle">Prix en temps réel · Officiel Gouvernement</p>

<div class="search-row">
  <input id="city" type="text" placeholder="Entrez une ville..." onkeydown="if(event.key==='Enter')search()">
  <div class="btn-icon" onclick="search()">🔍</div>
  <div class="btn-icon" onclick="gps()">📍</div>
</div>

<div class="radius-row">
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal">15km</span>
</div>

<div class="fuel-grid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">TOUS</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">GAZOLE</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('sp95',this)">SP95</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
  <button class="fuel-btn" onclick="setFuel('gplc',this)">GPLc</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 TROUVER LE MOINS CHER</button>
  <button class="btn-ghost" onclick="renderList()">📋 LISTE</button>
  <button class="btn-ghost" onclick="renderStats()">📊 STATS</button>
  <button class="btn-ghost" onclick="autoTikTok()">🎬 SCRIPT TIKTOK</button>
  <button class="btn-ghost" onclick="generateVideo()">🎥 PROMPT VIDÉO</button>
</div>

<div id="result"></div>

<script>
let stations = [], activeFuel = 'all', userLat, userLon;

const FUEL_MAP = {
  gazole: ['gazole_prix','Gazole','DIESEL'],
  e10:    ['e10_prix','E10'],
  sp98:   ['sp98_prix','SP98'],
  sp95:   ['sp95_prix','SP95'],
  e85:    ['e85_prix','E85'],
  gplc:   ['gplc_prix','GPLc','GPL']
};

// LOGIQUE DES LOGOS : Améliorée pour détecter même sans le nom direct
function getLogo(s) {
  const text = ((s.nom || s.enseigne || "") + " " + (s.adresse || "")).toUpperCase();
  if (text.includes('TOTAL')) return 'TE';
  if (text.includes('LECLERC')) return 'E.L';
  if (text.includes('CARREFOUR')) return 'C.F';
  if (text.includes('INTERMARCHE')) return 'I.M';
  if (text.includes('SYSTEME U') || text.includes('SUPER U') || text.includes('MAGASIN U') || text.includes('HYPER U')) return 'U';
  if (text.includes('ESSO')) return 'ES';
  if (text.includes('AVIA')) return 'AV';
  if (text.includes('BP')) return 'BP';
  if (text.includes('AUCHAN')) return 'AU';
  if (text.includes('CASINO')) return 'CA';
  if (text.includes('SHELL')) return 'SH';
  return '⛽';
}

function getPrice(s, fuel) {
  if (fuel === 'all') fuel = 'gazole';
  for (const k of FUEL_MAP[fuel]) if (parseFloat(s[k]) > 0) return parseFloat(s[k]);
  
  const pList = s.prix || s.Carburants || [];
  if (Array.isArray(pList)) {
    for (const p of pList) {
      const n = (p.nom || p['@nom'] || "").toLowerCase();
      const v = parseFloat(p.valeur || p['@valeur'] || p.prix || 0);
      if (v > 0 && FUEL_MAP[fuel].some(f => n.includes(f.toLowerCase()))) return v;
    }
  }
  return null;
}

function setFuel(f, b) {
  activeFuel = f;
  document.querySelectorAll('.fuel-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  if (stations.length) renderList();
}

async function search() {
  const v = document.getElementById('city').value;
  if (!v) return;
  showLoader("Localisation...");
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(v)}&limit=1`);
    const d = await r.json();
    if (d.features.length) {
      userLat = d.features[0].geometry.coordinates[1];
      userLon = d.features[0].geometry.coordinates[0];
      fetchData();
    }
  } catch(e) { showError("Ville introuvable"); }
}

function gps() {
  if (!navigator.geolocation) return;
  showLoader("GPS...");
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude; userLon = p.coords.longitude;
    fetchData();
  }, () => showError("Accès GPS refusé"));
}

async function fetchData() {
  const rad = document.getElementById('radius').value;
  showLoader("Chargement des prix...");
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=100&where=within_distance(geom%2C%20geom'POINT(${userLon}%20${userLat})'%2C%20${rad}km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = d.results.map(s => ({
      ...s,
      nom: s.nom || s.enseigne || "Station",
      dist: calcDist(userLat, userLon, s.geom.lat, s.geom.lon)
    })).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { showError("Erreur réseau"); }
}

function calcDist(lat1, lon1, lat2, lon2) {
  const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function renderList() {
  if (!requireStations()) return;
  let html = `<div style="color:#555; font-size:0.75rem; margin-bottom:10px; font-weight:700">STATIONS DANS LE SECTEUR (${stations.length})</div>`;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel);
    html += `
    <div class="card">
      <div class="station-header">
        <div class="logo-box">${getLogo(s)}</div>
        <div class="station-info">
          <div class="station-name">${s.nom}</div>
          <div class="station-city">${s.ville} • ${s.dist.toFixed(1)} km</div>
        </div>
        <div class="price-box">
          <div class="price-big" style="color:${p ? 'inherit' : '#333'}">${p ? p.toFixed(3) : '---'}</div>
          <div class="price-label">€ / Litre</div>
        </div>
      </div>
      <div class="prices-row">
        ${Object.keys(FUEL_MAP).map(f => {
          const val = getPrice(s, f);
          return val ? `<div class="chip ${activeFuel===f?'highlight':''}">${f.toUpperCase()} ${val.toFixed(3)}</div>` : '';
        }).join('')}
      </div>
    </div>`;
  });
  document.getElementById('result').innerHTML = html;
}

function bestDeal() {
  if (!requireStations()) return;
  let best = null, worst = null;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel);
    if (!p) return;
    if (!best || p < best.p) best = {s, p};
    if (!worst || p > worst.p) worst = {s, p};
  });
  if (!best) return;
  const eco = ((worst.p - best.p) * 50).toFixed(2);
  document.getElementById('result').innerHTML = `
    <div class="card" style="border-color:var(--green)">
      <div class="station-header">
        <div class="logo-box">${getLogo(best.s)}</div>
        <div class="station-info">
          <div class="station-name" style="color:var(--green)">MEILLEUR PRIX TROUVÉ</div>
          <div class="station-city">${best.s.nom} à ${best.s.ville}</div>
        </div>
      </div>
      <div style="text-align:center; padding:20px 0;">
        <div style="font-size:3rem; font-weight:900; color:var(--green); font-family:'Barlow Condensed'">${best.p.toFixed(3)}€</div>
        <div style="color:#aaa">Économisez <b>${eco}€</b> sur un plein de 50L</div>
      </div>
      <button class="btn-primary wide" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${best.s.geom.lat},${best.s.geom.lon}')">Y ALLER MAINTENANT</button>
    </div>`;
}

function autoTikTok() {
  if (!requireStations()) return;
  let b = null, w = null;
  stations.forEach(s => {
    const p = getPrice(s, activeFuel); if (!p) return;
    if (!b || p < b.p) b = {s, p}; if (!w || p > w.p) w = {s, p};
  });
  const gain = ((w.p - b.p)*50).toFixed(2);
  const txt = `🚨 ALERTE PRIX ESSENCE\n\nArrête de payer trop cher !\n❌ Station chère : ${w.p.toFixed(3)}€\n✅ Moins cher : ${b.p.toFixed(3)}€\n\n💸 Tu gagnes ${gain}€ sur ton plein de 50L !\n📍 Ça se passe à ${b.s.ville} (${b.s.nom})\n\n#essence #bonplan #tiktokfrance`;
  renderText("SCRIPT TIKTOK", txt);
}

function generateVideo() {
  if (!requireStations()) return;
  const p = getPrice(stations[0], activeFuel);
  const txt = `Prompt IA Vidéo :\n\nCinematic 4k vertical shot, close-up on a gas station pump screen showing ${p.toFixed(3)}€ per liter. Moody lighting, neon signs, shot for TikTok. High resolution, professional color grading.`;
  renderText("PROMPT VIDÉO IA", txt);
}

function renderText(title, content) {
  document.getElementById('result').innerHTML = `
    <div class="card">
      <div class="station-name">${title}</div>
      <textarea rows="8" id="copyText">${content}</textarea>
      <button class="btn-primary wide" style="margin-top:10px" onclick="copy()">COPIER LE TEXTE</button>
    </div>`;
}

function copy() {
  const t = document.getElementById('copyText'); t.select(); navigator.clipboard.writeText(t.value);
  alert("Copié !");
}

function showLoader(m) { document.getElementById('result').innerHTML = `<div class="card"><div class="loader"></div>${m}</div>`; }
function showError(m) { document.getElementById('result').innerHTML = `<div class="card" style="border-color:var(--danger)">❌ ${m}</div>`; }
function requireStations() { if(!stations.length) { showError("Lancez une recherche d'abord"); return false; } return true; }
</script>
</body>
</html>
