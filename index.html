<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CarbuFuel ⛽</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  :root {
    --orange: #f0a500;
    --red: #e05c2a;
    --green: #3fb950;
    --danger: #f85149;
    --bg: #0a0c0f;
    --card: #111318;
    --border: #1e2229;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 80px;
    max-width: 540px;
    margin: auto;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--orange), var(--red));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 20px; }

  /* Correction de la barre de recherche pour éviter le dépassement */
  .search-row { 
    display: flex; 
    gap: 6px; 
    margin-bottom: 12px; 
    width: 100%;
  }
  input[type=text] {
    flex: 1; 
    min-width: 0; /* Important pour flexbox */
    padding: 12px; 
    background: var(--card); 
    border: 1px solid var(--border);
    border-radius: 10px; 
    color: #fff; 
    font-size: 0.95rem; 
    outline: none;
  }
  .btn-search {
    padding: 0 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #aaa;
    cursor: pointer;
    flex-shrink: 0;
  }

  .radius-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .radius-row label { color: #666; font-size: .85rem; white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: var(--orange); }
  #radiusVal { color: var(--orange); font-weight: 700; min-width: 45px; text-align: right; }

  /* Boutons d'action */
  button {
    padding: 12px; border-radius: 10px; border: none; cursor: pointer;
    font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 1rem;
    transition: transform .1s;
  }
  button:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--red)); color: #000; }
  .btn-ghost { background: var(--card); color: #aaa; border: 1px solid var(--border); }
  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .wide { grid-column: 1 / -1; }

  .fuel-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .fuel-btn {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--card); color: #888; font-size: .8rem; font-weight: 600;
  }
  .fuel-btn.active { background: var(--orange); color: #000; border-color: var(--orange); }

  /* Style des cartes avec LOGO */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; margin-bottom: 12px; animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .station-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 15px; }
  .station-logo {
    width: 48px; height: 48px; background: #0d0f12; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.1rem; color: var(--orange); border: 1px solid var(--border); flex-shrink: 0;
  }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.25rem; font-weight: 800; text-transform: uppercase; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
  .station-city { color: #555; font-size: 0.8rem; margin-top: 2px; }

  .price-main { text-align: right; flex-shrink: 0; }
  .price-val { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 900; line-height: 1; }
  .price-unit { font-size: 0.7rem; color: #555; }

  .prices-mini { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e2229; }
  .price-chip { padding: 3px 7px; border-radius: 5px; font-size: .75rem; font-weight: 600; background: #1a1e25; color: #ccc; border: 1px solid var(--border); }
  .price-chip.active { border-color: var(--orange); color: var(--orange); }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: .7rem; font-weight: 700; text-transform: uppercase; margin-top: 5px; }
  .tag-green { background: #1a2a1a; color: var(--green); }
  .tag-red { background: #2a1a1a; color: var(--danger); }

  textarea { width: 100%; background: #0d0f12; color: #3fb950; border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'Barlow', sans-serif; font-size: .85rem; margin-top: 10px; }
  .loader { display: inline-block; width: 18px; height: 18px; border: 2px solid #333; border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>⛽ CarbuFuel</h1>
<p class="subtitle">Prix carburants en temps réel · France</p>

<div class="search-row">
  <input id="city" type="text" placeholder="Ville ou CP..." onkeydown="if(event.key==='Enter')search()">
  <button class="btn-search" onclick="search()">🔍</button>
  <button class="btn-search" onclick="gps()">📍</button>
</div>

<div class="radius-row">
  <label>Rayon</label>
  <input type="range" id="radius" min="2" max="50" value="15" oninput="document.getElementById('radiusVal').textContent=this.value+'km'">
  <span id="radiusVal">15km</span>
</div>

<div class="fuel-grid" id="fuelGrid">
  <button class="fuel-btn active" onclick="setFuel('all',this)">Tous</button>
  <button class="fuel-btn" onclick="setFuel('sp95',this)">SP95</button>
  <button class="fuel-btn" onclick="setFuel('sp98',this)">SP98</button>
  <button class="fuel-btn" onclick="setFuel('e10',this)">E10</button>
  <button class="fuel-btn" onclick="setFuel('gazole',this)">Gazole</button>
  <button class="fuel-btn" onclick="setFuel('e85',this)">E85</button>
  <button class="fuel-btn" onclick="setFuel('gplc',this)">GPLc</button>
</div>

<div class="action-grid">
  <button class="btn-primary wide" onclick="bestDeal()">🔥 Meilleur prix</button>
  <button class="btn-ghost" onclick="renderList()">📋 Liste</button>
  <button class="btn-ghost" onclick="renderStats()">📊 Stats</button>
  <button class="btn-ghost" onclick="generateContent()">🎬 Script TikTok</button>
  <button class="btn-ghost" onclick="autoTikTok()">🤖 Auto x4</button>
  <button class="btn-ghost wide" onclick="generateVideo()">🎥 Prompt vidéo IA</button>
</div>

<div id="result"></div>

<script>
let userLat = null, userLon = null, stations = [], activeFuel = 'all';

const FUEL_KEYS = {
  sp95: ['sp95_prix', 'prix_sp95', 'Prix_SP95', 'SP95'],
  sp98: ['sp98_prix', 'prix_sp98', 'Prix_SP98', 'SP98'],
  e10: ['e10_prix', 'prix_e10', 'Prix_E10', 'E10'],
  gazole: ['gazole_prix','prix_gazole','Prix_Gazole','Gazole','DIESEL'],
  e85: ['e85_prix', 'prix_e85', 'Prix_E85', 'E85'],
  gplc: ['gplc_prix', 'prix_gplc', 'Prix_GPLc', 'GPLc','GPL'],
};

// Logique des logos par enseigne
function getStationLogo(name) {
  const n = (name || "").toUpperCase();
  if (n.includes('TOTAL')) return 'TE';
  if (n.includes('LECLERC') || n.includes('E.LECLERC')) return 'E.L';
  if (n.includes('CARREFOUR')) return 'C.F';
  if (n.includes('INTERMARCHE')) return 'I.M';
  if (n.includes('SYSTEME U') || n.includes('SUPER U') || n.includes('MAGASIN U')) return 'U';
  if (n.includes('ESSO')) return 'ES';
  if (n.includes('AVIA')) return 'AV';
  if (n.includes('BP')) return 'BP';
  if (n.includes('AUCHAN')) return 'AU';
  if (n.includes('CASINO')) return 'CA';
  return '⛽';
}

function extractFuelPrice(s, fuel) {
  for (const key of FUEL_KEYS[fuel] || []) {
    const v = parseFloat(s[key]);
    if (v > 0) return v;
  }
  const carbs = s.Carburants || s.carburants || s.prix || [];
  if (Array.isArray(carbs)) {
    const names = FUEL_KEYS[fuel] || [];
    for (const entry of carbs) {
      const nom = (entry.Nom || entry.nom || entry['@nom'] || '').toLowerCase();
      const val = parseFloat(entry.Prix || entry.prix || entry.valeur || entry['@valeur'] || 0);
      if (val > 0 && names.some(n => nom.includes(n.toLowerCase()))) return val;
    }
  }
  return null;
}

function setFuel(fuel, btn) {
  activeFuel = fuel;
  document.querySelectorAll('.fuel-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(stations.length) renderList();
}

function haversine(a, b, c, d) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(c - a), dLon = toR(d - b);
  const x = Math.sin(dLat/2)**2 + Math.cos(toR(a)) * Math.cos(toR(c)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

async function search() {
  const q = document.getElementById("city").value;
  if (!q) return;
  showLoader("Recherche...");
  try {
    const r = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(q)}&limit=1`);
    const d = await r.json();
    if (!d.features?.length) { showError("Ville introuvable."); return; }
    userLat = d.features[0].geometry.coordinates[1];
    userLon = d.features[0].geometry.coordinates[0];
    load();
  } catch(e) { showError("Erreur."); }
}

function gps() {
  if (!navigator.geolocation) return;
  showLoader("GPS...");
  navigator.geolocation.getCurrentPosition(p => {
    userLat = p.coords.latitude; userLon = p.coords.longitude;
    load();
  }, () => showError("GPS refusé."));
}

async function load() {
  const radius = document.getElementById('radius').value;
  showLoader("Chargement...");
  const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=100&where=within_distance(geom%2C%20geom'POINT(${userLon}%20${userLat})'%2C%20${radius}km)`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    stations = (d.results || []).map(s => {
      const lat = s.geom?.lat || 0; const lon = s.geom?.lon || 0;
      return { ...s, nom: s.nom || s.enseigne || "Station", _lat: lat, _lon: lon, dist: haversine(userLat, userLon, lat, lon) };
    }).sort((a,b) => a.dist - b.dist);
    renderList();
  } catch(e) { showError("Erreur réseau."); }
}

function renderList() {
  if (!requireStations()) return;
  const allP = stations.flatMap(s => Object.keys(FUEL_KEYS).map(f => extractFuelPrice(s, f)).filter(v => v > 0));
  const mean = allP.length ? (allP.reduce((a,b) => a+b, 0) / allP.length) : 0;

  let html = `<div style="margin-bottom:10px; font-weight:700; color:#555; font-size:.8rem;">📍 ${stations.length} STATIONS PROCHES</div>`;
  
  stations.forEach(s => {
    const p = activeFuel === 'all' ? (extractFuelPrice(s, 'gazole') || extractFuelPrice(s, 'e10')) : extractFuelPrice(s, activeFuel);
    const isCheap = p > 0 && p < mean - 0.05;
    const isExp = p > 0 && p > mean + 0.10;
    
    html += `
    <div class="card">
      <div class="station-header">
        <div class="station-logo">${getStationLogo(s.nom)}</div>
        <div class="station-info">
          <div class="station-name">${s.nom}</div>
          <div class="station-city">${s.ville} · ${s.dist.toFixed(1)} km</div>
          ${isCheap ? '<span class="tag tag-green">🔥 Bon plan</span>' : (isExp ? '<span class="tag tag-red">⚠️ Cher</span>' : '')}
        </div>
        <div class="price-main">
          <div class="price-val ${isCheap ? 'green' : (isExp ? 'red' : '')}">${p ? p.toFixed(3) : '---'}</div>
          <div class="price-unit">€/L</div>
        </div>
      </div>
      <div class="prices-mini">
        ${Object.keys(FUEL_KEYS).map(f => {
          const val = extractFuelPrice(s, f);
          return val ? `<span class="price-chip ${activeFuel === f ? 'active' : ''}">${f.toUpperCase()} ${val.toFixed(3)}</span>` : '';
        }).join('')}
      </div>
      <button class="btn-ghost" onclick="window.open('https://www.google.com/maps?q=${s._lat},${s._lon}')" style="width:100%; margin-top:12px; font-size:.8rem; padding:8px">🗺️ VOIR SUR MAPS</button>
    </div>`;
  });
  document.getElementById("result").innerHTML = html;
}

// TikTok / Stats Logic
function getBestWorst() {
  let best = null, worst = null;
  const fuel = activeFuel === 'all' ? 'gazole' : activeFuel;
  stations.forEach(s => {
    const p = extractFuelPrice(s, fuel);
    if (!p) return;
    if (!best || p < best.price) best = { s, price: p };
    if (!worst || p > worst.price) worst = { s, price: p };
  });
  return { best, worst };
}

function bestDeal() {
  if (!requireStations()) return;
  const { best, worst } = getBestWorst();
  if (!best) return;
  const eco = ((worst.price - best.price) * 50).toFixed(2);
  document.getElementById("result").innerHTML = `
    <div class="card" style="border-color:var(--orange)">
      <div class="station-header">
        <div class="station-logo">${getStationLogo(best.s.nom)}</div>
        <div class="station-info">
          <div class="station-name orange">🔥 MEILLEUR PRIX</div>
          <div class="station-city">${best.s.nom} · ${best.s.ville}</div>
        </div>
      </div>
      <div style="text-align:center; margin:15px 0;">
        <div class="price-val green" style="font-size:2.5rem">${best.price.toFixed(3)}€</div>
        <div style="color:#aaa; font-size:.9rem">Économisez <strong>${eco}€</strong> sur un plein</div>
      </div>
      <button class="btn-primary" onclick="window.open('https://www.google.com/maps?q=${best.s._lat},${best.s._lon}')" style="width:100%">🗺️ Y ALLER</button>
    </div>`;
}

function renderStats() {
  if (!requireStations()) return;
  const { best, worst } = getBestWorst();
  if (!best) return;
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="station-name">📊 ANALYSE LOCALE</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
        <div style="background:#0d0f12; padding:15px; border-radius:10px; text-align:center;">
          <div class="green" style="font-size:1.5rem; font-weight:900;">${best.price.toFixed(3)}€</div>
          <div style="font-size:0.7rem; color:#555;">MINIMUM</div>
        </div>
        <div style="background:#0d0f12; padding:15px; border-radius:10px; text-align:center;">
          <div class="red" style="font-size:1.5rem; font-weight:900;">${worst.price.toFixed(3)}€</div>
          <div style="font-size:0.7rem; color:#555;">MAXIMUM</div>
        </div>
      </div>
    </div>`;
}

function generateContent() {
  const { best, worst } = getBestWorst();
  if (!best) return;
  const script = `🚨 ALERTE ESSENCE\n\nStation la plus chère : ${worst.price.toFixed(3)}€\nStation la moins chère : ${best.price.toFixed(3)}€\n\n💸 Tu gagnes ${((worst.price - best.price)*50).toFixed(2)}€ sur ton plein !\n📍 Ça se passe à ${best.s.ville}`;
  renderTextArea("🎬 SCRIPT TIKTOK", script);
}

function autoTikTok() {
  const { best, worst } = getBestWorst();
  if (!best) return;
  const gain = ((worst.price - best.price) * 50).toFixed(2);
  const combined = `🚨 ARNAQUE À LA POMPE\n⛽ ${worst.price.toFixed(3)}€ vs ${best.price.toFixed(3)}€\n💸 Gain : ${gain}€ sur 50L\n📍 ${best.s.ville}\n👉 Abonne-toi !`;
  renderTextArea("🤖 AUTO TIKTOK", combined);
}

function generateVideo() {
  const { best, worst } = getBestWorst();
  const prompt = `Vertical cinematic shot, high contrast. Overlay text: "🚨 SAVE ${((worst.price - best.price)*50).toFixed(2)}€ ON FUEL". Cut from price ${worst.price.toFixed(3)} to ${best.price.toFixed(3)}. Background: gas station at night.`;
  renderTextArea("🎥 PROMPT VIDÉO IA", prompt);
}

function renderTextArea(title, text) {
  document.getElementById("result").innerHTML = `
    <div class="card">
      <div class="station-name">${title}</div>
      <textarea rows="8" id="copyArea">${text}</textarea>
      <button class="btn-primary" style="width:100%; margin-top:10px" onclick="copyText()">📋 COPIER LE TEXTE</button>
    </div>`;
}

function copyText() {
  const t = document.getElementById("copyArea");
  t.select(); navigator.clipboard.writeText(t.value);
  alert("Copié dans le presse-papier !");
}

function requireStations() { if (!stations.length) { showError("Cherchez une ville d'abord 📍"); return false; } return true; }
function showLoader(msg) { document.getElementById("result").innerHTML = `<div class="card"><span class="loader"></span> ${msg}</div>`; }
function showError(msg) { document.getElementById("result").innerHTML = `<div class="card red">❌ ${msg}</div>`; }
</script>
</body>
</html>
